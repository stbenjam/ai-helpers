html": "\u003cp\u003eThe \u003ccode\u003egit:debt-scan\u003c/code\u003e command provides a comprehensive analysis of technical debt indicators in the current Git repository. It scans for common code health signals including TODO/FIXME comments, stale branches, large files, uncommitted changes, and recent development activity patterns. This command is designed to give developers quick insights into areas that may need attention without making any modifications to the repository.\u003c/p\u003e\u003cp\u003eIt provides essential information for developers including:\u003cbr\u003e- Count and locations of TODO, FIXME, HACK, and XXX comments\u003cbr\u003e- Stale branches tracking openshift org remotes that may need cleanup (excludes main, master, develop, release-*, gh-pages, local-only branches, and personal forks)\u003cbr\u003e- Large git-tracked files that might benefit from refactoring\u003cbr\u003e- Uncommitted or unstaged changes\u003cbr\u003e- Recent commit activity trends\u003c/p\u003e\u003cp\u003eThe spec sections is inspired by https://man7.org/linux/man-pages/man7/man-pages.7.html#top_of_page\u003c/p\u003e"}, {"name": "fix-cherrypick-robot-pr", "full_name": "git:fix-cherrypick-robot-pr", "description": "Fix a cherrypick-robot PR that needs manual intervention", "description_html": "Fix a cherrypick-robot PR that needs manual intervention", "synopsis": "/git:fix-cherrypick-robot-pr \u003cpr-url\u003e [error-messages]", "body_html": "\u003cp\u003eThe \u003ccode\u003egit:fix-cherrypick-robot-pr\u003c/code\u003e command replaces a cherrypick-robot PR with a clean, manually-crafted cherry-pick PR that includes fixes the robot cannot handle.\u003c/p\u003e\u003cp\u003eThe cherrypick-robot creates automated PRs but cannot:\u003cbr\u003e- Fix verification failures (JSON validation, missing annotations)\u003cbr\u003e- Resolve merge conflicts\u003cbr\u003e- Add context-specific fixes\u003cbr\u003e- Handle edge cases requiring human judgment\u003cbr\u003e- Apply repository-specific cleanup\u003c/p\u003e\u003cp\u003eThis command helps you create a replacement PR with all necessary fixes applied.\u003c/p\u003e"}, {"name": "redescribe", "full_name": "git:redescribe", "description": "Adapt and correct a PR description to match its code diffs and commit messages", "description_html": "Adapt and correct a PR description to match its code diffs and commit messages", "synopsis": "/git:redescribe              # Redescribe the PR for the current branch\n/git:redescribe \u003cpr-url\u003e     # Redescribe a specific PR by URL", "body_html": "\u003cp\u003eThe \u003ccode\u003e/git:redescribe\u003c/code\u003e command analyzes a Pull Request&#x27;s actual code changes (diffs) and commit messages to generate an accurate, up-to-date PR description. It compares the existing description with the reality of the code, proposes a corrected description, and offers to update the PR.\u003c/p\u003e\u003cp\u003eThis is particularly useful when:\u003cbr\u003e- A PR has evolved significantly since it was opened.\u003cbr\u003e- The initial description was placeholder text.\u003cbr\u003e- Commits have been squashed or rebased, changing the PR&#x27;s scope.\u003c/p\u003e\u003cp\u003eThe command ensures the description accurately reflects:\u003cbr\u003e- The problem being solved (from commit messages/Jira context).\u003cbr\u003e- The changes made (from code diffs).\u003cbr\u003e- The implementation details.\u003c/p\u003e"}, {"name": "suggest-reviewers", "full_name": "git:suggest-reviewers", "description": "Suggest appropriate reviewers for a PR based on git blame and OWNERS files", "description_html": "Suggest appropriate reviewers for a PR based on git blame and OWNERS files", "synopsis": "/git:suggest-reviewers [base-branch]", "body_html": "\u003cp\u003eThe \u003ccode\u003egit:suggest-reviewers\u003c/code\u003e command analyzes changed files and suggests the most appropriate reviewers for a pull request. It works with both committed changes on feature branches and uncommitted changes (even on the main branch), making it useful before you&#x27;ve created a branch or made any commits. It prioritizes developers who have actually contributed to the code being modified, using git blame data as the primary signal and OWNERS files as supporting information.\u003c/p\u003e\u003cp\u003eThe command performs the following analysis:\u003cbr\u003e- Identifies all files changed (both committed and uncommitted changes)\u003cbr\u003e- Runs git blame on changed lines to find recent and frequent contributors\u003cbr\u003e- Searches for OWNERS files in the directories of changed files (and parent directories)\u003cbr\u003e- Aggregates and ranks potential reviewers based on:\u003cbr\u003e  - Frequency and recency of contributions to modified code (highest priority)\u003cbr\u003e  - Presence in OWNERS files (secondary consideration)\u003cbr\u003e- Outputs a prioritized list of suggested reviewers\u003c/p\u003e\u003cp\u003eThis command is particularly useful for large codebases with distributed ownership where choosing the right reviewer can be challenging. You can use it at any stage of development - from uncommitted local changes to a complete feature branch ready for PR.\u003c/p\u003e"}, {"name": "summary", "full_name": "git:summary", "description": "Show current branch, git status, and recent commits for quick context", "description_html": "Show current branch, git status, and recent commits for quick context", "synopsis": "/git:summary", "body_html": "\u003cp\u003eThe \u003ccode\u003egit:summary\u003c/code\u003e command provides a comprehensive overview of the current Git repository state. It displays the current branch, tracking status, working tree status, and recent commit history in a single concise view. This command is designed to give developers quick context about their repository without running multiple Git commands manually.\u003c/p\u003e\u003cp\u003eIt provides essential information for developers including:\u003cbr\u003e- Current branch and remote tracking status (ahead/behind)\u003cbr\u003e- Working tree status (modified, staged, and untracked files)\u003cbr\u003e- Recent commit history with one-line summaries\u003cbr\u003e- Uncommitted changes summary\u003c/p\u003e\u003cp\u003eThe spec sections is inspired by https://man7.org/linux/man-pages/man7/man-pages.7.html#top_of_page\u003c/p\u003e"}], "skills": [{"name": "suggest-reviewers", "description": "Git blame analysis helper for the suggest-reviewers command", "description_html": "Git blame analysis helper for the suggest-reviewers command", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "tooling", "keywords": ["git", "workflow", "automation"], "author": {"name": "github.com/openshift-eng"}}, {"name": "golang", "description": "Go development tools: gopls MCP server, LSP integration, automatic gofmt formatting, golangci-lint linting, and CVE dependency patching", "version": "0.3.0", "has_readme": true, "commands": [], "skills": [{"name": "fix-cve", "description": "Patch a Go dependency to fix a CVE using the appropriate strategy based on Go version compatibility.\nUse when the user wants to fix a CVE by updating a Go module, replacing it with a patched fork,\nor applying a security patch across all go.mod files in a Go project.\nTriggers on: 'patch CVE', 'fix CVE', 'replace grpc', 'update vulnerable dependency',\n'security patch go module', or any mention of CVE + Go dependency replacement.\n", "description_html": "Patch a Go dependency to fix a CVE using the appropriate strategy based on Go version compatibility.\u003cbr\u003eUse when the user wants to fix a CVE by updating a Go module, replacing it with a patched fork,\u003cbr\u003eor applying a security patch across all go.mod files in a Go project.\u003cbr\u003eTriggers on: &#x27;patch CVE&#x27;, &#x27;fix CVE&#x27;, &#x27;replace grpc&#x27;, &#x27;update vulnerable dependency&#x27;,\u003cbr\u003e&#x27;security patch go module&#x27;, or any mention of CVE + Go dependency replacement.", "meta": ""}, {"name": "go-lint", "description": "Run golangci-lint to check Go code quality. Use when the user asks to lint, check for lint issues, or verify code quality in a Go project, or when linting is appropriate before committing Go code changes.", "description_html": "Run golangci-lint to check Go code quality. Use when the user asks to lint, check for lint issues, or verify code quality in a Go project, or when linting is appropriate before committing Go code changes.", "meta": "Tools: Bash(golangci-lint *) Bash(grep *) Bash(make lint) Bash(make verify-lint) Read"}, {"name": "go-lint-fix", "description": "Run golangci-lint and fix all reported issues. Use only when explicitly asked to fix lint issues in a Go project.", "description_html": "Run golangci-lint and fix all reported issues. Use only when explicitly asked to fix lint issues in a Go project.", "meta": "Tools: Bash(golangci-lint *) Bash(grep *) Bash(make lint) Bash(make verify-lint) Read Edit(**/*.go)"}], "agents": [], "hooks": [{"event_type": "PostToolUse", "matcher": "Write", "hooks_json": "[\n  {\n    \"command\": \"bash ${CLAUDE_PLUGIN_ROOT}/hooks/scripts/gofmt.sh\",\n    \"timeout\": 10,\n    \"if_\": \"Write(**/*.go)\",\n    \"type\": \"command\"\n  }\n]"}, {"event_type": "PostToolUse", "matcher": "Edit", "hooks_json": "[\n  {\n    \"command\": \"bash ${CLAUDE_PLUGIN_ROOT}/hooks/scripts/gofmt.sh\",\n    \"timeout\": 10,\n    \"if_\": \"Edit(**/*.go)\",\n    \"type\": \"command\"\n  }\n]"}], "mcp_servers": [{"name": "gopls", "type": "stdio", "endpoint": "gopls", "source": ".mcp.json"}], "rules": [], "category": "development", "keywords": ["go", "gopls", "lsp", "linting", "formatting"], "author": {"name": "github.com/openshift-eng"}}, {"name": "hcp", "description": "Generate HyperShift cluster creation commands via hcp CLI from natural language descriptions", "version": "0.0.2", "has_readme": true, "commands": [{"name": "cluster-health-check", "full_name": "hcp:cluster-health-check", "description": "Perform comprehensive health check on HCP cluster and report issues", "description_html": "Perform comprehensive health check on HCP cluster and report issues", "synopsis": "/hcp:cluster-health-check \u003ccluster-name\u003e [--verbose] [--output-format json|text]", "body_html": "\u003cp\u003eThe \u003ccode\u003e/hcp:cluster-health-check\u003c/code\u003e command performs an extensive diagnostic of a Hosted Control Plane (HCP) cluster to assess its operational health, stability, and performance. It automates the validation of multiple control plane and infrastructure components to ensure the cluster is functioning as expected.\u003c/p\u003e\u003cp\u003eThe command runs a comprehensive set of health checks covering control plane pods, etcd, node pools, networking, and infrastructure readiness. It also detects degraded or progressing states, certificate issues, and recent warning events.\u003c/p\u003e\u003cp\u003eSpecifically, it performs the following:\u003c/p\u003e\u003cp\u003e- Detects and validates the availability of oc or kubectl CLI tools and verifies cluster connectivity.\u003cbr\u003e- Checks the HostedCluster resource status (Available, Progressing, Degraded) and reports any abnormal conditions with detailed reasons and messages.\u003cbr\u003e- Validates control plane pod health in the management cluster, detecting non-running pods, crash loops, high restart counts, and image pull errors.\u003cbr\u003e- Performs etcd health checks to ensure data consistency and availability.\u003cbr\u003e- Inspects NodePools for replica mismatches, readiness, and auto-scaling configuration accuracy.\u003cbr\u003e- Evaluates infrastructure readiness (including AWS/Azure-specific validations like endpoint services).\u003cbr\u003e- Examines networking and ingress components, including Konnectivity servers and router pods.\u003cbr\u003e- Scans for recent warning events across HostedCluster, NodePool, and control plane namespaces.\u003cbr\u003e- Reviews certificate conditions to identify expiring or invalid certificates.\u003cbr\u003e- Generates a clear, color-coded summary report and optionally exports findings in JSON format for automation or CI integration.\u003c/p\u003e"}, {"name": "generate", "full_name": "hcp:generate", "description": "Generate ready-to-execute hypershift cluster creation commands from natural language descriptions", "description_html": "Generate ready-to-execute hypershift cluster creation commands from natural language descriptions", "synopsis": "/hcp:generate \u003cprovider\u003e \u003ccluster-description\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003ehcp:generate\u003c/code\u003e command translates natural language descriptions into precise, ready-to-execute \u003ccode\u003ehypershift create cluster\u003c/code\u003e commands. It supports multiple cloud providers and platforms, each with their specific requirements and best practices.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImportant\u003c/strong\u003e: This command \u003cstrong\u003egenerates commands for you to run\u003c/strong\u003e - it does not provision clusters directly.\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003cbr\u003e- Generating complete, copy-paste-ready hypershift commands with proper parameters\u003cbr\u003e- Applying provider-specific best practices and configurations automatically\u003cbr\u003e- Handling complex parameter validation and smart defaults\u003cbr\u003e- Providing interactive prompts for missing critical information\u003cbr\u003e- Learning proper hypershift command syntax and options\u003c/p\u003e"}], "skills": [{"name": "hcp-create-agent", "description": "Use this skill when you need to deploy HyperShift clusters on bare metal, edge environments, or disconnected infrastructures using pre-provisioned agents", "description_html": "Use this skill when you need to deploy HyperShift clusters on bare metal, edge environments, or disconnected infrastructures using pre-provisioned agents", "meta": ""}, {"name": "hcp-create-aws", "description": "Use this skill when you need to deploy HyperShift clusters on AWS infrastructure with proper STS credentials, IAM roles, and VPC configuration", "description_html": "Use this skill when you need to deploy HyperShift clusters on AWS infrastructure with proper STS credentials, IAM roles, and VPC configuration", "meta": ""}, {"name": "hcp-create-azure", "description": "Use this skill when you need to deploy HyperShift clusters on Microsoft Azure with proper identity configuration and resource management", "description_html": "Use this skill when you need to deploy HyperShift clusters on Microsoft Azure with proper identity configuration and resource management", "meta": ""}, {"name": "hcp-create-kubevirt", "description": "Use this skill when you need to deploy HyperShift clusters on existing Kubernetes clusters using KubeVirt virtualization", "description_html": "Use this skill when you need to deploy HyperShift clusters on existing Kubernetes clusters using KubeVirt virtualization", "meta": ""}, {"name": "hcp-create-openstack", "description": "Use this skill when you need to deploy HyperShift clusters on OpenStack infrastructure with proper flavor selection and network configuration", "description_html": "Use this skill when you need to deploy HyperShift clusters on OpenStack infrastructure with proper flavor selection and network configuration", "meta": ""}, {"name": "hcp-create-powervs", "description": "Use this skill when you need to deploy HyperShift clusters on IBM Cloud PowerVS with proper processor configuration and resource management", "description_html": "Use this skill when you need to deploy HyperShift clusters on IBM Cloud PowerVS with proper processor configuration and resource management", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "openshift", "keywords": ["hypershift", "hosted-control-planes", "cluster-creation"], "author": {"name": "github.com/openshift-eng"}}, {"name": "hello-world", "description": "A hello world plugin", "version": "1.0.2", "has_readme": true, "commands": [{"name": "echo", "full_name": "hello-world:echo", "description": "Hello world plugin implementation", "description_html": "Hello world plugin implementation", "synopsis": "/hello-world:echo [name]", "body_html": "\u003cp\u003eThe \u003ccode\u003ehello-world:echo\u003c/code\u003e command prints a greeting message to the console. By default, it prints &quot;Hello world&quot;, but when provided with a name argument \u003ccode\u003ehello-world:echo $1\u003c/code\u003e, it prints &quot;Hello ${1}&quot;. This command serves as a basic example of a Claude Code plugin implementation, demonstrating the minimal structure required for a functional plugin command.\u003c/p\u003e\u003cp\u003eIt provides a reference implementation for plugin developers. It demonstrates:\u003cbr\u003e- Basic command structure\u003cbr\u003e- Shell command execution within a plugin\u003cbr\u003e- Handling arguments\u003cbr\u003e- Minimal configuration requirements\u003c/p\u003e\u003cp\u003eThe spec sections is inspired by https://man7.org/linux/man-pages/man7/man-pages.7.html#top_of_page\u003c/p\u003e"}], "skills": [], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "tooling", "keywords": ["example", "template", "hello-world"], "author": {"name": "Developer"}}, {"name": "jira", "description": "A plugin to automate tasks with Jira", "version": "0.6.0", "has_readme": true, "commands": [{"name": "backlog", "full_name": "jira:backlog", "description": "Find suitable JIRA tickets from the backlog to work on based on priority and activity", "description_html": "Find suitable JIRA tickets from the backlog to work on based on priority and activity", "synopsis": "/jira:backlog [project-key] [--assignee username] [--days-inactive N]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:backlog\u003c/code\u003e command helps identify suitable tickets from the JIRA backlog to work on by \u003cstrong\u003eintelligently analyzing\u003c/strong\u003e unassigned tickets and bot-assigned tickets. Unlike simple filtering, this command reads ticket descriptions, comments, and activity patterns to recommend the best candidates for work.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Feature:\u003c/strong\u003e The command selects \u003cstrong\u003e2 tickets from each priority level\u003c/strong\u003e (Critical, High, Normal, Low) that are \u003cstrong\u003eactually available to pick up\u003c/strong\u003e (unassigned or assigned to bots only), giving you a balanced view across all priorities so you can choose based on your expertise and preference.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImportant:\u003c/strong\u003e This command only recommends tickets that are \u003cstrong\u003eunassigned\u003c/strong\u003e or \u003cstrong\u003eassigned to bots\u003c/strong\u003e (like &quot;OCP DocsBot&quot;). Tickets assigned to real people are excluded, even if they have no recent activity, because they may already be claimed by someone.\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003cbr\u003e- Finding tickets to work on when you have available capacity\u003cbr\u003e- Identifying unassigned or abandoned tickets that need attention\u003cbr\u003e- Getting a mix of priorities to choose from (not just critical)\u003cbr\u003e- Understanding ticket context before starting work\u003c/p\u003e\u003cp\u003eHow it works:\u003cbr\u003e- Searches for unassigned tickets or tickets with no activity for 28+ days (configurable)\u003cbr\u003e- \u003cstrong\u003eFilters for availability\u003c/strong\u003e - keeps only unassigned or bot-assigned tickets\u003cbr\u003e- \u003cstrong\u003eAnalyzes ticket content\u003c/strong\u003e - reads descriptions, comments, and activity patterns\u003cbr\u003e- \u003cstrong\u003eEvaluates suitability\u003c/strong\u003e - identifies tickets that are ready vs. need verification vs. may be abandoned\u003cbr\u003e- \u003cstrong\u003eSelects intelligently\u003c/strong\u003e - chooses the most suitable 2 tickets from each priority level\u003cbr\u003e- Provides comprehensive summaries with recommendations for each ticket\u003c/p\u003e"}, {"name": "batch-categorize-activity-types", "full_name": "jira:batch-categorize-activity-types", "description": "Batch-categorize Jira issues into Activity Types using AI and apply updates via MCP", "description_html": "Batch-categorize Jira issues into Activity Types using AI and apply updates via MCP", "synopsis": "/jira:batch-categorize-activity-types \u003cproject-key\u003e [--type Epic] [--limit 100] [--jql 'AND status != Closed'] [--dry-run]", "body_html": "\u003cp\u003eFetches all Jira issues in a project that have no Activity Type set, categorizes each into one of six Sankey capacity allocation categories, validates results, generates a report, and (with user approval) applies the updates back to Jira.\u003c/p\u003e\u003cp\u003eClassification logic is shared with \u003ccode\u003e/jira:categorize-activity-type\u003c/code\u003e via the \u003ccode\u003ecategorize-activity-types\u003c/code\u003e skill.\u003c/p\u003e"}, {"name": "catch-me-up", "full_name": "jira:catch-me-up", "description": "Triage recent Jira activity \u2014 surface what needs attention, filter out noise", "description_html": "Triage recent Jira activity \u2014 surface what needs attention, filter out noise", "synopsis": "/jira:catch-me-up [14] [--days 7] [--no-cache]", "body_html": "Fetches recent activity on Jira issues where you are assignee or watcher, then classifies each event into three tiers: needs attention, unsure, or noise. Uses a map/reduce approach \u2014 fast model classifies batches in parallel, then a review pass catches cross-event patterns."}, {"name": "categorize-activity-type", "full_name": "jira:categorize-activity-type", "description": "Categorize JIRA tickets into activity types using AI", "description_html": "Categorize JIRA tickets into activity types using AI", "synopsis": "/jira:categorize-activity-type \u003cissue-key\u003e [--auto-apply]", "body_html": "Analyzes a single JIRA ticket and assigns an Activity Type category based on ticket content, issue type, labels, and parent context. Classification logic is shared with \u003ccode\u003e/jira:batch-categorize-activity-types\u003c/code\u003e via the \u003ccode\u003ecategorize-activity-types\u003c/code\u003e skill."}, {"name": "clone-from-github", "full_name": "jira:clone-from-github", "description": "Clone GitHub issues to Jira with proper formatting and linking", "description_html": "Clone GitHub issues to Jira with proper formatting and linking", "synopsis": "/jira:clone-from-github \u003cissue-number\u003e [issue-number...] [options]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:clone-from-github\u003c/code\u003e command clones one or more GitHub issues to Jira, preserving the original issue content and establishing a link between the GitHub and Jira issues. This command is useful for:\u003c/p\u003e\u003cp\u003e- Migrating GitHub issues to Jira for project tracking\u003cbr\u003e- Creating Jira tickets that track upstream GitHub issues\u003cbr\u003e- Maintaining synchronization between GitHub and Jira workflows\u003cbr\u003e- Bulk importing GitHub issues into Jira projects\u003c/p\u003e\u003cp\u003eThe command uses the \u003ca href=\"https://github.com/oceanc80/gh2jira\"\u003egh2jira utility\u003c/a\u003e to perform the cloning operation. Use \u003ccode\u003e/jira:setup-gh2jira\u003c/code\u003e to install and configure gh2jira if you haven&#x27;t already.\u003c/p\u003e"}, {"name": "create", "full_name": "jira:create", "description": "Create Jira issues (story, epic, feature, task, bug, feature-request) with proper formatting", "description_html": "Create Jira issues (story, epic, feature, task, bug, feature-request) with proper formatting", "synopsis": "/jira:create \u003ctype\u003e [project-key] \u003csummary\u003e [options]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:create\u003c/code\u003e command creates Jira issues following best practices and team-specific conventions. It supports creating stories, epics, features, tasks, bugs, and feature requests with intelligent defaults, interactive prompts, and validation.\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003cbr\u003e- Creating well-formed user stories with acceptance criteria\u003cbr\u003e- Organizing epics and features with proper hierarchy\u003cbr\u003e- Submitting bugs with complete reproduction steps\u003cbr\u003e- Capturing customer-driven feature requests with business justification\u003cbr\u003e- Maintaining consistency across team Jira practices\u003c/p\u003e"}, {"name": "create-release-note", "full_name": "jira:create-release-note", "description": "Generate bug fix release notes from Jira tickets and linked GitHub PRs", "description_html": "Generate bug fix release notes from Jira tickets and linked GitHub PRs", "synopsis": "/jira:create-release-note \u003cissue-key\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:create-release-note\u003c/code\u003e command automatically generates bug fix release notes by analyzing Jira bug tickets and their linked GitHub pull requests, then updates the Jira ticket with the generated release note content.\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003cbr\u003e- Creating consistent, well-formatted release notes across all bugs\u003cbr\u003e- Automatically extracting information from multiple sources (Jira + GitHub)\u003cbr\u003e- Saving time by analyzing PR code changes, commits, and descriptions\u003cbr\u003e- Ensuring complete release notes with Cause, Consequence, Fix, Result, and Workaround\u003c/p\u003e\u003cp\u003eThe command follows the standard release note template format and populates both the Release Note Type and Release Note Text fields in Jira.\u003c/p\u003e"}, {"name": "generate-enhancement", "full_name": "jira:generate-enhancement", "description": "Generate OpenShift enhancement proposal markdown from a Jira epic or feature", "description_html": "Generate OpenShift enhancement proposal markdown from a Jira epic or feature", "synopsis": "/jira:generate-enhancement \u003cissue-key\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:generate-enhancement\u003c/code\u003e command generates an OpenShift enhancement proposal markdown file based on a Jira epic or feature. It fetches the feature details, analyzes the content, and creates an enhancement document following the OpenShift enhancement template structure.\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003cbr\u003e- Converting strategic Jira features or epics into formal enhancement proposals\u003cbr\u003e- Bootstrapping enhancement documents with epic/feature context\u003cbr\u003e- Maintaining consistency between Jira planning and enhancement documentation\u003cbr\u003e- Accelerating the enhancement proposal writing process\u003c/p\u003e"}, {"name": "generate-feature-doc", "full_name": "jira:generate-feature-doc", "description": "Generate comprehensive feature documentation from Jira feature and all related issues and PRs", "description_html": "Generate comprehensive feature documentation from Jira feature and all related issues and PRs", "synopsis": "/jira:generate-feature-doc \u003cfeature-key\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:generate-feature-doc\u003c/code\u003e command generates comprehensive feature documentation by recursively analyzing a Jira feature ticket and all its related issues, sub-tasks, and linked GitHub pull requests.\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003cbr\u003e- Creating complete feature documentation after implementation\u003cbr\u003e- Understanding the full scope and implementation details of a feature\u003cbr\u003e- Generating onboarding materials for new team members\u003cbr\u003e- Creating technical design documents from actual implementation\u003cbr\u003e- Documenting complex features with multiple related issues and PRs\u003c/p\u003e\u003cp\u003eThe command performs deep analysis of:\u003cbr\u003e- The main feature issue and all related Jira tickets (recursively)\u003cbr\u003e- All linked GitHub PRs, commits, and code changes\u003cbr\u003e- Design decisions captured in PR discussions and code reviews\u003cbr\u003e- Implementation details from actual code changes\u003c/p\u003e"}, {"name": "generate-test-plan", "full_name": "jira:generate-test-plan", "description": "Generate test steps for a JIRA issue", "description_html": "Generate test steps for a JIRA issue", "synopsis": "/jira:generate-test-plan [JIRA issue key] [GitHub PR URLs]", "body_html": "\u003cp\u003eThe &#x27;jira:generate-test-plan&#x27; command takes a JIRA issue key and optionally a list of PR URLs. It fetches the JIRA issue details, retrieves all related PRs (or uses the provided PR list), analyzes the changes, and generates a comprehensive manual testing guide.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJIRA Issue Test Guide Generator\u003c/strong\u003e\u003c/p\u003e"}, {"name": "grooming", "full_name": "jira:grooming", "description": "Analyze new bugs and cards added over a time period and generate grooming meeting agenda", "description_html": "Analyze new bugs and cards added over a time period and generate grooming meeting agenda", "synopsis": "/jira:grooming [project-filter] [time-period] [--component component-name] [--label label-name] [--type issue-type] [--status status] [--story-points]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:grooming\u003c/code\u003e command helps teams prepare for backlog grooming meetings. It automatically collects bugs and user stories created within a specified time period OR assigned to a specific sprint, analyzes their priority, complexity, and dependencies, and generates structured grooming meeting agendas.\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003cbr\u003e- Backlog organization before sprint planning\u003cbr\u003e- Sprint-specific grooming sessions\u003cbr\u003e- Sprint-specific grooming sessions with story point summaries\u003cbr\u003e- Sprint retrospectives analyzing completed work\u003cbr\u003e- Regular requirement grooming meetings\u003cbr\u003e- Priority assessment of new bugs\u003cbr\u003e- Technical debt organization and planning\u003c/p\u003e"}, {"name": "issues-by-component", "full_name": "jira:issues-by-component", "description": "List and analyze JIRA issues organized by component with flexible filtering", "description_html": "List and analyze JIRA issues organized by component with flexible filtering", "synopsis": "/jira:issues-by-component \u003cproject-key\u003e [time-period] [--component component-name] [--assignee username] [--reporter username] [--status status] [--search search-term] [--search-description]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:issues-by-component\u003c/code\u003e command provides a comprehensive view of JIRA issues organized by component. It supports two modes of operation:\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eOverview Mode\u003c/strong\u003e (no \u003ccode\u003e--component\u003c/code\u003e flag): Lists all components with high-level statistics\u003cbr\u003e2. \u003cstrong\u003eDetail Mode\u003c/strong\u003e (\u003ccode\u003e--component\u003c/code\u003e specified): Shows detailed issue information for a specific component\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003cbr\u003e- Understanding component-level workload distribution\u003cbr\u003e- Finding issues by component and user assignment\u003cbr\u003e- Identifying component-specific patterns or problems\u003cbr\u003e- Sprint/release planning by component\u003cbr\u003e- Searching for specific issues within component contexts\u003cbr\u003e- Team capacity planning and workload analysis\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Features:\u003c/strong\u003e\u003cbr\u003e- \u003cstrong\u003eComponent organization\u003c/strong\u003e - Issues grouped by JIRA component\u003cbr\u003e- \u003cstrong\u003eFlexible time filtering\u003c/strong\u003e - Filter by creation date or update date\u003cbr\u003e- \u003cstrong\u003eUser filtering\u003c/strong\u003e - Filter by assignee or reporter\u003cbr\u003e- \u003cstrong\u003eStatus filtering\u003c/strong\u003e - Focus on specific workflow states\u003cbr\u003e- \u003cstrong\u003eText search\u003c/strong\u003e - Find issues by keywords in summary or description\u003cbr\u003e- \u003cstrong\u003eDual-mode output\u003c/strong\u003e - Overview or detailed views based on your needs\u003c/p\u003e"}, {"name": "ready-to-solve", "full_name": "jira:ready-to-solve", "description": "Check whether a Jira issue is well-groomed and ready for /jira:solve", "description_html": "Check whether a Jira issue is well-groomed and ready for /jira:solve", "synopsis": "/jira:ready-to-solve \u003cjira-issue-key\u003e [--dry-run] [--verbose] [--fix]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:ready-to-solve\u003c/code\u003e command checks whether a Jira issue has sufficient grooming for \u003ccode\u003e/jira:solve\u003c/code\u003e to produce a quality solution.\u003c/p\u003e\u003cp\u003eIt runs a two-phase validation:\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eDeterministic checks\u003c/strong\u003e via a Python script that verifies structural requirements: required sections exist, are non-empty, have adequate content, and contain no placeholder text.\u003cbr\u003e2. \u003cstrong\u003eAI qualitative assessment\u003c/strong\u003e that evaluates whether the acceptance criteria are specific and testable, whether there is enough implementation context, and whether clear success/failure conditions exist.\u003c/p\u003e\u003cp\u003eOn pass, the label \u003ccode\u003eready-to-solve\u003c/code\u003e is added to the issue. On fail, \u003ccode\u003enot-ready-to-solve\u003c/code\u003e is added. The stale opposite label is removed if present.\u003c/p\u003e\u003cp\u003eWith \u003ccode\u003e--fix\u003c/code\u003e, when validation fails the command generates a revised description that adds or improves the failing sections, shows the proposed changes to the user for approval, and updates the Jira issue description upon confirmation. After fixing, validation is re-run to confirm the issue now passes.\u003c/p\u003e"}, {"name": "reconcile-github", "full_name": "jira:reconcile-github", "description": "Reconcile state mismatches between GitHub and Jira issues", "description_html": "Reconcile state mismatches between GitHub and Jira issues", "synopsis": "/jira:reconcile-github [options]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:reconcile-github\u003c/code\u003e command identifies and reports state mismatches between linked GitHub and Jira issues according to a configurable state mapping. This command is useful for:\u003c/p\u003e\u003cp\u003e- Ensuring Jira issues stay synchronized with their linked GitHub issues\u003cbr\u003e- Identifying issues that need status updates\u003cbr\u003e- Maintaining workflow consistency between GitHub and Jira\u003cbr\u003e- Auditing cross-platform issue tracking accuracy\u003c/p\u003e\u003cp\u003eThe command uses the \u003ca href=\"https://github.com/oceanc80/gh2jira\"\u003egh2jira utility\u003c/a\u003e to perform the reconciliation. Use \u003ccode\u003e/jira:setup-gh2jira\u003c/code\u003e to install and configure gh2jira if you haven&#x27;t already.\u003c/p\u003e"}, {"name": "setup-gh2jira", "full_name": "jira:setup-gh2jira", "description": "Install and configure the gh2jira utility with all required tools and credentials", "description_html": "Install and configure the gh2jira utility with all required tools and credentials", "synopsis": "/jira:setup-gh2jira", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:setup-gh2jira\u003c/code\u003e command guides you through the complete installation and configuration of the \u003ca href=\"https://github.com/oceanc80/gh2jira\"\u003egh2jira utility\u003c/a\u003e, which enables cloning and reconciling GitHub issues with Jira. This command:\u003c/p\u003e\u003cp\u003e- Checks for and installs required dependencies (Go)\u003cbr\u003e- Clones and builds the gh2jira utility\u003cbr\u003e- Guides you through creating GitHub and Jira API Tokens\u003cbr\u003e- Creates and configures \u003ccode\u003etokenstore.yaml\u003c/code\u003e with your credentials\u003cbr\u003e- Optionally creates \u003ccode\u003eprofiles.yaml\u003c/code\u003e for project shortcuts\u003cbr\u003e- Creates default \u003ccode\u003eworkflows.yaml\u003c/code\u003e for state mapping\u003cbr\u003e- Adds gh2jira to your PATH for easy access\u003c/p\u003e"}, {"name": "solve", "full_name": "jira:solve", "description": "Analyze a JIRA issue and create a pull request to solve it.", "description_html": "Analyze a JIRA issue and create a pull request to solve it.", "synopsis": "/jira:solve \u003cjira-issue-id\u003e [remote] [--ci]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:solve\u003c/code\u003e command analyzes a JIRA issue and creates a pull request to solve it.\u003c/p\u003e\u003cp\u003eThis command takes a JIRA URL, fetches the issue description and requirements, analyzes the codebase to understand how to implement the solution, and creates a comprehensive pull request with the necessary changes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUsage Examples:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eSolve a specific JIRA issue\u003c/strong\u003e:\u003cbr\u003e   ``\u003ccode\u003e\u003cbr\u003e   /jira:solve OCPBUGS-12345 origin\u003cbr\u003e   \u003c/code\u003e``\u003c/p\u003e"}, {"name": "status-rollup", "full_name": "jira:status-rollup", "description": "Generate a status rollup comment for any JIRA issue based on all child issues and a given date range", "description_html": "Generate a status rollup comment for any JIRA issue based on all child issues and a given date range", "synopsis": "/jira:status-rollup issue-id [--start-date YYYY-MM-DD] [--end-date YYYY-MM-DD]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:status-rollup\u003c/code\u003e command generates a comprehensive status rollup for any JIRA issue (Feature, Epic, Story, etc.) by recursively analyzing all child issues and their activity within a specified date range. The command intelligently extracts insights from changelogs and comments to create a concise, well-formatted status summary that can be reviewed and refined before being posted to Jira.\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003cbr\u003e- Weekly status updates on Features or Epics\u003cbr\u003e- Sprint retrospectives and planning\u003cbr\u003e- Executive summaries of complex work hierarchies\u003cbr\u003e- Identifying blockers and risks across multiple issues\u003c/p\u003e\u003cp\u003eKey capabilities:\u003cbr\u003e- Recursively traverses entire issue hierarchies (any depth) via \u003ccode\u003eparent = KEY\u003c/code\u003e BFS\u003cbr\u003e- Analyzes status transitions, assignee changes, and priority shifts\u003cbr\u003e- Extracts blockers, risks, and completion insights from comments\u003cbr\u003e- Generates valid Jira markdown with nested bullets\u003cbr\u003e- Caches all data in a temp file for fast iterative refinement\u003cbr\u003e- Allows review and modification before posting to Jira\u003c/p\u003e\u003cp\u003eThis command uses the \u003cstrong\u003eStatus Analysis Engine\u003c/strong\u003e skill for core analysis logic. See \u003ccode\u003eplugins/jira/skills/status-analysis/SKILL.md\u003c/code\u003e for detailed implementation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIMPORTANT - Skill Loading Requirement:\u003c/strong\u003e\u003cbr\u003eBefore processing any issues, you MUST invoke \u003ccode\u003eSkill(jira:status-analysis)\u003c/code\u003e to load the Status Analysis Engine skill. This ensures proper use of \u003ccode\u003eparent = KEY\u003c/code\u003e BFS for hierarchy traversal and consistent analysis methodology. Do NOT rely on conversation summaries or memory - always load the skill explicitly at the start of execution.\u003c/p\u003e"}, {"name": "update-weekly-status", "full_name": "jira:update-weekly-status", "description": "Update weekly status summaries for Jira issues with component and user filtering", "description_html": "Update weekly status summaries for Jira issues with component and user filtering", "synopsis": "/jira:update-weekly-status [project-key] [--component \u003ccomponent-name\u003e] [--label \u003clabel-name\u003e] [user-filters...]", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:update-weekly-status\u003c/code\u003e command automates the process of updating weekly status summaries for Jira issues in a specified project. It analyzes recent activity across tickets, GitHub PRs, and GitLab MRs to draft color-coded status updates (Red/Yellow/Green), then allows you to review and modify them before updating Jira.\u003c/p\u003e\u003cp\u003eThis command is particularly useful for:\u003c/p\u003e\u003cp\u003e- Weekly status updates on strategic issues\u003cbr\u003e- Team lead status reporting workflows\u003cbr\u003e- Consistent formatting across status updates\u003cbr\u003e- Reducing manual effort in gathering context from multiple sources\u003c/p\u003e\u003cp\u003eKey capabilities:\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eEfficient batch data gathering\u003c/strong\u003e using async Python script\u003cbr\u003e- Interactive component selection from available project components\u003cbr\u003e- User filtering by email or display name (with auto-resolution)\u003cbr\u003e- Intelligent activity analysis using \u003ccode\u003eparent = KEY\u003c/code\u003e JQL for full hierarchy traversal (Atlassian Cloud compatible)\u003cbr\u003e- GitHub PR and GitLab MR integration via external links\u003cbr\u003e- Recent update warnings to prevent duplicate updates\u003cbr\u003e- Batch processing with selective skip options\u003cbr\u003e- Formatted status summaries with color-coded health indicators (Red/Yellow/Green)\u003c/p\u003e\u003cp\u003eThis command uses the \u003cstrong\u003eStatus Analysis Engine\u003c/strong\u003e skill for core analysis logic. See \u003ccode\u003eplugins/jira/skills/status-analysis/SKILL.md\u003c/code\u003e for detailed implementation.\u003c/p\u003e\u003cp\u003e[Extended thinking: This command streamlines weekly status update workflows by first gathering all data efficiently using an async Python script, then processing each issue with focused LLM context. This two-phase approach minimizes API calls and ensures consistent, high-quality analysis.]\u003c/p\u003e"}, {"name": "validate-blockers", "full_name": "jira:validate-blockers", "description": "Validate proposed release blockers using Red Hat OpenShift release blocker criteria", "description_html": "Validate proposed release blockers using Red Hat OpenShift release blocker criteria", "synopsis": "```\n/jira:validate-blockers [target-version] [component-filter] [--bug issue-key]\n```\n\n**Note**: `target-version` is required unless `--bug` is provided.", "body_html": "\u003cp\u003eThe \u003ccode\u003ejira:validate-blockers\u003c/code\u003e command helps release managers make data-driven decisions on proposed release blockers. It analyzes bugs with &quot;Release Blocker = Proposed&quot; status using Red Hat OpenShift release blocker criteria and provides clear APPROVE/REJECT/DISCUSS recommendations with detailed justification.\u003c/p\u003e\u003cp\u003eThis command is essential for:\u003cbr\u003e- Validating proposed release blockers\u003cbr\u003e- Making blocker approval/rejection decisions\u003cbr\u003e- Understanding why a bug should or shouldn&#x27;t block a release\u003cbr\u003e- Reviewing blocker criteria compliance\u003c/p\u003e"}], "skills": [{"name": "catch-me-up", "description": "Gather and classify recent Jira activity to surface what needs attention", "description_html": "Gather and classify recent Jira activity to surface what needs attention", "meta": ""}, {"name": "categorize-activity-types", "description": "Categorize Jira issues into Red Hat Sankey Activity Type categories using MCP Jira tools. Supports single-issue and batch modes. Use when the user wants to categorize or set activity types on Jira issues, or mentions activity types, work types, Sankey, or capacity allocation.", "description_html": "Categorize Jira issues into Red Hat Sankey Activity Type categories using MCP Jira tools. Supports single-issue and batch modes. Use when the user wants to categorize or set activity types on Jira issues, or mentions activity types, work types, Sankey, or capacity allocation.", "meta": ""}, {"name": "cntrlplane", "description": "Jira conventions for the CNTRLPLANE project used by OpenShift teams", "description_html": "Jira conventions for the CNTRLPLANE project used by OpenShift teams", "meta": ""}, {"name": "create-bug", "description": "Implementation guide for creating well-formed Jira bug reports", "description_html": "Implementation guide for creating well-formed Jira bug reports", "meta": ""}, {"name": "create-epic", "description": "Implementation guide for creating Jira epics with proper scope and parent linking", "description_html": "Implementation guide for creating Jira epics with proper scope and parent linking", "meta": ""}, {"name": "create-feature", "description": "Implementation guide for creating Jira features representing strategic objectives and market problems", "description_html": "Implementation guide for creating Jira features representing strategic objectives and market problems", "meta": ""}, {"name": "create-feature-request", "description": "Implementation guide for creating Feature Requests in the RFE project", "description_html": "Implementation guide for creating Feature Requests in the RFE project", "meta": ""}, {"name": "create-release-note", "description": "Detailed implementation guide for generating bug fix release notes from Jira and GitHub PRs", "description_html": "Detailed implementation guide for generating bug fix release notes from Jira and GitHub PRs", "meta": ""}, {"name": "create-story", "description": "Implementation guide for creating well-formed Jira user stories with acceptance criteria", "description_html": "Implementation guide for creating well-formed Jira user stories with acceptance criteria", "meta": ""}, {"name": "create-task", "description": "Implementation guide for creating Jira tasks for technical and operational work", "description_html": "Implementation guide for creating Jira tasks for technical and operational work", "meta": ""}, {"name": "extract-prs", "description": "Recursively extract GitHub Pull Request links from Jira issues", "description_html": "Recursively extract GitHub Pull Request links from Jira issues", "meta": ""}, {"name": "gcp-hcp", "description": "GCP HCP team-specific Jira requirements for creating issues in the GCP project (Hypershift on GKE)", "description_html": "GCP HCP team-specific Jira requirements for creating issues in the GCP project (Hypershift on GKE)", "meta": ""}, {"name": "generate-enhancement", "description": "Generate OpenShift enhancement proposal markdown from Jira epic or feature content", "description_html": "Generate OpenShift enhancement proposal markdown from Jira epic or feature content", "meta": ""}, {"name": "hypershift", "description": "HyperShift team-specific Jira requirements for component selection and conventions", "description_html": "HyperShift team-specific Jira requirements for component selection and conventions", "meta": ""}, {"name": "jira-doc-generator", "description": "Detailed implementation guide for recursively analyzing Jira features and generating comprehensive documentation", "description_html": "Detailed implementation guide for recursively analyzing Jira features and generating comprehensive documentation", "meta": ""}, {"name": "jira-issues-by-component", "description": "Provides secure curl wrapper for the jira:issues-by-component command to prevent token exposure", "description_html": "Provides secure curl wrapper for the jira:issues-by-component command to prevent token exposure", "meta": ""}, {"name": "jira-validate-blockers", "description": "Detailed implementation guide for validating proposed release blockers", "description_html": "Detailed implementation guide for validating proposed release blockers", "meta": ""}, {"name": "ocpbugs", "description": "Jira conventions and bug templates for the OCPBUGS project", "description_html": "Jira conventions and bug templates for the OCPBUGS project", "meta": ""}, {"name": "ready-to-solve", "description": "Detailed implementation guide for checking Jira issue readiness for /jira:solve", "description_html": "Detailed implementation guide for checking Jira issue readiness for /jira:solve", "meta": ""}, {"name": "status-analysis", "description": "Shared engine for analyzing Jira issue activity and generating status summaries", "description_html": "Shared engine for analyzing Jira issue activity and generating status summaries", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [{"name": "atlassian", "type": "http", "endpoint": "https://mcp.atlassian.com/v1/mcp", "source": ".mcp.json"}], "rules": [], "category": "productivity", "keywords": ["jira", "tickets", "issues", "project-management"], "author": {"name": "github.com/openshift-eng"}}, {"name": "marketplace-ops", "description": "Maintenance commands for Claude Code plugin marketplaces", "version": "0.1.2", "has_readme": true, "commands": [{"name": "prune", "full_name": "marketplace-ops:prune", "description": "Analyze and prune stale plugins, commands, and skills from the marketplace", "description_html": "Analyze and prune stale plugins, commands, and skills from the marketplace", "synopsis": "/marketplace-ops:prune [--dry-run]", "body_html": "\u003cp\u003eAnalyzes the plugin marketplace for stale content using a two-tier system:\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003ePlugin-level (mechanical):\u003c/strong\u003e A scoring script flags entire plugins for removal based on git history and structural signals. If a plugin meets the scoring threshold, it is removed \u2014 no LLM override. The script is the decision-maker.\u003cbr\u003e2. \u003cstrong\u003eItem-level (LLM-assisted):\u003c/strong\u003e For plugins that survive the plugin-level cut, a second script flags individual commands and skills. The LLM then reviews flagged items and applies qualitative judgment (AI reasoning required, duplicates, dead references) to decide which to remove.\u003c/p\u003e\u003cp\u003eBy default, creates a branch removing identified items and opens a PR with a removal manifest and \u003ccode\u003e/save\u003c/code\u003e workflow. With \u003ccode\u003e--dry-run\u003c/code\u003e, prints the analysis report without taking action.\u003c/p\u003e"}, {"name": "prune-update", "full_name": "marketplace-ops:prune-update", "description": "Process /save and /drop comments on a pruning PR, restore or remove items, and update .pruneprotect", "description_html": "Process /save and /drop comments on a pruning PR, restore or remove items, and update .pruneprotect", "synopsis": "/marketplace-ops:prune-update [PR number or URL]", "body_html": "\u003cp\u003eReads comments on a pruning PR to find \u003ccode\u003e/save &lt;path&gt;\u003c/code\u003e and \u003ccode\u003e/drop &lt;path&gt;\u003c/code\u003e directives.\u003c/p\u003e\u003cp\u003eFor each \u003cstrong\u003esaved\u003c/strong\u003e item:\u003cbr\u003e1. Restores the files from the base branch.\u003cbr\u003e2. Adds the path to \u003ccode\u003e.pruneprotect\u003c/code\u003e permanently, with a comment noting who requested it and when.\u003cbr\u003e3. Pushes a new commit to the PR branch (never force-pushes).\u003cbr\u003e4. Updates the PR body to mark saved items.\u003c/p\u003e\u003cp\u003eFor each \u003cstrong\u003edropped\u003c/strong\u003e item:\u003cbr\u003e1. If the item was previously \u003ccode\u003e/save\u003c/code\u003ed: removes its files again, removes it from \u003ccode\u003e.pruneprotect\u003c/code\u003e.\u003cbr\u003e2. If the item is a new addition (not in the original manifest): removes its files and adds a new row to the manifest.\u003cbr\u003e3. For surviving plugins that lose commands or skills, bumps the patch version in \u003ccode\u003eplugin.json\u003c/code\u003e.\u003cbr\u003e4. Pushes a new commit to the PR branch (never force-pushes).\u003cbr\u003e5. Updates the PR body to reflect the drop.\u003c/p\u003e"}], "skills": [], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "tooling", "keywords": ["marketplace", "plugins", "maintenance"], "author": {"name": "github.com/openshift-eng"}}, {"name": "must-gather", "description": "A plugin to analyze and report on must-gather data", "version": "0.0.2", "has_readme": true, "commands": [{"name": "analyze", "full_name": "must-gather:analyze", "description": "Quick analysis of must-gather data - runs all analysis scripts and provides comprehensive cluster diagnostics", "description_html": "Quick analysis of must-gather data - runs all analysis scripts and provides comprehensive cluster diagnostics", "synopsis": "/must-gather:analyze [must-gather-path] [component]", "body_html": "\u003cp\u003eThe \u003ccode\u003eanalyze\u003c/code\u003e command performs comprehensive analysis of OpenShift must-gather diagnostic data. It runs specialized Python analysis scripts to extract and summarize cluster health information across multiple components.\u003c/p\u003e\u003cp\u003eThe command can analyze:\u003cbr\u003e- Cluster version and update status\u003cbr\u003e- Cluster operator health (degraded, progressing, unavailable)\u003cbr\u003e- Node conditions and resource status\u003cbr\u003e- Pod failures, restarts, and crash loops\u003cbr\u003e- Network configuration and OVN health\u003cbr\u003e- OVN databases - logical topology, ACLs, pods\u003cbr\u003e- Kubernetes events (warnings and errors)\u003cbr\u003e- etcd cluster health and quorum status\u003cbr\u003e- Persistent volume and claim status\u003cbr\u003e- Prometheus alerts\u003c/p\u003e\u003cp\u003eYou can request analysis of the entire cluster or focus on a specific component.\u003c/p\u003e"}, {"name": "ovn-dbs", "full_name": "must-gather:ovn-dbs", "description": "Analyze OVN databases from a must-gather using ovsdb-tool", "description_html": "Analyze OVN databases from a must-gather using ovsdb-tool", "synopsis": "/must-gather:ovn-dbs [must-gather-path] [--node \u003cnode-name\u003e] [--query \u003cjson\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eovn-dbs\u003c/code\u003e command analyzes OVN Northbound and Southbound databases collected from clusters. It uses \u003ccode\u003eovsdb-tool\u003c/code\u003e to query the binary database files (\u003ccode\u003e.db\u003c/code\u003e) collected per-node, providing detailed information about the logical network topology, pods, ACLs, and routers on each node.\u003c/p\u003e\u003cp\u003eThe command automatically maps ovnkube pods to their corresponding nodes by reading pod specifications from the must-gather data.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTwo modes of operation:\u003c/strong\u003e\u003cbr\u003e1. \u003cstrong\u003eStandard Analysis\u003c/strong\u003e (default): Runs pre-built analysis showing switches, ports, ACLs, and routers\u003cbr\u003e2. \u003cstrong\u003eQuery Mode\u003c/strong\u003e (\u003ccode\u003e--query\u003c/code\u003e): Run custom OVSDB JSON queries for specific data extraction\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat it analyzes:\u003c/strong\u003e\u003cbr\u003e- \u003cstrong\u003ePer-zone logical network topology\u003c/strong\u003e\u003cbr\u003e- \u003cstrong\u003eLogical Switches\u003c/strong\u003e and their ports\u003cbr\u003e- \u003cstrong\u003ePod Logical Switch Ports\u003c/strong\u003e with namespace, pod name, and IP addresses\u003cbr\u003e- \u003cstrong\u003eAccess Control Lists (ACLs)\u003c/strong\u003e with priorities, directions, and match rules\u003cbr\u003e- \u003cstrong\u003eLogical Routers\u003c/strong\u003e and their ports\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImportant:\u003c/strong\u003e This command only works with must-gathers from clusters, where each node/zone has its own database files.\u003c/p\u003e"}, {"name": "windows", "full_name": "must-gather:windows", "description": "Analyze Windows node logs and issues in must-gather data", "description_html": "Analyze Windows node logs and issues in must-gather data", "synopsis": "/must-gather:windows [must-gather-path] [--component COMPONENT] [--errors-only]", "body_html": "\u003cp\u003eThe \u003ccode\u003emust-gather:windows\u003c/code\u003e command analyzes Windows-specific logs collected during must-gather from Windows nodes in OpenShift clusters. It parses logs from Windows-specific components and identifies common Windows node issues.\u003c/p\u003e\u003cp\u003eThis command analyzes logs from:\u003cbr\u003e- \u003cstrong\u003ekube-proxy\u003c/strong\u003e - Windows networking service\u003cbr\u003e- \u003cstrong\u003ehybrid-overlay\u003c/strong\u003e - OVN-Kubernetes hybrid networking (Linux-Windows pod communication)\u003cbr\u003e- \u003cstrong\u003ekubelet\u003c/strong\u003e - Windows node agent\u003cbr\u003e- \u003cstrong\u003econtainerd\u003c/strong\u003e - Container runtime for Windows\u003cbr\u003e- \u003cstrong\u003eWICD\u003c/strong\u003e - Windows Instance Config Daemon (node configuration)\u003cbr\u003e- \u003cstrong\u003ecsi-proxy\u003c/strong\u003e - Storage plugin for Windows\u003c/p\u003e\u003cp\u003eUse this command when:\u003cbr\u003e- Troubleshooting Windows node issues\u003cbr\u003e- Investigating Windows pod failures\u003cbr\u003e- Analyzing Windows container runtime problems\u003cbr\u003e- Debugging hybrid-overlay networking issues\u003cbr\u003e- Reviewing HNS (Host Network Service) failures\u003c/p\u003e"}], "skills": [{"name": "must-gather-analyzer", "description": "Analyze OpenShift must-gather diagnostic data including cluster operators, pods, nodes,\nand network components. Use this skill when the user asks about cluster health, operator status,\npod issues, node conditions, or wants diagnostic insights from must-gather data.\n\nTriggers: \"analyze must-gather\", \"check cluster health\", \"operator status\", \"pod issues\",\n\"node status\", \"failing pods\", \"degraded operators\", \"cluster problems\", \"crashlooping\",\n\"network issues\", \"etcd health\", \"analyze clusteroperators\", \"analyze pods\", \"analyze nodes\"\n", "description_html": "\u003cp\u003eAnalyze OpenShift must-gather diagnostic data including cluster operators, pods, nodes,\u003cbr\u003eand network components. Use this skill when the user asks about cluster health, operator status,\u003cbr\u003epod issues, node conditions, or wants diagnostic insights from must-gather data.\u003c/p\u003e\u003cp\u003eTriggers: &quot;analyze must-gather&quot;, &quot;check cluster health&quot;, &quot;operator status&quot;, &quot;pod issues&quot;,\u003cbr\u003e&quot;node status&quot;, &quot;failing pods&quot;, &quot;degraded operators&quot;, &quot;cluster problems&quot;, &quot;crashlooping&quot;,\u003cbr\u003e&quot;network issues&quot;, &quot;etcd health&quot;, &quot;analyze clusteroperators&quot;, &quot;analyze pods&quot;, &quot;analyze nodes&quot;\u003c/p\u003e", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "debugging", "keywords": ["must-gather", "diagnostics", "cluster-analysis"], "author": {"name": "openshift"}}, {"name": "node", "description": "Kubernetes and OpenShift node health monitoring and diagnostics", "version": "0.0.3", "has_readme": true, "commands": [{"name": "cluster-node-health-check", "full_name": "node:cluster-node-health-check", "description": "Perform comprehensive health check on cluster nodes and report kubelet, CRI-O, and node-level issues", "description_html": "Perform comprehensive health check on cluster nodes and report kubelet, CRI-O, and node-level issues", "synopsis": "/node:cluster-node-health-check [--node \u003cnode-name\u003e] [--verbose] [--output-format json|text]", "body_html": "\u003cp\u003eThe \u003ccode\u003e/node:cluster-node-health-check\u003c/code\u003e command performs an extensive diagnostic of Kubernetes/OpenShift cluster nodes to assess their operational health, stability, and performance. It automates the validation of node-level components including kubelet, CRI-O container runtime, system resources, and node conditions to ensure nodes are functioning as expected.\u003c/p\u003e\u003cp\u003eThe command runs a comprehensive set of health checks covering node status, kubelet health, container runtime (CRI-O) operations, resource utilization, system daemons, and kernel parameters. It also detects degraded states, disk/memory pressure, network issues, and recent warning events.\u003c/p\u003e\u003cp\u003eSpecifically, it performs the following:\u003c/p\u003e\u003cp\u003e- Detects and validates the availability of oc or kubectl CLI tools and verifies cluster connectivity.\u003cbr\u003e- Checks all node statuses (Ready, MemoryPressure, DiskPressure, PIDPressure, NetworkUnavailable) and reports any abnormal conditions with detailed reasons and messages.\u003cbr\u003e- Validates kubelet service health on each node, detecting service failures, high restart counts, and configuration issues.\u003cbr\u003e- Performs CRI-O runtime health checks to ensure the CRI-O service is active, responsive, and free of runtime errors.\u003cbr\u003e- Inspects resource utilization including CPU, memory, disk space, and process/pod counts against allocatable resources.\u003cbr\u003e- Evaluates system daemon health (systemd services) critical for node operations.\u003cbr\u003e- Examines kernel parameters and system tunables relevant to Kubernetes operations.\u003cbr\u003e- Scans for recent warning events at the node level and for pods running on nodes.\u003cbr\u003e- Reviews certificate validity for kubelet client certificates.\u003cbr\u003e- Identifies node taints, labels, and scheduling constraints that may affect workload placement.\u003cbr\u003e- Generates a clear, color-coded summary report and optionally exports findings in JSON format for automation or CI integration.\u003c/p\u003e"}], "skills": [], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "debugging", "keywords": ["nodes", "health", "kubernetes", "diagnostics"], "author": {"name": "github.com/openshift-eng"}}, {"name": "node-cve", "description": "CVE triage for OpenShift Node team components", "version": "0.0.1", "has_readme": true, "commands": [{"name": "triage", "full_name": "node-cve:triage", "description": "Triage all open CVEs for OpenShift Node team components with reachability analysis", "description_html": "Triage all open CVEs for OpenShift Node team components with reachability analysis", "synopsis": "/node-cve:triage [--component \"Node / CRI-O\"] [--notify-jira] [--notify-slack] [--days 7]", "body_html": "\u003cp\u003eQueries all open CVE vulnerability issues in OCPBUGS for Node team components, deduplicates across version trackers, clones affected repositories, and analyzes source code for CVE reachability. Optionally posts analysis comments to Jira trackers and sends a Slack summary.\u003c/p\u003e\u003cp\u003eDesigned for both interactive use and headless execution via \u003ccode\u003eclaude --print\u003c/code\u003e.\u003c/p\u003e"}], "skills": [{"name": "analyze-cve-repos", "description": "Analyze CVE reachability against downstream repository forks at version-specific release branches", "description_html": "Analyze CVE reachability against downstream repository forks at version-specific release branches", "meta": ""}, {"name": "query-open-cves", "description": "Query and deduplicate open CVE vulnerability issues from OCPBUGS for Node team components", "description_html": "Query and deduplicate open CVE vulnerability issues from OCPBUGS for Node team components", "meta": ""}, {"name": "report-findings", "description": "Generate triage reports and post findings to Jira and Slack", "description_html": "Generate triage reports and post findings to Jira and Slack", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": []}, {"name": "node-tuning", "description": "Automatically create and apply tuned profile", "version": "1.0.1", "has_readme": true, "commands": [{"name": "analyze-node-tuning", "full_name": "node-tuning:analyze-node-tuning", "description": "Analyze kernel/sysctl tuning from a live node or sosreport snapshot and propose NTO recommendations", "description_html": "Analyze kernel/sysctl tuning from a live node or sosreport snapshot and propose NTO recommendations", "synopsis": "/node-tuning:analyze-node-tuning [--sosreport PATH] [--collect-sosreport|--no-collect-sosreport] [--sosreport-output PATH] [--node NODE] [--kubeconfig PATH] [--oc-binary PATH] [--format json|markdown] [--max-irq-samples N] [--keep-snapshot]", "body_html": "\u003cp\u003eThe \u003ccode\u003enode-tuning:analyze-node-tuning\u003c/code\u003e command inspects kernel tuning signals gathered from either a live OpenShift node (\u003ccode\u003e/proc\u003c/code\u003e, \u003ccode\u003e/sys\u003c/code\u003e), an \u003ccode\u003eoc debug node/&lt;name&gt;\u003c/code\u003e snapshot captured via KUBECONFIG, or an extracted sosreport directory. It parses CPU isolation parameters, IRQ affinity, huge page allocation, critical sysctl settings, and networking counters before compiling actionable recommendations that can be enforced through Tuned profiles or MachineConfig updates.\u003c/p\u003e\u003cp\u003eUse this command when you need to:\u003cbr\u003e- Audit a node for tuning regressions after upgrades or configuration changes.\u003cbr\u003e- Translate findings into remediation steps for the Node Tuning Operator.\u003cbr\u003e- Produce JSON or Markdown reports suitable for incident response, CI gates, or documentation.\u003c/p\u003e"}, {"name": "generate-tuned-profile", "full_name": "node-tuning:generate-tuned-profile", "description": "Generate a Tuned (tuned.openshift.io/v1) profile manifest for the Node Tuning Operator", "description_html": "Generate a Tuned (tuned.openshift.io/v1) profile manifest for the Node Tuning Operator", "synopsis": "/node-tuning:generate-tuned-profile [profile-name] [--summary TEXT] [--include VALUE ...] [--sysctl KEY=VALUE ...] [--match-label KEY[=VALUE] ...] [options]", "body_html": "\u003cp\u003eThe \u003ccode\u003enode-tuning:generate-tuned-profile\u003c/code\u003e command streamlines creation of \u003ccode\u003etuned.openshift.io/v1\u003c/code\u003e manifests for the OpenShift Node Tuning Operator. It captures the desired Tuned profile metadata, tuned daemon configuration blocks (e.g. \u003ccode\u003e[sysctl]\u003c/code\u003e, \u003ccode\u003e[variables]\u003c/code\u003e, \u003ccode\u003e[bootloader]\u003c/code\u003e), and recommendation rules, then invokes the helper script at \u003ccode\u003eplugins/node-tuning/skills/scripts/generate_tuned_profile.py\u003c/code\u003e to render a ready-to-apply YAML file.\u003c/p\u003e\u003cp\u003eUse this command whenever you need to:\u003cbr\u003e- Bootstrap a new Tuned custom profile targeting selected nodes or machine config pools\u003cbr\u003e- Generate manifests that can be version-controlled alongside other automation\u003cbr\u003e- Iterate on sysctl, bootloader, or service parameters without hand-editing multi-line YAML\u003c/p\u003e\u003cp\u003eThe generated manifest follows the structure expected by the cluster Node Tuning Operator:\u003cbr\u003e``\u003ccode\u003e\u003cbr\u003eapiVersion: tuned.openshift.io/v1\u003cbr\u003ekind: Tuned\u003cbr\u003emetadata:\u003cbr\u003e  name: &lt;profile-name&gt;\u003cbr\u003e  namespace: openshift-cluster-node-tuning-operator\u003cbr\u003espec:\u003cbr\u003e  profile:\u003cbr\u003e  - data: |\u003cbr\u003e      [main]\u003cbr\u003e      summary=...\u003cbr\u003e      include=...\u003cbr\u003e      ...\u003cbr\u003e    name: &lt;profile-name&gt;\u003cbr\u003e  recommend:\u003cbr\u003e  - machineConfigLabels: {...}\u003cbr\u003e    match:\u003cbr\u003e    - label: ...\u003cbr\u003e      value: ...\u003cbr\u003e    priority: &lt;priority&gt;\u003cbr\u003e    profile: &lt;profile-name&gt;\u003cbr\u003e\u003c/code\u003e``\u003c/p\u003e"}], "skills": [{"name": "scripts", "description": "Generate tuned manifests and evaluate node tuning snapshots", "description_html": "Generate tuned manifests and evaluate node tuning snapshots", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "debugging", "keywords": ["tuned", "node-tuning", "performance", "profiles"], "author": {"name": "github.com/openshift-eng"}}, {"name": "olm", "description": "OLM (Operator Lifecycle Manager) plugin for operator management and debugging", "version": "0.1.2", "has_readme": true, "commands": [{"name": "approve", "full_name": "olm:approve", "description": "Approve pending InstallPlans for operator installations and upgrades", "description_html": "Approve pending InstallPlans for operator installations and upgrades", "synopsis": "/olm:approve \u003coperator-name\u003e [namespace] [--all]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm:approve\u003c/code\u003e command approves pending InstallPlans for operators with manual approval mode. This is required for operators that have \u003ccode\u003einstallPlanApproval: Manual\u003c/code\u003e in their Subscription to proceed with installation or upgrades.\u003c/p\u003e\u003cp\u003eThis command helps you:\u003cbr\u003e- Approve operator installations that are waiting for manual approval\u003cbr\u003e- Approve operator upgrades\u003cbr\u003e- Review what will be installed/upgraded before approval\u003cbr\u003e- Batch approve multiple pending InstallPlans\u003c/p\u003e"}, {"name": "catalog", "full_name": "olm:catalog", "description": "Manage catalog sources for discovering and installing operators", "description_html": "Manage catalog sources for discovering and installing operators", "synopsis": "/olm:catalog list\n/olm:catalog add \u003cname\u003e \u003cimage\u003e [--namespace=openshift-marketplace]\n/olm:catalog remove \u003cname\u003e [--namespace=openshift-marketplace]\n/olm:catalog refresh \u003cname\u003e [--namespace=openshift-marketplace]\n/olm:catalog status \u003cname\u003e [--namespace=openshift-marketplace]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm:catalog\u003c/code\u003e command manages catalog sources for operator discovery and installation. Catalog sources provide the list of operators available for installation in the cluster.\u003c/p\u003e\u003cp\u003eThis command helps you:\u003cbr\u003e- List all available catalog sources and their health status\u003cbr\u003e- Add custom or private catalog sources\u003cbr\u003e- Remove catalog sources\u003cbr\u003e- Refresh catalog sources to get latest operator updates\u003c/p\u003e"}, {"name": "debug", "full_name": "olm:debug", "description": "Debug OLM issues using must-gather logs and source code analysis", "description_html": "Debug OLM issues using must-gather logs and source code analysis", "synopsis": "/olm:debug \u003cissue-description\u003e \u003cmust-gather-path\u003e [olm-version]", "body_html": "The \u003ccode\u003eolm:debug\u003c/code\u003e command analyzes OLM (Operator Lifecycle Manager) issues by correlating must-gather logs with the appropriate OLM source code. It automatically determines the OCP version from the must-gather logs, checks out the corresponding branch from the relevant OLM repositories, queries Jira for known bugs in the OCPBUGS project (OLM component), and provides detailed analysis and debugging insights."}, {"name": "diagnose", "full_name": "olm:diagnose", "description": "Diagnose and optionally fix common OLM and operator issues", "description_html": "Diagnose and optionally fix common OLM and operator issues", "synopsis": "/olm:diagnose [operator-name] [namespace] [--fix] [--cluster]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm:diagnose\u003c/code\u003e command diagnoses common OLM and operator issues, including orphaned CRDs, stuck namespaces, failed installations, and catalog source problems. It can optionally attempt to fix detected issues automatically.\u003c/p\u003e\u003cp\u003eThis command helps you:\u003cbr\u003e- Detect and clean up orphaned CRDs from deleted operators\u003cbr\u003e- Fix namespaces stuck in Terminating state\u003cbr\u003e- Identify and resolve failed operator installations\u003cbr\u003e- Detect conflicting OperatorGroups\u003cbr\u003e- Check catalog source health\u003cbr\u003e- Identify resources preventing clean uninstallation\u003cbr\u003e- Generate comprehensive troubleshooting reports\u003c/p\u003e"}, {"name": "install", "full_name": "olm:install", "description": "Install a day-2 operator using Operator Lifecycle Manager", "description_html": "Install a day-2 operator using Operator Lifecycle Manager", "synopsis": "/olm:install \u003coperator-name\u003e [namespace] [channel] [source] [--approval=Automatic|Manual]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm:install\u003c/code\u003e command installs a day-2 operator in an OpenShift cluster using Operator Lifecycle Manager (OLM). It automates the creation of the required namespace, OperatorGroup, and Subscription resources needed to install an operator.\u003c/p\u003e\u003cp\u003eThis command handles the complete operator installation workflow:\u003cbr\u003e- Creates or verifies the target namespace exists\u003cbr\u003e- Creates an OperatorGroup if needed\u003cbr\u003e- Creates a Subscription to install the operator\u003cbr\u003e- Verifies the installation by checking the operator&#x27;s CSV (ClusterServiceVersion) status\u003cbr\u003e- Provides detailed feedback on the installation progress\u003c/p\u003e\u003cp\u003eThe command is designed to work with operators from the OperatorHub catalog, including Red Hat certified operators, community operators, and custom catalog sources.\u003c/p\u003e"}, {"name": "list", "full_name": "olm:list", "description": "List installed operators in the cluster", "description_html": "List installed operators in the cluster", "synopsis": "/olm:list [namespace] [--all-namespaces]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm:list\u003c/code\u003e command lists all installed operators in an OpenShift cluster, showing their status, version, and namespace. This command provides a quick overview of the operator landscape in your cluster.\u003c/p\u003e\u003cp\u003eThis command helps you:\u003cbr\u003e- Discover what operators are currently installed\u003cbr\u003e- Check operator versions and status at a glance\u003cbr\u003e- Identify operators that may need attention (failed, upgrading, etc.)\u003cbr\u003e- Get a comprehensive view across namespaces\u003c/p\u003e\u003cp\u003eThe command presents information in an easy-to-read table format with key details about each operator&#x27;s ClusterServiceVersion (CSV) and Subscription.\u003c/p\u003e"}, {"name": "opm", "full_name": "olm:opm", "description": "Execute opm (Operator Package Manager) commands for building and managing operator catalogs", "description_html": "Execute opm (Operator Package Manager) commands for building and managing operator catalogs", "synopsis": "/olm:opm build-index-image \u003ccatalog-path\u003e \u003cindex-image-tag\u003e [--cacheless] [--arch=\u003carch\u003e] [--base-image=\u003cimage\u003e] [--builder-image=\u003cimage\u003e]\n/olm:opm build-semver-index-image \u003csemver-template-file\u003e \u003cindex-image-tag\u003e [--cacheless] [--arch=\u003carch\u003e] [--base-image=\u003cimage\u003e] [--builder-image=\u003cimage\u003e]\n/olm:opm generate-semver-template \u003cbundle-list\u003e [--output=\u003cfile\u003e] [--major=true|false] [--minor=true|false]\n/olm:opm list packages \u003cindex-ref\u003e\n/olm:opm list channels \u003cindex-ref\u003e [package-name]\n/olm:opm list bundles \u003cindex-ref\u003e [package-name]", "body_html": "The \u003ccode\u003eolm:opm\u003c/code\u003e command provides a unified interface to \u003ccode\u003eopm\u003c/code\u003e (Operator Package Manager) operations for building and managing operator catalog indexes. It supports building catalog indexes, generating semver templates, and querying catalog contents."}, {"name": "search", "full_name": "olm:search", "description": "Search for available operators in catalog sources", "description_html": "Search for available operators in catalog sources", "synopsis": "/olm:search [query] [--catalog \u003ccatalog-name\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm:search\u003c/code\u003e command searches for available operators in the cluster&#x27;s catalog sources (OperatorHub). It helps you discover operators that can be installed, showing their names, descriptions, versions, channels, and catalog sources.\u003c/p\u003e\u003cp\u003eThis command helps you:\u003cbr\u003e- Find operators by name, description, or keywords\u003cbr\u003e- Discover what operators are available for installation\u003cbr\u003e- View operator details before installing\u003cbr\u003e- Check available versions and channels\u003cbr\u003e- Identify which catalog source contains a specific operator\u003c/p\u003e\u003cp\u003eThe command searches across all available catalog sources (redhat-operators, certified-operators, community-operators, redhat-marketplace, and custom catalogs) and presents results in an easy-to-read format.\u003c/p\u003e"}, {"name": "status", "full_name": "olm:status", "description": "Get detailed status and health information for an operator", "description_html": "Get detailed status and health information for an operator", "synopsis": "/olm:status \u003coperator-name\u003e [namespace]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm:status\u003c/code\u003e command provides comprehensive health and status information for a specific operator in an OpenShift cluster. It displays detailed information about the operator&#x27;s CSV, Subscription, InstallPlan, deployments, and pods to help diagnose issues and verify proper operation.\u003c/p\u003e\u003cp\u003eThis command helps you:\u003cbr\u003e- Check if an operator is running with all pods ready and no errors\u003cbr\u003e- Diagnose installation or upgrade problems\u003cbr\u003e- View operator version and available updates\u003cbr\u003e- Inspect operator deployments and pods\u003cbr\u003e- Review recent events and conditions\u003cbr\u003e- Identify resource issues or configuration problems\u003c/p\u003e"}, {"name": "uninstall", "full_name": "olm:uninstall", "description": "Uninstall a day-2 operator and optionally remove its resources", "description_html": "Uninstall a day-2 operator and optionally remove its resources", "synopsis": "/olm:uninstall \u003coperator-name\u003e [namespace] [--remove-crds] [--remove-namespace]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm:uninstall\u003c/code\u003e command uninstalls a day-2 operator from an OpenShift cluster by removing its Subscription, ClusterServiceVersion (CSV), and optionally its Custom Resource Definitions (CRDs) and namespace.\u003c/p\u003e\u003cp\u003eThis command provides a comprehensive uninstallation workflow:\u003cbr\u003e- Removes the operator&#x27;s Subscription\u003cbr\u003e- Deletes the ClusterServiceVersion (CSV)\u003cbr\u003e- Optionally removes operator-managed deployments\u003cbr\u003e- Optionally deletes Custom Resource Definitions (CRDs)\u003cbr\u003e- Optionally removes the operator&#x27;s namespace\u003cbr\u003e- Provides detailed feedback on each step\u003c/p\u003e\u003cp\u003eThe command is designed to safely clean up operators installed via OLM, with optional flags for thorough cleanup of all operator-related resources.\u003c/p\u003e"}, {"name": "upgrade", "full_name": "olm:upgrade", "description": "Update an operator to the latest versi
