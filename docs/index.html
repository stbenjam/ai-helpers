 \u003cstrong\u003eClaude Code Plugins, Commands, Skills, Sub-agents, or Hooks\u003c/strong\u003e in the \u003ccode\u003eopenshift-eng/ai-helpers\u003c/code\u003e repository to avoid duplicating effort and find collaboration opportunity.\u003c/p\u003e\u003cp\u003eThis command is specifically designed for contributors and reviewers to the \u003ccode\u003eopenshift-eng/ai-helpers\u003c/code\u003e repository. It checks for overlaps in:\u003cbr\u003e- Plugin commands (\u003ccode\u003eplugins/\u003cem\u003e/commands/\u003c/em\u003e.md\u003c/code\u003e)\u003cbr\u003e- Skills (\u003ccode\u003eplugins/\u003cem\u003e/skills/\u003c/em\u003e/SKILL.md\u003c/code\u003e and helper scripts)\u003cbr\u003e- Sub-agents (\u003ccode\u003eagents/\u003cem\u003e.md\u003c/code\u003e)\u003cbr\u003e- Hooks (\u003ccode\u003e.claude/hooks/\u003c/em\u003e.sh\u003c/code\u003e and \u003ccode\u003e.claude/hooks/*.py\u003c/code\u003e)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eModes\u003c/strong\u003e:\u003cbr\u003e- \u003cstrong\u003eIdea check\u003c/strong\u003e (\u003ccode\u003e--idea &quot;TEXT&quot;\u003c/code\u003e): Check if your idea already exists before writing code\u003cbr\u003e- \u003cstrong\u003eLocal check\u003c/strong\u003e (default): Compare your local changes against main branch and open PRs\u003cbr\u003e- \u003cstrong\u003ePR review mode\u003c/strong\u003e (\u003ccode\u003e--pr NUMBER\u003c/code\u003e): Check if a specific PR overlaps with others\u003c/p\u003e\u003cp\u003eThis command helps contributors avoid duplicate work and helps reviewers identify related PRs that should be consolidated.\u003c/p\u003e"}, {"name": "review-security", "full_name": "utils:review-security", "description": "Orchestrate security scanners and provide contextual triage of findings", "description_html": "Orchestrate security scanners and provide contextual triage of findings", "synopsis": "/utils:review-security [file-paths-or-patterns]", "body_html": "\u003cp\u003eThe \u003ccode\u003eutils:review-security\u003c/code\u003e command is a security analysis orchestrator that combines deterministic scanning tools with AI-powered contextual reasoning. Unlike traditional security scanners that produce noisy, context-free alerts, this command:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOrchestrates proven tools\u003c/strong\u003e (when available):\u003cbr\u003e- \u003ccode\u003egitleaks\u003c/code\u003e or \u003ccode\u003etrufflehog\u003c/code\u003e - Secret detection with maintained pattern databases\u003cbr\u003e- \u003ccode\u003egosec\u003c/code\u003e - Go AST-aware security analysis\u003cbr\u003e- \u003ccode\u003ebandit\u003c/code\u003e - Python-specific security scanner\u003cbr\u003e- \u003ccode\u003esemgrep\u003c/code\u003e - Cross-language semantic analysis\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAdds intelligence layer\u003c/strong\u003e:\u003cbr\u003e- Triages tool findings to reduce false positives\u003cbr\u003e- Explains exploitability in plain language for non-security developers\u003cbr\u003e- Traces data flow to assess reachability from user input\u003cbr\u003e- Identifies if findings are in test/dead code\u003cbr\u003e- Suggests concrete fixes with code examples\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAnalyzes what tools miss\u003c/strong\u003e:\u003cbr\u003e- Business logic flaws spanning multiple files\u003cbr\u003e- Authentication/authorization design issues\u003cbr\u003e- Context-dependent vulnerabilities\u003cbr\u003e- Security controls removed in diffs\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eScope\u003c/strong\u003e: Without arguments, analyzes \u003ccode\u003egit diff\u003c/code\u003e changes (ideal for PR reviews). With file paths/patterns, analyzes specified files.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImportant\u003c/strong\u003e: This is NOT a replacement for CI/CD security gates. Deterministic tools should still run in your pipeline. This command helps developers understand and act on findings during development.\u003c/p\u003e"}], "skills": [], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "tooling", "keywords": ["utilities", "helpers", "misc"], "author": {"name": "github.com/openshift-eng"}}, {"name": "workspaces", "description": "Manage isolated git worktree workspaces for multi-repo development", "version": "1.0.1", "has_readme": true, "commands": [{"name": "create", "full_name": "workspaces:create", "description": "Create a workspace with git worktrees for multi-repository development", "description_html": "Create a workspace with git worktrees for multi-repository development", "synopsis": "/workspaces:create \u003cshort-description\u003e \u003crepo1|url\u003e [repo2...]", "body_html": "\u003cp\u003eThe \u003ccode\u003eworkspaces:create\u003c/code\u003e command creates a dedicated workspace directory with git worktrees for multi-repository development. It intelligently parses the workspace description to identify repositories, PR URLs, and JIRA keys, then sets up isolated git worktrees on a new feature branch or checks out a PR for review.\u003c/p\u003e\u003cp\u003eThis command streamlines working on tasks that span multiple repositories by keeping all related code changes synchronized in a single workspace.\u003c/p\u003e"}, {"name": "delete", "full_name": "workspaces:delete", "description": "Delete a workspace and its git worktrees", "description_html": "Delete a workspace and its git worktrees", "synopsis": "/workspaces:delete \u003cworkspace-name\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003eworkspaces:delete\u003c/code\u003e command removes a workspace directory and its associated git worktrees. Before deletion, it checks the status of all repositories in the workspace to detect uncommitted changes or unpushed commits, prompting the user for confirmation when issues are found.\u003c/p\u003e\u003cp\u003eThis command helps clean up task workspaces created by \u003ccode\u003e/workspaces:create\u003c/code\u003e while ensuring no work is accidentally lost.\u003c/p\u003e"}], "skills": [], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "development", "keywords": ["git", "worktree", "workspace", "multi-repo"], "author": {"name": "github.com/openshift-eng"}}], "standalone_skills": []};

  <script>
(function() {
  var allPlugins = DATA.plugins;
  var standaloneSkills = DATA.standalone_skills || [];
  var activeCategory = null;

  function init() {
    updateStats();
    applyHashState();
    document.getElementById('search').addEventListener('input', onSearchInput);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') navigateTo('');
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('search').focus();
      }
    });
    window.addEventListener('popstate', function() { applyHashState(); });
    var nb = document.querySelector('nav.navbar');
    if (nb) document.body.style.paddingTop = nb.offsetHeight + 'px';
  }

  // ---- Navigation / URL state ----
  window.goHome = function() {
    history.pushState(null, '', window.location.pathname + window.location.search);
    applyHashState();
  };

  window.navigateTo = function(hash) {
    history.pushState(null, '', hash ? '#' + hash : window.location.pathname + window.location.search);
    applyHashState();
  };

  function applyHashState() {
    var hash = decodeURIComponent(window.location.hash.slice(1));
    var input = document.getElementById('search');
    var nr = document.getElementById('no-results');

    if (!hash) {
      input.value = '';
      document.getElementById('search-clear').style.display = 'none';
      activeCategory = null;
      renderDefault();
      nr.classList.remove('show');
      return;
    }

    if (hash.indexOf('category=') === 0) {
      var cat = hash.slice(9);
      input.value = '';
      document.getElementById('search-clear').style.display = 'none';
      activeCategory = null;
      renderDefault();
      nr.classList.remove('show');
      applyCategoryUI(cat);
      return;
    }

    if (hash.indexOf('q=') === 0) {
      var q = hash.slice(2);
      input.value = q;
      document.getElementById('search-clear').style.display = q ? 'block' : 'none';
      activeCategory = null;
      doSearch(q, true);
      return;
    }

    if (hash.indexOf('type=') === 0) {
      var type = hash.slice(5);
      input.value = '';
      document.getElementById('search-clear').style.display = 'none';
      activeCategory = null;
      renderTypeView(type);
      return;
    }

    if (IS_MARKETPLACE) {
      input.value = '';
      document.getElementById('search-clear').style.display = 'none';
      activeCategory = null;
      var p = allPlugins.find(function(x) { return x.name === hash; });
      if (p) { showPluginDetail(hash); }
      else { renderDefault(); nr.classList.remove('show'); }
    }

  // ---- Stats ----
  function updateStats() {
    var stats = document.getElementById('navbar-stats');
    var items = [];
    if (IS_MARKETPLACE) items.push({label: 'Plugins', value: allPlugins.length, type: 'plugins'});
    var tc = allPlugins.reduce(function(s,p){return s+p.commands.length;},0);
    var ts = allPlugins.reduce(function(s,p){return s+p.skills.length;},0) + standaloneSkills.length;
    var ta = allPlugins.reduce(function(s,p){return s+p.agents.length;},0);
    var th = allPlugins.reduce(function(s,p){return s+p.hooks.length;},0);
    var tm = allPlugins.reduce(function(s,p){return s+p.mcp_servers.length;},0);
    var tr = allPlugins.reduce(function(s,p){return s+p.rules.length;},0);
    if (tc > 0) items.push({label: 'Commands', value: tc, type: 'commands'});
    if (ts > 0) items.push({label: 'Skills', value: ts, type: 'skills'});
    if (ta > 0) items.push({label: 'Agents', value: ta, type: 'agents'});
    if (th > 0) items.push({label: 'Hooks', value: th, type: 'hooks'});
    if (tm > 0) items.push({label: 'MCP Servers', value: tm, type: 'mcp_servers'});
    if (tr > 0) items.push({label: 'Rules', value: tr, type: 'rules'});
    stats.innerHTML = items.map(function(i) {
      return '<a href="#type='+i.type+'" class="stat stat-link" onclick="event.preventDefault();navigateTo(\'type='+i.type+'\')"><div class="stat-value">'+i.value+'</div><div class="stat-label">'+i.label+'</div></a>';

  function renderDefault() {
    if (IS_MARKETPLACE) {
      renderPluginGrid(allPlugins);
    } else {
      renderSingleContent();
    }
  }

  // ---- Type view: show all items of a given type ----
  function renderTypeView(type) {
    var el = document.getElementById('content');
    var nr = document.getElementById('no-results');
    var html = '';
    var typeLabels = {plugins:'Plugins',commands:'Commands',skills:'Skills',agents:'Agents',hooks:'Hooks',mcp_servers:'MCP Servers',rules:'Rules'};
    if (!typeLabels[type]) {
      el.innerHTML = '';
      nr.classList.add('show');
      return;
    }
    var label = typeLabels[type];

    if (type === 'plugins' && IS_MARKETPLACE) {
      html += '<div class="search-results-heading">'+label+' ('+allPlugins.length+')</div>';
      allPlugins.forEach(function(p) {
        html += '<div class="search-result-item" onclick="navigateTo(\''+escAttr(p.name)+'\')">';
        html += '<div class="search-result-icon plugin">'+esc(pName(p).charAt(0).toUpperCase())+'</div>';
        html += '<div class="search-result-content"><div class="search-result-title">'+esc(pName(p))+'</div>';
        html += '<div class="search-result-subtitle">'+esc(p.description)+'</div></div></div>';
      });
    } else {
      var items = [];
      allPlugins.forEach(function(p) {
        if (type === 'commands') p.commands.forEach(function(c) { items.push({plugin:p.name, name:c.full_name||c.name, desc:c.description, icon:'cmd', iconChar:'$'}); });
        if (type === 'skills') p.skills.forEach(function(s) { items.push({plugin:p.name, name:s.name, desc:s.description, icon:'skill', iconChar:'S'}); });
        if (type === 'agents') p.agents.forEach(function(a) { items.push({plugin:p.name, name:a.name, desc:a.description, icon:'agent', iconChar:'A'}); });
        if (type === 'hooks') p.hooks.forEach(function(h) { items.push({plugin:p.name, name:h.event_type, desc:'Matcher: '+h.matcher, icon:'hook', iconChar:'H'}); });
        if (type === 'mcp_servers') p.mcp_servers.forEach(function(m) { items.push({plugin:p.name, name:m.name, desc:m.type+' — '+m.endpoint, icon:'mcp', iconChar:'M'}); });
        if (type === 'rules') p.rules.forEach(function(r) { items.push({plugin:p.name, name:r.name, desc:r.description, icon:'rule', iconChar:'R'}); });
      });
      if (type === 'skills') standaloneSkills.forEach(function(s) { items.push({plugin:'', name:s.name, desc:s.description, icon:'skill', iconChar:'S'}); });
      if (items.length) {
        html += '<div class="search-results-heading">'+label+' ('+items.length+')</div>';
        items.forEach(function(r) {
          var onclick = IS_MARKETPLACE && r.plugin ? ' onclick="navigateTo(\''+escAttr(r.plugin)+'\')"' : '';
          html += '<div class="search-result-item"'+onclick+'>';
          html += '<div class="search-result-icon '+esc(r.icon)+'">'+esc(r.iconChar)+'</div>';
          html += '<div class="search-result-content"><div class="search-result-title">'+esc(r.name)+'</div>';
          html += '<div class="search-result-subtitle">'+esc(r.desc)+'</div></div>';
          if (r.plugin) html += '<span class="search-result-plugin">'+esc(r.plugin)+'</span>';
          html += '</div>';
        });
      }
    }

    if (html) { el.innerHTML = html; nr.classList.remove('show'); }
    else { el.innerHTML = ''; nr.classList.add('show'); }
  }

  // ---- Marketplace: plugin card grid ----
  function pName(p) { return p.display_name || p.name; }

  function renderPluginGrid(plugins) {
    var el = document.getElementById('content');
    var nr = document.getElementById('no-results');
    if (plugins.length === 0) { el.innerHTML = ''; nr.classList.add('show'); return; }
    nr.classList.remove('show');
    var cats = collectCategories();
    var filterHtml = cats.length >= 1 ? renderCategoryFilter(cats) : '';
    el.innerHTML = filterHtml + '<div class="plugins-grid" id="plugins-grid">' + plugins.map(function(p) {
      var counts = buildCountBadges(p);
      var ver = p.version ? '<span class="plugin-version">v'+esc(p.version)+'</span>' : '';
      var cat = p.category ? '<span class="plugin-category" onclick="event.stopPropagation();navigateTo(\'category='+escAttr(p.category)+'\')">'+esc(p.category)+'</span>' : '';
      var allTags = (p.tags||[]).concat(p.keywords||[]);
      var tagsHtml = allTags.length ? '<div class="plugin-tags">'+allTags.map(function(t){return '<span class="plugin-tag" onclick="event.stopPropagation();navigateTo(\'q='+escAttr(t)+'\')">'+esc(t)+'</span>';}).join('')+'</div>' : '';
      return '<div class="plugin-card" data-category="'+(esc(p.category)||'')+'" onclick="navigateTo(\''+escAttr(p.name)+'\')">' +
        '<div class="plugin-header"><div><div class="plugin-name">'+esc(pName(p))+'</div>'+ver+'</div>'+cat+'</div>' +
        '<div class="plugin-description">'+(p.description_html || esc(p.description) || '<em>No description</em>')+'</div>' +
        tagsHtml +
        '<div class="item-counts">'+counts+'</div></div>';
    }).join('') + '</div>';
  }

  function collectCategories() {
    var seen = {};
    allPlugins.forEach(function(p) { if (p.category) seen[p.category] = true; });
    return Object.keys(seen).sort();
  }

  function renderCategoryFilter(cats) {
    var btns = '<button class="category-btn'+(activeCategory?'':' active')+'" onclick="navigateTo(\'\')">All</button>';
    cats.forEach(function(c) {
      btns += '<a href="#category='+encodeURIComponent(c)+'" class="category-btn'+(activeCategory===c?' active':'')+'" onclick="event.preventDefault();navigateTo(\'category='+escAttr(c)+'\')">'+esc(c)+'</a>';
    });
    return '<div class="category-filter" id="category-filter">' + btns + '</div>';
  }

  function applyCategoryUI(cat) {
    activeCategory = cat;
    var btns = document.querySelectorAll('.category-btn');
    btns.forEach(function(b) { b.classList.remove('active'); });
    if (!cat) { if (btns[0]) btns[0].classList.add('active'); }
    else {
      btns.forEach(function(b) { if (b.textContent === cat) b.classList.add('active'); });
    }
    var cards = document.querySelectorAll('.plugin-card');
    cards.forEach(function(c) {
      c.style.display = (!cat || c.getAttribute('data-category') === cat) ? '' : 'none';
    });
  }

  window.filterByCategory = function(cat) {
    navigateTo(cat ? 'category=' + encodeURIComponent(cat) : '');
  };

  window.filterByTag = function(tag) {
    navigateTo('q=' + encodeURIComponent(tag));
  };

  function buildCountBadges(p) {
    var b = [];
    if (p.commands.length) b.push(badge(p.commands.length, 'command'));
    if (p.skills.length) b.push(badge(p.skills.length, 'skill'));
    if (p.agents.length) b.push(badge(p.agents.length, 'agent'));
    if (p.hooks.length) b.push(badge(p.hooks.length, 'hook'));
    if (p.mcp_servers.length) b.push(badge(p.mcp_servers.length, 'mcp server'));
    if (p.rules.length) b.push(badge(p.rules.length, 'rule'));
    return b.join('');
  }

  function badge(n, label) {
    return '<div class="item-count"><span class="item-count-badge">'+n+'</span><span>'+label+(n!==1?'s':'')+'</span></div>';
  }

  // ---- Single-plugin: inline content ----
  function renderSingleContent() {
    var el = document.getElementById('content');
    var html = '';
    allPlugins.forEach(function(p) { html += renderPluginSections(p); });
    if (standaloneSkills.length > 0) {
      html += '<div class="section-title">Skills</div>';
      standaloneSkills.forEach(function(s) {
        html += '<div class="skill-item"><div class="skill-name">'+esc(s.name)+'</div>';
        if (s.description_html) html += '<div class="skill-description">'+s.description_html+'</div>';
        html += '</div>';
      });
    }
    el.innerHTML = html;
  }

  function renderPluginSections(p, forModal) {
    var h = '';
    var wrap = forModal ? function(cls, inner) { return '<div class="modal-section-items" data-filtered="false">' + inner + '</div>'; } : function(cls, inner) { return inner; };
    var dataAttr = forModal ? function(text) { return ' data-search="'+esc(text.toLowerCase())+'"'; } : function() { return ''; };
    if (p.commands.length) {
      h += '<div class="section-title">Commands</div>';
      var cmds = '';
      p.commands.forEach(function(c) {
        var searchText = (c.full_name||c.name) + ' ' + (c.description||'') + ' ' + (c.synopsis||'');
        cmds += '<div class="command-item"'+dataAttr(searchText)+'>';
        cmds += '<div class="command-name">/'+esc(c.full_name||c.name)+'</div>';
        if (c.synopsis) cmds += '<div class="command-synopsis">'+esc(c.synopsis)+'</div>';
        if (c.description_html) cmds += '<div class="command-description">'+c.description_html+'</div>';
        if (c.body_html) cmds += '<div class="command-description md-body" style="margin-top:0.5rem">'+c.body_html+'</div>';
        cmds += '</div>';
      });
      h += wrap('commands', cmds);
    }
    if (p.skills.length) {
      h += '<div class="section-title">Skills</div>';
      var skills = '';
      p.skills.forEach(function(s) {
        var searchText = s.name + ' ' + (s.description||'');
        skills += '<div class="skill-item"'+dataAttr(searchText)+'><div class="skill-name">'+esc(s.name)+'</div>';
        if (s.description_html) skills += '<div class="skill-description">'+s.description_html+'</div>';
        if (s.meta) skills += '<div class="skill-meta">'+s.meta+'</div>';
        skills += '</div>';
      });
      h += wrap('skills', skills);
    }
    if (p.agents.length) {
      h += '<div class="section-title">Agents</div>';
      var agents = '';
      p.agents.forEach(function(a) {
        var searchText = a.name + ' ' + (a.description||'');
        agents += '<div class="agent-item"'+dataAttr(searchText)+'><div class="agent-name">'+esc(a.name)+'</div>';
        if (a.description_html) agents += '<div class="agent-description">'+a.description_html+'</div>';
        agents += '</div>';
      });
      h += wrap('agents', agents);
    }
    if (p.hooks.length) {
      h += '<div class="section-title">Hooks</div>';
      var hooks = '';
      p.hooks.forEach(function(hk) {
        var searchText = hk.event_type + ' ' + hk.matcher;
        hooks += '<div class="hook-item"'+dataAttr(searchText)+'><div class="hook-name">'+esc(hk.event_type)+'</div>';
        hooks += '<div class="hook-type">Matcher: '+esc(hk.matcher)+'</div>';
        hooks += '<div class="code-block">'+esc(hk.hooks_json)+'</div></div>';
      });
      h += wrap('hooks', hooks);
    }
    if (p.mcp_servers.length) {
      h += '<div class="section-title">MCP Servers</div>';
      var mcps = '';
      p.mcp_servers.forEach(function(srv) {
        var searchText = srv.name + ' ' + srv.type + ' ' + srv.endpoint;
        mcps += '<div class="mcp-item"'+dataAttr(searchText)+'><div class="mcp-name">'+esc(srv.name)+'</div>';
        mcps += '<div class="mcp-type">'+esc(srv.type)+' &mdash; '+esc(srv.endpoint)+'</div></div>';
      });
      h += wrap('mcp', mcps);
    }
    if (p.rules.length) {
      h += '<div class="section-title">Rules</div>';
      var rules = '';
      p.rules.forEach(function(r) {
        var searchText = r.name + ' ' + (r.description||'');
        rules += '<div class="rule-item"'+dataAttr(searchText)+'><div class="rule-name">'+esc(r.name)+'</div>';
        if (r.description_html) rules += '<div class="rule-description">'+r.description_html+'</div>';
        if (r.globs && r.globs.length) rules += '<div class="rule-paths">Paths: '+r.globs.map(esc).join(', ')+'</div>';
        rules += '</div>';
      });
      h += wrap('rules', rules);
    }
    return h;
  }

  // ---- Search ----
  var searchDebounce = null;
  function onSearchInput(e) {
    var q = e.target.value;
    document.getElementById('search-clear').style.display = q ? 'block' : 'none';
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(function() { doSearch(q); }, 150);
  }

  window.clearSearch = function() {
    goHome();
  };

  function doSearch(query, skipHash) {
    var q = query.toLowerCase().trim();
    if (!q) { renderDefault(); document.getElementById('no-results').classList.remove('show'); if (!skipHash) history.replaceState(null,'',window.location.pathname+window.location.search); return; }
    if (!skipHash) history.replaceState(null, '', '#q=' + encodeURIComponent(q));

    var results = { plugins: [], commands: [], skills: [], agents: [], hooks: [], rules: [] };

    allPlugins.forEach(function(p) {
      var tagMatch = (p.tags||[]).concat(p.keywords||[]).some(function(t){return match(t,q);});
      if (match(pName(p), q) || match(p.name, q) || match(p.description, q) || match(p.category, q) || tagMatch) results.plugins.push(p);
      p.commands.forEach(function(c) {
        if (match(c.name, q) || match(c.full_name, q) || match(c.description, q) || match(c.synopsis, q))
          results.commands.push({plugin: p.name, item: c});
      });
      p.skills.forEach(function(s) {
        if (match(s.name, q) || match(s.description, q))
          results.skills.push({plugin: p.name, item: s});
      });
      p.agents.forEach(function(a) {
        if (match(a.name, q) || match(a.description, q))
          results.agents.push({plugin: p.name, item: a});
      });
      p.hooks.forEach(function(h) {
        if (match(h.event_type, q) || match(h.matcher, q))
          results.hooks.push({plugin: p.name, item: h});
      });
      p.rules.forEach(function(r) {
        if (match(r.name, q) || match(r.description, q))
          results.rules.push({plugin: p.name, item: r});
      });
    });

    standaloneSkills.forEach(function(s) {
      if (match(s.name, q) || match(s.description, q))
        results.skills.push({plugin: '', item: s});
    });

    renderSearchResults(results, q);
  }

  function match(str, q) { return str && str.toLowerCase().indexOf(q) !== -1; }

  function hi(text, q) {
    if (!text || !q) return esc(text || '');
    var safe = esc(text);
    var safeQ = esc(q);
    var re = new RegExp('(' + safeQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return safe.replace(re, '<mark>$1</mark>');
  }

  function renderSearchResults(results, q) {
    var el = document.getElementById('content');
    var nr = document.getElementById('no-results');
    var total = results.plugins.length + results.commands.length + results.skills.length +
                results.agents.length + results.hooks.length + results.rules.length;
    if (total === 0) { el.innerHTML = ''; nr.classList.add('show'); return; }
    nr.classList.remove('show');

    var html = '';

    if (results.plugins.length && IS_MARKETPLACE) {
      html += '<div class="search-results-heading">Plugins (' + results.plugins.length + ')</div>';
      results.plugins.forEach(function(p) {
        html += '<div class="search-result-item" onclick="navigateTo(\''+escAttr(p.name)+'\')">';
        html += '<div class="search-result-icon plugin">'+esc(pName(p).charAt(0).toUpperCase())+'</div>';
        html += '<div class="search-result-content"><div class="search-result-title">'+hi(pName(p),q)+'</div>';
        html += '<div class="search-result-subtitle">'+hi(p.description,q)+'</div></div></div>';
      });
    }

    if (results.commands.length) {
      html += '<div class="search-results-heading">Commands (' + results.commands.length + ')</div>';
      results.commands.forEach(function(r) {
        var onclick = IS_MARKETPLACE ? ' onclick="navigateTo(\''+escAttr(r.plugin)+'\')"' : '';
        html += '<div class="search-result-item"'+onclick+'>';
        html += '<div class="search-result-icon cmd">$</div>';
        html += '<div class="search-result-content"><div class="search-result-title">'+hi(r.item.full_name || r.item.name, q)+'</div>';
        html += '<div class="search-result-subtitle">'+hi(r.item.description,q)+'</div></div>';
        if (r.plugin) html += '<span class="search-result-plugin">'+esc(r.plugin)+'</span>';
        html += '</div>';
      });
    }

    if (results.skills.length) {
      html += '<div class="search-results-heading">Skills (' + results.skills.length + ')</div>';
      results.skills.forEach(function(r) {
        var onclick = IS_MARKETPLACE && r.plugin ? ' onclick="navigateTo(\''+escAttr(r.plugin)+'\')"' : '';
        html += '<div class="search-result-item"'+onclick+'>';
        html += '<div class="search-result-icon skill">S</div>';
        html += '<div class="search-result-content"><div class="search-result-title">'+hi(r.item.name,q)+'</div>';
        html += '<div class="search-result-subtitle">'+hi(r.item.description,q)+'</div></div>';
        if (r.plugin) html += '<span class="search-result-plugin">'+esc(r.plugin)+'</span>';
        html += '</div>';
      });
    }

    if (results.agents.length) {
      html += '<div class="search-results-heading">Agents (' + results.agents.length + ')</div>';
      results.agents.forEach(function(r) {
        var onclick = IS_MARKETPLACE && r.plugin ? ' onclick="navigateTo(\''+escAttr(r.plugin)+'\')"' : '';
        html += '<div class="search-result-item"'+onclick+'>';
        html += '<div class="search-result-icon agent">A</div>';
        html += '<div class="search-result-content"><div class="search-result-title">'+hi(r.item.name,q)+'</div>';
        html += '<div class="search-result-subtitle">'+hi(r.item.description,q)+'</div></div>';
        if (r.plugin) html += '<span class="search-result-plugin">'+esc(r.plugin)+'</span>';
        html += '</div>';
      });
    }

    if (results.hooks.length) {
      html += '<div class="search-results-heading">Hooks (' + results.hooks.length + ')</div>';
      results.hooks.forEach(function(r) {
        var onclick = IS_MARKETPLACE && r.plugin ? ' onclick="navigateTo(\''+escAttr(r.plugin)+'\')"' : '';
        html += '<div class="search-result-item"'+onclick+'>';
        html += '<div class="search-result-icon hook">H</div>';
        html += '<div class="search-result-content"><div class="search-result-title">'+hi(r.item.event_type,q)+'</div>';
        html += '<div class="search-result-subtitle">Matcher: '+hi(r.item.matcher,q)+'</div></div>';
        if (r.plugin) html += '<span class="search-result-plugin">'+esc(r.plugin)+'</span>';
        html += '</div>';
      });
    }

    if (results.rules.length) {
      html += '<div class="search-results-heading">Rules (' + results.rules.length + ')</div>';
      results.rules.forEach(function(r) {
        var onclick = IS_MARKETPLACE && r.plugin ? ' onclick="navigateTo(\''+escAttr(r.plugin)+'\')"' : '';
        html += '<div class="search-result-item"'+onclick+'>';
        html += '<div class="search-result-icon rule">R</div>';
        html += '<div class="search-result-content"><div class="search-result-title">'+hi(r.item.name,q)+'</div>';
        html += '<div class="search-result-subtitle">'+hi(r.item.description,q)+'</div></div>';
        if (r.plugin) html += '<span class="search-result-plugin">'+esc(r.plugin)+'</span>';
        html += '</div>';
      });
    }

    el.innerHTML = html;
  }

  // ---- Plugin detail view ----
  function showPluginDetail(name) {
    var p = allPlugins.find(function(x){return x.name===name;});
    if (!p) return;
    var el = document.getElementById('content');
    var nr = document.getElementById('no-results');
    nr.classList.remove('show');

    var counts = buildCountBadges(p);
    var ver = p.version ? '<span class="plugin-version">v'+esc(p.version)+'</span>' : '';
    var cat = p.category ? '<span class="plugin-category">'+esc(p.category)+'</span>' : '';
    var lic = p.license ? '<span class="plugin-license">'+esc(p.license)+'</span>' : '';

    var html = '<button class="detail-back" onclick="navigateTo(\'\')">&#8592; Back</button>';
    html += '<div class="detail-header"><div class="detail-title-section">';
    html += '<div class="detail-title">'+esc(pName(p))+'</div>';
    html += '<div class="detail-meta">'+counts+cat+lic+ver+'</div>';
    html += '</div></div>';

    var metaLinks = [];
    if (p.homepage) metaLinks.push('<a href="'+esc(p.homepage)+'">Homepage</a>');
    if (p.repository) metaLinks.push('<a href="'+esc(p.repository)+'">Repository</a>');
    if (p.author) {
      var authorText = typeof p.author === 'object' ? (p.author.name||'') : p.author;
      if (authorText) metaLinks.push('Author: '+esc(authorText));
    }
    var metaLinksHtml = metaLinks.length ? '<div class="plugin-meta-links">'+metaLinks.join(' &middot; ')+'</div>' : '';
    var allTags = (p.tags||[]).concat(p.keywords||[]);
    var tagsHtml = allTags.length ? '<div class="plugin-tags" style="margin-bottom:1rem">'+allTags.map(function(t){return '<span class="plugin-tag">'+esc(t)+'</span>';}).join('')+'</div>' : '';

    html += '<div class="detail-body">';
    html += '<div class="plugin-description" style="margin-bottom:0.5rem">'+(p.description_html || esc(p.description) || '')+'</div>' + metaLinksHtml + tagsHtml;

    var totalItems = p.commands.length + p.skills.length + p.agents.length + p.hooks.length + p.mcp_servers.length + p.rules.length;
    if (totalItems >= 5) {
      html += '<input type="text" class="detail-filter" id="detail-filter" placeholder="Filter commands, skills..." autocomplete="off">';
    }
    html += '<div id="detail-sections">' + renderPluginSections(p, true) + '</div>';
    html += '</div>';

    el.innerHTML = html;
    window.scrollTo(0, 0);

    var filterInput = document.getElementById('detail-filter');
    if (filterInput) {
      filterInput.addEventListener('input', function(e) { filterDetailItems(e.target.value); });
    }
  }

  function filterDetailItems(query) {
    var q = query.toLowerCase().trim();
    var sections = document.querySelectorAll('#detail-sections .modal-section-items');
    sections.forEach(function(section) {
      if (!q) { section.setAttribute('data-filtered', 'false'); return; }
      section.setAttribute('data-filtered', 'true');
      var items = section.children;
      for (var i = 0; i < items.length; i++) {
        var searchText = items[i].getAttribute('data-search') || '';
        if (searchText.indexOf(q) !== -1) {
          items[i].classList.add('modal-match');
        } else {
          items[i].classList.remove('modal-match');
        }
      }
    });
    var titles = document.querySelectorAll('#detail-sections .section-title');
    titles.forEach(function(title) {
      var next = title.nextElementSibling;
      if (!next || !next.classList.contains('modal-section-items')) return;
      if (!q) { title.style.display = ''; return; }
      var hasVisible = next.querySelector('.modal-match');
      title.style.display = hasVisible ? '' : 'none';
    });
  }

  function esc(str) {
    if (!str) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  function escAttr(str) {
    return esc(str).replace(/'/g, '&#39;');
  }

  init();
})();

  </script>
</body>
</html>
