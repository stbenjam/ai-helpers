<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ai-helpers</title>
  <style>:root {
    --primary: #dc143c;
    --primary-dark: #a0102a;
    --secondary: #ff6b7a;
    --bg-dark: #0f0f0f;
    --bg-card: #1a1a1a;
    --bg-code: #2d2d2d;
    --text-primary: #f5f5f5;
    --text-secondary: #d4d4d4;
    --text-muted: #a3a3a3;
    --border: #3d3d3d;
    --success: #92cc6f;
    --accent: #ff9800;
    --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    padding-top: 60px;
}

a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

/* Navbar */
nav.navbar {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 0;
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 1000;
}
.navbar-content {
    max-width: 1200px; margin: 0 auto; padding: 0 2rem;
    display: flex; justify-content: space-between; align-items: center; gap: 2rem;
}
.navbar-brand { display: flex; align-items: center; gap: 1.5rem; }
.navbar-title { display: flex; flex-direction: column; gap: 0.125rem; }
.navbar-title h1 {
    font-size: 1.25rem; font-weight: 700;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin: 0;
}
.subtitle { font-size: 0.75rem; color: var(--text-muted); margin: 0; }
.navbar-home { text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 0.125rem; cursor: pointer; }
.navbar-home:hover { text-decoration: none; }
.navbar-home:hover h1 { opacity: 0.85; }
.navbar-stats { display: flex; gap: 1rem; align-items: center; }
.stat-link { text-decoration: none; color: inherit; cursor: pointer; }
.stat-link:hover { text-decoration: none; }
.stat-link:hover .stat-value { color: var(--secondary); }
.stat {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.375rem 0.75rem; background: var(--bg-code);
    border-radius: 6px; border: 1px solid var(--border);
}
.stat-value { font-size: 1rem; font-weight: 700; color: var(--primary); }
.stat-label { color: var(--text-muted); font-size: 0.75rem; }

/* Search */
.search-box { margin-bottom: 2rem; position: relative; }
.search-input {
    width: 100%; padding: 1rem 1.5rem; font-size: 1rem; font-family: inherit;
    background: var(--bg-card); border: 2px solid var(--border);
    border-radius: var(--radius); color: var(--text-primary);
    transition: all 0.3s ease;
}
.search-input:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}
.search-input::placeholder { color: var(--text-muted); }
.search-clear {
    position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-muted); font-size: 1.25rem;
    cursor: pointer; display: none; padding: 0.25rem;
}
.search-clear:hover { color: var(--text-primary); }

/* Plugin grid */
.plugins-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1.5rem; margin-bottom: 3rem;
}
.plugin-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem;
    transition: all 0.3s ease; cursor: pointer;
    height: 100%; display: flex; flex-direction: column;
}
.plugin-card:hover {
    transform: translateY(-2px); border-color: var(--primary);
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
}
.plugin-header {
    display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;
}
.plugin-name { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.25rem; }
.plugin-version {
    font-size: 0.75rem; color: var(--text-muted);
    background: var(--bg-code); padding: 0.25rem 0.5rem; border-radius: 4px;
}
.plugin-description { color: var(--text-secondary); margin-bottom: 1rem; font-size: 0.95rem; }
.plugin-meta-links {
    display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem;
    font-size: 0.8rem;
}
.plugin-meta-links a { color: var(--text-muted); }
.plugin-meta-links a:hover { color: var(--primary); }
.plugin-license {
    font-size: 0.75rem; color: var(--text-muted);
    background: var(--bg-code); padding: 0.125rem 0.5rem; border-radius: 4px;
}
.plugin-category {
    font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--secondary);
    background: rgba(129, 140, 248, 0.12); padding: 0.125rem 0.5rem;
    border-radius: 4px;
}
.plugin-tags { display: flex; gap: 0.375rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.plugin-tag {
    font-size: 0.7rem; color: var(--text-muted);
    background: var(--bg-code); padding: 0.125rem 0.5rem; border-radius: 4px;
    cursor: pointer; transition: all 0.2s ease;
}
.plugin-tag:hover { color: var(--primary); border-color: var(--primary); }
.category-filter {
    display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem;
}
.category-btn {
    font-size: 0.8rem; padding: 0.375rem 0.75rem; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-muted); cursor: pointer; transition: all 0.2s ease;
    font-family: inherit;
}
.category-btn:hover { border-color: var(--primary); color: var(--text-primary); }
.category-btn.active {
    background: var(--primary); color: white; border-color: var(--primary);
}
.item-counts {
    color: var(--text-muted); font-size: 0.875rem;
    display: flex; gap: 1rem; flex-wrap: wrap; margin-top: auto;
}
.item-count { display: flex; align-items: center; gap: 0.25rem; }
.item-count-badge {
    background: var(--bg-code); padding: 0.125rem 0.5rem;
    border-radius: 4px; font-weight: 600;
}

/* Section titles */
.section-title {
    font-size: 0.85rem; font-weight: 600; color: var(--text-primary);
    margin-bottom: 0.75rem; margin-top: 1.5rem;
    text-transform: uppercase; letter-spacing: 0.05em;
}
.section-title:first-child { margin-top: 0; }

/* Search results */
.search-results-heading {
    font-size: 0.8rem; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin: 1.5rem 0 0.75rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
}
.search-results-heading:first-child { margin-top: 0; }
.search-result-item {
    padding: 0.75rem 1rem; margin-bottom: 0.5rem;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; transition: all 0.2s ease;
    display: flex; align-items: center; gap: 0.75rem;
}
.search-result-item:hover {
    border-color: var(--primary); background: var(--bg-code);
}
.search-result-icon {
    flex-shrink: 0; width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.8rem; font-family: 'Monaco', 'Menlo', monospace;
}
.search-result-icon.cmd { background: rgba(146, 204, 111, 0.15); color: var(--success); }
.search-result-icon.skill { background: rgba(255, 152, 0, 0.15); color: var(--accent); }
.search-result-icon.agent { background: rgba(224, 192, 104, 0.15); color: #e0c068; }
.search-result-icon.hook { background: rgba(129, 140, 248, 0.15); color: var(--secondary); }
.search-result-icon.mcp { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
.search-result-icon.rule { background: rgba(163, 163, 163, 0.15); color: var(--text-muted); }
.search-result-icon.plugin { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
.search-result-content { flex: 1; min-width: 0; }
.search-result-title { font-size: 0.95rem; color: var(--text-primary); font-weight: 600; }
.search-result-subtitle {
    font-size: 0.8rem; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.search-result-plugin {
    font-size: 0.75rem; color: var(--text-muted); background: var(--bg-code);
    padding: 0.125rem 0.5rem; border-radius: 4px; flex-shrink: 0;
}
.no-results {
    text-align: center; padding: 3rem; color: var(--text-muted); display: none;
}
.no-results.show { display: block; }
mark {
    background: rgba(99, 102, 241, 0.3); color: var(--text-primary);
    padding: 0 2px; border-radius: 2px;
}

/* Content items — shared across detail and single-plugin view */
.command-item {
    margin-bottom: 1rem; padding: 0.75rem;
    background: var(--bg-code); border-radius: 8px;
}
.command-name {
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    font-size: 0.9rem; color: var(--success); margin-bottom: 0.5rem; font-weight: 600;
}
.command-synopsis {
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;
    padding: 0.5rem; background: var(--bg-dark); border-radius: 4px; overflow-x: auto;
}
.command-description { font-size: 0.875rem; color: var(--text-muted); }
.skill-item {
    margin-bottom: 1rem; padding: 0.75rem;
    background: var(--bg-code); border-radius: 8px; border-left: 3px solid var(--accent);
}
.skill-name { font-size: 0.95rem; color: var(--accent); margin-bottom: 0.5rem; font-weight: 600; }
.skill-description { font-size: 0.875rem; color: var(--text-muted); }
.skill-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; }
.agent-item {
    margin-bottom: 1rem; padding: 0.75rem;
    background: var(--bg-code); border-radius: 8px; border-left: 3px solid #e0c068;
}
.agent-name { font-size: 0.95rem; color: #e0c068; margin-bottom: 0.5rem; font-weight: 600; }
.agent-description { font-size: 0.875rem; color: var(--text-muted); }
.hook-item {
    margin-bottom: 1rem; padding: 0.75rem;
    background: var(--bg-code); border-radius: 8px; border-left: 3px solid var(--secondary);
}
.hook-name { font-size: 0.95rem; color: var(--secondary); margin-bottom: 0.5rem; font-weight: 600; }
.hook-type {
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;
}
.mcp-item {
    margin-bottom: 1rem; padding: 0.75rem;
    background: var(--bg-code); border-radius: 8px; border-left: 3px solid #60a5fa;
}
.mcp-name { font-size: 0.95rem; color: #60a5fa; margin-bottom: 0.5rem; font-weight: 600; }
.mcp-type {
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;
}
.rule-item {
    margin-bottom: 1rem; padding: 0.75rem;
    background: var(--bg-code); border-radius: 8px; border-left: 3px solid var(--text-muted);
}
.rule-name { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 600; }
.rule-description { font-size: 0.875rem; color: var(--text-muted); }
.rule-paths {
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;
}
.code-block {
    background: var(--bg-code); padding: 1rem; border-radius: 8px;
    font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    font-size: 0.9rem; color: var(--success); margin: 0.5rem 0;
    overflow-x: auto; white-space: pre;
}

/* Inline markdown */
.md-body code {
    background: var(--bg-code); padding: 1px 5px; border-radius: 3px;
    font-size: 0.9em; color: var(--text-secondary);
}
.md-body strong { color: var(--text-primary); }
.md-body a { color: var(--primary); }

/* Modal */
/* Plugin detail view */
.detail-back {
    display: inline-flex; align-items: center; gap: 0.5rem;
    color: var(--text-muted); font-size: 0.875rem; cursor: pointer;
    background: none; border: none; font-family: inherit;
    margin-bottom: 1.5rem; padding: 0;
}
.detail-back:hover { color: var(--primary); }
.detail-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 1rem;
}
.detail-title-section { flex: 1; }
.detail-title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }
.detail-meta { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
.detail-body { margin-top: 1rem; }
.detail-filter {
    width: 100%; padding: 0.5rem 0.75rem; font-size: 0.875rem; font-family: inherit;
    background: var(--bg-code); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-primary); margin-bottom: 1rem;
    transition: border-color 0.2s;
}
.detail-filter:focus { outline: none; border-color: var(--primary); }
.detail-filter::placeholder { color: var(--text-muted); }
.modal-section-items[data-filtered="true"] .command-item,
.modal-section-items[data-filtered="true"] .skill-item,
.modal-section-items[data-filtered="true"] .agent-item,
.modal-section-items[data-filtered="true"] .hook-item,
.modal-section-items[data-filtered="true"] .mcp-item,
.modal-section-items[data-filtered="true"] .rule-item { display: none; }
.modal-section-items[data-filtered="true"] .modal-match { display: block; }
.close-button {
    background: none; border: none; color: var(--text-muted);
    font-size: 2rem; cursor: pointer; padding: 0;
    width: 2rem; height: 2rem;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.3s ease;
}
.close-button:hover { color: var(--primary); }

footer { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.875rem; }
footer a { color: var(--primary); }

/* Responsive */
@media (max-width: 968px) {
    .navbar-content { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .navbar-brand { width: 100%; justify-content: space-between; }
    .navbar-stats { gap: 0.5rem; }
    .stat-label { display: none; }
    .plugins-grid { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
    .navbar-stats { flex-wrap: wrap; }
}
</style>
</head>

, "hooks": [], "mcp_servers": [], "rules": [], "category": "development", "keywords": ["sbom", "ai-usage", "transparency"], "author": {"name": "github.com/openshift-eng"}}, {"name": "bigquery", "description": "BigQuery cost analysis and optimization utilities", "version": "0.0.6", "has_readme": true, "commands": [{"name": "analyze-usage", "full_name": "bigquery:analyze-usage", "description": "Analyze BigQuery usage and costs for a project", "description_html": "Analyze BigQuery usage and costs for a project", "synopsis": "/bigquery:analyze-usage \u003cproject-id\u003e \u003ctimeframe\u003e\n/bigquery:analyze-usage openshift-ci-data-analysis \"24 hours\"\n/bigquery:analyze-usage my-project \"7 days\"", "body_html": "\u003cp\u003eThe \u003ccode\u003eanalyze-usage\u003c/code\u003e command provides comprehensive analysis of BigQuery usage patterns, costs, and query performance for a given project. It identifies expensive queries, heavy users, and provides actionable optimization recommendations.\u003c/p\u003e\u003cp\u003eThis command helps answer questions like:\u003cbr\u003e- Which users or service accounts are consuming the most data?\u003cbr\u003e- What are the most expensive queries?\u003cbr\u003e- Which query patterns are running most frequently?\u003cbr\u003e- How can we reduce BigQuery costs?\u003cbr\u003e- Are we over any usage thresholds?\u003c/p\u003e\u003cp\u003eThe analysis includes:\u003cbr\u003e- Total usage summary (queries, data scanned, estimated costs)\u003cbr\u003e- Usage breakdown by user/service account\u003cbr\u003e- Per-user deep dive analysis for top 2-3 users\u003cbr\u003e- Top individual queries by cost\u003cbr\u003e- Query pattern analysis to identify optimization opportunities\u003cbr\u003e- Specific, actionable optimization recommendations\u003cbr\u003e- Optional markdown report generation\u003c/p\u003e"}], "skills": [{"name": "analyze-usage", "description": "Comprehensive analysis of BigQuery usage patterns, costs, and query performance", "description_html": "Comprehensive analysis of BigQuery usage patterns, costs, and query performance", "meta": ""}, {"name": "ci-data-analyst", "description": "Safely query and report on OpenShift CI prow job and test data in BigQuery with cost controls, dry-run validation, and local caching of results", "description_html": "Safely query and report on OpenShift CI prow job and test data in BigQuery with cost controls, dry-run validation, and local caching of results", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "data", "keywords": ["bigquery", "sql", "analytics", "cost-analysis"], "author": {"name": "github.com/openshift-eng"}}, {"name": "ci", "description": "Tools for working with OpenShift CI and analyzing Prow job results", "version": "0.0.42", "has_readme": true, "commands": [{"name": "add-debug-wait", "full_name": "ci:add-debug-wait", "description": "Add a wait step to a CI workflow for debugging test failures", "description_html": "Add a wait step to a CI workflow for debugging test failures", "synopsis": "/ci:add-debug-wait \u003cworkflow-or-job-name\u003e [timeout]", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:add-debug-wait\u003c/code\u003e command adds a \u003ccode\u003ewait\u003c/code\u003e step to a CI job/workflow for debugging test failures.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat it does:\u003c/strong\u003e\u003cbr\u003e1. Takes job name, OCP version, and optional timeout as input\u003cbr\u003e2. Finds and edits the job config or workflow file\u003cbr\u003e3. Adds \u003ccode\u003e- ref: wait\u003c/code\u003e before the last test step (with optional timeout configuration)\u003cbr\u003e4. Creates a git commit\u003cbr\u003e5. Pushes the commit to your fork (\u003ccode\u003eorigin\u003c/code\u003e remote)\u003cbr\u003e6. Creates a PR via \u003ccode\u003egh\u003c/code\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThat&#x27;s it!\u003c/strong\u003e Simple, fast, and automated.\u003c/p\u003e"}, {"name": "analyze-disruption", "full_name": "ci:analyze-disruption", "description": "Analyze and compare disruption across one or more Prow CI job runs", "description_html": "Analyze and compare disruption across one or more Prow CI job runs", "synopsis": "Analyze disruption events across one or more CI job runs, comparing backends to identify root causes:\n```text\n/ci:analyze-disruption \u003cprowjob-url-1\u003e [prowjob-url-2 ...] [--backends backend1,backend2,...]\n```", "body_html": "\u003cp\u003eAnalyze disruption recorded in Prow CI job runs by downloading interval/timeline data, audit logs, and pod logs, then comparing disruption events across backends and job runs to identify patterns and root causes.\u003c/p\u003e\u003cp\u003eThe command accepts:\u003cbr\u003e- One or more Prow job URLs (required, at least 1)\u003cbr\u003e- An optional \u003ccode\u003e--backends\u003c/code\u003e flag with a comma-separated list of backend names to focus on\u003c/p\u003e\u003cp\u003eWhen multiple job runs are provided, the command compares and contrasts disruption patterns across runs to find commonalities that point to systemic issues vs one-off infrastructure problems.\u003c/p\u003e\u003cp\u003e### What It Does\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eDownloads interval/timeline data\u003c/strong\u003e for each job run and locates the disruption section\u003cbr\u003e2. \u003cstrong\u003eIdentifies disruption intervals\u003c/strong\u003e by hovering-equivalent inspection of failed request messages\u003cbr\u003e3. \u003cstrong\u003eCorrelates with cluster activity\u003c/strong\u003e \u2014 what else was happening when disruption occurred\u003cbr\u003e4. \u003cstrong\u003eClassifies disruption by backend type\u003c/strong\u003e:\u003cbr\u003e   - \u003cstrong\u003eCache backends\u003c/strong\u003e (e.g., \u003ccode\u003e\u003cem\u003e-cache-\u003c/em\u003e\u003c/code\u003e) \u2014 implies etcd problems or global networking issues\u003cbr\u003e   - \u003cstrong\u003eNon-cache backends\u003c/strong\u003e \u2014 implies the actual component or cluster networking had problems\u003cbr\u003e   - \u003cstrong\u003e\u003ccode\u003eci-cluster-network-liveness\u003c/code\u003e\u003c/strong\u003e \u2014 canary backend polling a static external endpoint from the test cluster; significant disruption here means the test infrastructure itself had network issues, making actual measured disruption much less valuable for that run\u003cbr\u003e   - \u003cstrong\u003eCloud network-liveness backends\u003c/strong\u003e \u2014 monitor connectivity from the test cluster to static cloud backends; used to detect cloud-provider-level issues\u003cbr\u003e5. \u003cstrong\u003eAnalyzes audit logs\u003c/strong\u003e for kube-api, oauth-api, and openshift-api samplers to determine if requests were received (issue inside cluster) or missing (issue between test cluster and load balancer)\u003cbr\u003e6. \u003cstrong\u003eReviews pod logs\u003c/strong\u003e for etcd-specific messages (leader changes, write delays)\u003cbr\u003e7. \u003cstrong\u003eChecks for high CPU\u003c/strong\u003e correlation with mass disruption events\u003cbr\u003e8. \u003cstrong\u003eCross-run comparison\u003c/strong\u003e (when multiple runs provided) \u2014 identifies which disruption patterns are consistent vs isolated\u003c/p\u003e\u003cp\u003e### Backend Interpretation Guide\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eCache backends disrupted\u003c/strong\u003e \u2192 likely etcd or global networking problem\u003cbr\u003e- \u003cstrong\u003eNon-cache backends disrupted\u003c/strong\u003e \u2192 likely component-specific or cluster networking problem\u003cbr\u003e- \u003cstrong\u003eci-cluster-network-liveness disrupted\u003c/strong\u003e \u2192 test infrastructure network issues; discount disruption from that run\u003cbr\u003e- \u003cstrong\u003eCloud network-liveness disrupted\u003c/strong\u003e \u2192 cloud provider issues\u003cbr\u003e- \u003cstrong\u003eAll backends disrupted simultaneously\u003c/strong\u003e \u2192 likely node-level issue (high CPU, node shutdown)\u003c/p\u003e\u003cp\u003e### Responsibility Routing\u003c/p\u003e\u003cp\u003eDisruption responsibility spans multiple teams. The more detail tracked down, the better the routing:\u003cbr\u003e- \u003cstrong\u003eNetworking team\u003c/strong\u003e \u2014 network-related disruptions, any disruptions related to the network or connectivity\u003cbr\u003e- \u003cstrong\u003eWorkloads team\u003c/strong\u003e \u2014 pod lifecycle, readiness probe issues\u003cbr\u003e- \u003cstrong\u003eAPI Server team\u003c/strong\u003e \u2014 API server disruption, audit log gaps\u003cbr\u003e- \u003cstrong\u003eNode team\u003c/strong\u003e \u2014 node shutdown sequencing, kubelet behavior, high CPU\u003c/p\u003e"}, {"name": "analyze-payload", "full_name": "ci:analyze-payload", "description": "Analyze a payload (rejected, accepted, or in-progress) with historical lookback to identify root causes of blocking job failures", "description_html": "Analyze a payload (rejected, accepted, or in-progress) with historical lookback to identify root causes of blocking job failures", "synopsis": "/ci:analyze-payload \u003cpayload-tag\u003e [--lookback N]", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:analyze-payload\u003c/code\u003e command analyzes a specific payload tag, investigates every failed blocking job, and produces a self-contained HTML report summarizing what went wrong.\u003c/p\u003e\u003cp\u003eIt supports \u003cstrong\u003eRejected\u003c/strong\u003e payloads (full analysis), \u003cstrong\u003eReady\u003c/strong\u003e payloads (early analysis of blocking jobs that have already failed, to determine if the payload is on track for rejection), and \u003cstrong\u003eAccepted\u003c/strong\u003e payloads (which may have been force-accepted despite blocking job failures).\u003c/p\u003e\u003cp\u003eIt performs \u003cstrong\u003ehistorical lookback\u003c/strong\u003e through consecutive rejected payloads to determine when each failure first appeared. For each originating payload (where a job first started failing), it fetches the new PRs introduced in that payload as likely culprits. This distinguishes new failures from persistent/permafailing jobs and helps identify the root cause commits.\u003c/p\u003e\u003cp\u003eWhen a candidate PR can be correlated with high confidence (&gt;= 85 rubric score) to a blocking job failure \u2014 based on component match, error analysis, and timing \u2014 the report will \u003cstrong\u003erecommend it for immediate revert\u003c/strong\u003e. Per OCP policy, PRs that break payloads MUST be reverted; fixes can be re-landed after the revert restores payload health. The \u003ccode\u003e/ci:payload-revert\u003c/code\u003e command can then be used to automatically create TRT JIRA bugs, open revert PRs, and trigger payload validation jobs for all high-confidence candidates.\u003c/p\u003e\u003cp\u003eThe payload results YAML output (\u003ccode\u003epayload-results-{tag}.yaml\u003c/code\u003e) can be consumed by composable downstream commands: \u003ccode\u003e/ci:payload-revert\u003c/code\u003e stages reverts for high-confidence candidates, and \u003ccode\u003e/ci:payload-experiment\u003c/code\u003e opens draft revert PRs for medium-confidence candidates to experimentally determine causality.\u003c/p\u003e\u003cp\u003eFailed jobs are investigated \u003cstrong\u003ein parallel\u003c/strong\u003e using subagents with the appropriate analysis skill (install failure vs test failure).\u003c/p\u003e\u003cp\u003e### Key Features\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eHistorical lookback\u003c/strong\u003e: Walks back through up to N consecutive rejected payloads (default 10) to find when each job first started failing\u003cbr\u003e- \u003cstrong\u003ePR correlation\u003c/strong\u003e: Uses the \u003ccode\u003efetch-new-prs-in-payload\u003c/code\u003e skill to identify PRs that landed in the originating payload for each failure\u003cbr\u003e- \u003cstrong\u003eParallel investigation\u003c/strong\u003e: Kicks off subagents for each failed blocking job using the appropriate CI analysis skill\u003cbr\u003e- \u003cstrong\u003eRevert recommendations\u003c/strong\u003e: Proposes specific PRs to revert when the evidence strongly links them to a failure\u003cbr\u003e- \u003cstrong\u003eHTML report\u003c/strong\u003e: Generates an attractive, self-contained HTML report with collapsible sections, color-coded severity, and executive summary\u003c/p\u003e"}, {"name": "analyze-pr-reverts", "full_name": "ci:analyze-pr-reverts", "description": "Analyze recent PR reverts to identify patterns and recommend preventive measures", "description_html": "Analyze recent PR reverts to identify patterns and recommend preventive measures", "synopsis": "/ci:analyze-pr-reverts [limit]", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:analyze-pr-reverts\u003c/code\u003e command fetches recently reverted pull requests from the Sippy API and analyzes them to identify common failure patterns, the most affected repositories, and recommends concrete preventive measures such as new presubmit jobs, org-wide CodeRabbit review rules, or process changes.\u003c/p\u003e\u003cp\u003eThis command is intended to be run periodically (e.g., monthly) to track revert trends over time.\u003c/p\u003e"}, {"name": "analyze-prow-job-install-failure", "full_name": "ci:analyze-prow-job-install-failure", "description": "Analyze OpenShift installation failures in Prow CI jobs", "description_html": "Analyze OpenShift installation failures in Prow CI jobs", "synopsis": "/ci:analyze-prow-job-install-failure \u003cprowjob-url\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:analyze-prow-job-install-failure\u003c/code\u003e command analyzes OpenShift installation failures in Prow CI jobs by downloading and examining installer logs, log bundles, and sosreports (for metal jobs). This command is specifically designed to debug failures in the \u003cstrong\u003e&quot;install should succeed: overall&quot;\u003c/strong\u003e test, which indicates that the installation process failed at some stage.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImportant\u003c/strong\u003e: All &quot;install should succeed&quot; tests have a specific suffix indicating the failure stage (configuration, infrastructure, cluster bootstrap, cluster creation, cluster operator stability, or other). The JUnit XML contains both the specific failure reason test (which fails) and the overall test (which also fails when any stage fails). This command analyzes the specific failure stage to provide targeted diagnostics.\u003c/p\u003e\u003cp\u003eThe command accepts:\u003cbr\u003e- Prow job URL (required): URL to the failed CI job from prow.ci.openshift.org\u003c/p\u003e\u003cp\u003eIt downloads relevant artifacts from Google Cloud Storage, analyzes them, and generates a comprehensive report with findings and recommended next steps.\u003c/p\u003e\u003cp\u003e### Recognized Failure Modes\u003c/p\u003e\u003cp\u003eThe command identifies the failure mode from \u003ccode\u003ejunit_install.xml\u003c/code\u003e and tailors its analysis:\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003e&quot;install should succeed: configuration&quot;\u003c/strong\u003e - Extremely rare failure where install-config.yaml validation failed. Focus on installer log only.\u003cbr\u003e- \u003cstrong\u003e&quot;install should succeed: infrastructure&quot;\u003c/strong\u003e - Failed to create cloud resources. Usually due to cloud quota, rate limiting, or outages. Log bundle may not exist.\u003cbr\u003e- \u003cstrong\u003e&quot;install should succeed: cluster bootstrap&quot;\u003c/strong\u003e - Bootstrap node failed to start temporary control plane. Check bootkube logs in the bundle.\u003cbr\u003e- \u003cstrong\u003e&quot;install should succeed: cluster creation&quot;\u003c/strong\u003e - One or more operators unable to deploy. Check operator logs in gather-must-gather.\u003cbr\u003e- \u003cstrong\u003e&quot;install should succeed: cluster operator stability&quot;\u003c/strong\u003e - Operators never stabilized (stuck progressing/degraded). Check operator status and logs.\u003cbr\u003e- \u003cstrong\u003e&quot;install should succeed: other&quot;\u003c/strong\u003e - Unknown failure requiring comprehensive analysis of all available logs.\u003c/p\u003e"}, {"name": "analyze-prow-job-resource", "full_name": "ci:analyze-prow-job-resource", "description": "Analyze Kubernetes resource lifecycle in Prow job artifacts", "description_html": "Analyze Kubernetes resource lifecycle in Prow job artifacts", "synopsis": "Generate a report showing the lifecycle of a single resource:\n```\n/ci:analyze-prow-job-resource \u003cprowjob-url\u003e [namespace:][kind/][resource-name]\n```\nGenerate a report showing multiple resource lifecycles:\n```\n/ci:analyze-prow-job-resource \u003cprowjob-url\u003e [namespace:][kind/][resource-name],[namespace:][kind/][resource-name],...\n```", "body_html": "Analyze the lifecycle of Kubernetes resource(s) in a Prow CI job by invoking the &quot;prow-job-analyze-resource&quot; skill."}, {"name": "analyze-prow-job-test-failure", "full_name": "ci:analyze-prow-job-test-failure", "description": "Analyzes test errors from console logs and Prow CI job artifacts", "description_html": "Analyzes test errors from console logs and Prow CI job artifacts", "synopsis": "Generate a test failure analysis for the given test:\n```text\n/ci:analyze-prow-job-test-failure \u003cprowjob-url\u003e [test-name] [--fast]\n```", "body_html": "\u003cp\u003eAnalyze a failed test by inspecting the test code in the current project and artifacts in Prow CI job. This is done by invoking the &quot;prow-job-analyze-test-failure&quot; skill.\u003c/p\u003e\u003cp\u003eThe command provides comprehensive analysis by:\u003cbr\u003e- Examining test failure stack traces and source code\u003cbr\u003e- Analyzing test execution timeline and cluster events during the test\u003cbr\u003e- \u003cstrong\u003eOptionally\u003c/strong\u003e extracting and analyzing must-gather data for cluster-level diagnostics\u003cbr\u003e- \u003cstrong\u003eHyperShift support\u003c/strong\u003e: Detects and analyzes both management cluster and hosted cluster must-gather data\u003cbr\u003e- Correlating cluster issues (degraded operators, failing pods, node problems) with test failures\u003cbr\u003e- \u003cstrong\u003eEnhanced output\u003c/strong\u003e: Structured Markdown format with clear sections and artifact organization\u003c/p\u003e\u003cp\u003e### User Experience\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDefault (comprehensive analysis)\u003c/strong\u003e:\u003cbr\u003e``\u003ccode\u003etext\u003cbr\u003e/ci:analyze-prow-job-test-failure &lt;url&gt;\u003cbr\u003e\u003c/code\u003e`\u003ccode\u003e\u003cbr\u003e- No test name needed \u2014 analyzes all failed CI steps from JUnit XML, build logs, and step artifacts\u003cbr\u003e- Detects must-gather availability\u003cbr\u003e- Provides correlated step + cluster analysis\u003cbr\u003e- This is the common case for multi-step CI workflows (e.g. HyperShift, bare-metal OADP jobs)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWith specific test name\u003c/strong\u003e:\u003cbr\u003e\u003c/code\u003e`\u003ccode\u003etext\u003cbr\u003e/ci:analyze-prow-job-test-failure &lt;url&gt; &lt;test-name&gt;\u003cbr\u003e\u003c/code\u003e`\u003ccode\u003e\u003cbr\u003e- Focuses analysis on the named test&#x27;s stack trace and logs\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFast mode (skip must-gather)\u003c/strong\u003e:\u003cbr\u003e\u003c/code\u003e`\u003ccode\u003etext\u003cbr\u003e/ci:analyze-prow-job-test-failure &lt;url&gt; [test-name] --fast\u003cbr\u003e\u003c/code\u003e`\u003ccode\u003e\u003cbr\u003e- Skips must-gather detection and extraction only\u003cbr\u003e- Scope is preserved: test-level when \u003c/code\u003etest-name` is provided, step-level across all failed CI steps when omitted\u003cbr\u003e- Faster results, but may miss cluster-level root causes\u003c/p\u003e\u003cp\u003e### HyperShift Support\u003c/p\u003e\u003cp\u003eFor HyperShift jobs with hosted clusters, the command automatically:\u003cbr\u003e- Detects HyperShift dump archives in various locations (dump-management-cluster, hypershift-mce-dump, run-e2e-local, etc.)\u003cbr\u003e- Extracts archives containing management and/or hosted cluster data\u003cbr\u003e- Splits data into separate directories for independent analysis\u003cbr\u003e- Detects hosted cluster data within archives (hostedcluster-* directory)\u003cbr\u003e- Provides separate diagnostic sections for each cluster\u003cbr\u003e- Correlates issues across both clusters in root cause analysis\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNote\u003c/strong\u003e: HyperShift jobs may use different artifact structures depending on the workflow and test type.\u003c/p\u003e"}, {"name": "analyze-regression", "full_name": "ci:analyze-regression", "description": "Analyze details about a Component Readiness regression and suggest next steps", "description_html": "Analyze details about a Component Readiness regression and suggest next steps", "synopsis": "/ci:analyze-regression \u003cregression id\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:analyze-regression\u003c/code\u003e command analyzes details for a specific Component Readiness regression and suggests next steps for investigation.\u003c/p\u003e\u003cp\u003eThe command performs a full analysis regardless of whether the regression has been triaged. For triaged regressions, it also fetches the linked JIRA issue to analyze whether someone is actively working on the fix or if the issue needs attention.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003c/p\u003e\u003cp\u003e- Understanding regression patterns and failure modes\u003cbr\u003e- Checking if a triaged regression is being actively worked on or needs attention\u003cbr\u003e- Identifying related regressions that might be caused by the same issue\u003cbr\u003e- Getting pointers on where to investigate next\u003c/p\u003e"}, {"name": "ask-sippy", "full_name": "ci:ask-sippy", "description": "Ask the Sippy AI agent questions about OpenShift CI payloads, jobs, and test results", "description_html": "Ask the Sippy AI agent questions about OpenShift CI payloads, jobs, and test results", "synopsis": "/ask-sippy [question]", "body_html": "\u003cp\u003eThe \u003ccode\u003eask-sippy\u003c/code\u003e command allows you to query the Sippy AI agent, which has deep knowledge about OpenShift CI infrastructure, including:\u003cbr\u003e- CI payload status and rejection reasons\u003cbr\u003e- Job failures and patterns\u003cbr\u003e- Test results and trends\u003cbr\u003e- Release quality metrics\u003cbr\u003e- Historical CI data analysis\u003c/p\u003e\u003cp\u003eThe command sends your question to the Sippy API and returns the agent&#x27;s\u003cbr\u003eresponse. Complex queries may take some time to process as the agent\u003cbr\u003eanalyzes CI data. Inform the user of this.\u003c/p\u003e"}, {"name": "check-if-jira-regression-is-ongoing", "full_name": "ci:check-if-jira-regression-is-ongoing", "description": "Check if the regression described in a Jira bug is still ongoing or has resolved", "description_html": "Check if the regression described in a Jira bug is still ongoing or has resolved", "synopsis": "/ci:check-if-jira-regression-is-ongoing \u003cjira-key-or-url\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:check-if-jira-regression-is-ongoing\u003c/code\u003e command reads a Jira bug and determines whether the regression(s) it describes are still actively failing or have resolved. It extracts test names, test IDs, and regression IDs from the bug description, status, and comments, then cross-references with live data from Sippy and Component Readiness.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003c/p\u003e\u003cp\u003e- Checking if a bug&#x27;s regression has resolved and the bug can be closed\u003cbr\u003e- Finding out if new regressions have appeared for the same test since the bug was filed\u003cbr\u003e- Discovering if other triaged bugs exist for the same test that don&#x27;t match this bug\u003cbr\u003e- Getting a quick status on whether a fix has landed and is effective\u003c/p\u003e"}, {"name": "continue-session", "full_name": "ci:continue-session", "description": "Download and continue a Claude session from a Prow CI job's artifacts", "description_html": "Download and continue a Claude session from a Prow CI job&#x27;s artifacts", "synopsis": "/ci:continue-session \u003cprowjob-url\u003e", "body_html": "\u003cp\u003eDownloads Claude session artifacts from a Prow CI job and allows you to continue one of those sessions locally. This is useful when Claude ran as part of a CI job and you want to pick up where it left off.\u003c/p\u003e\u003cp\u003eThe command accepts:\u003cbr\u003e- \u003cstrong\u003eprowjob-url\u003c/strong\u003e (required): URL to a Prow job run\u003c/p\u003e"}, {"name": "extract-kubeconfig", "full_name": "ci:extract-kubeconfig", "description": "Extract kubeconfig from a running CI job in a PR", "description_html": "Extract kubeconfig from a running CI job in a PR", "synopsis": "/ci:extract-kubeconfig \u003cpr-url\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:extract-kubeconfig\u003c/code\u003e command extracts the kubeconfig from a running rehearsal/CI job in a GitHub PR. It checks the job&#x27;s step status to determine if the cluster is ready, then connects to the build cluster to extract the kubeconfig from the running pod.\u003c/p\u003e\u003cp\u003eThe command accepts:\u003cbr\u003e- \u003cstrong\u003ePR URL\u003c/strong\u003e (required): GitHub PR URL in the \u003ccode\u003eopenshift/release\u003c/code\u003e repository\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat it does:\u003c/strong\u003e\u003cbr\u003e1. Validates the PR URL and checks ownership\u003cbr\u003e2. Finds running (PENDING) jobs on the PR\u003cbr\u003e3. Determines the build cluster (via GCS for public jobs, or via job config in the repo for qe-private-deck jobs)\u003cbr\u003e4. Logs into the build cluster and finds the CI namespace\u003cbr\u003e5. Checks step status via pod statuses to verify the cluster is ready\u003cbr\u003e6. Extracts the kubeconfig (and nested kubeconfig for HyperShift) from the running pod\u003cbr\u003e7. Verifies cluster health and reports results\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey features:\u003c/strong\u003e\u003cbr\u003e- Supports both standard and HyperShift (nested kubeconfig) clusters\u003cbr\u003e- Supports both public (\u003ccode\u003eprow.ci.openshift.org\u003c/code\u003e) and private (\u003ccode\u003eqe-private-deck\u003c/code\u003e) jobs\u003cbr\u003e- Uses ci-op namespace prefix on kubeconfig filenames to support multiple concurrent extractions\u003cbr\u003e- Warns if you&#x27;re not the PR author (may lack namespace access)\u003cbr\u003e- Recognizes \u003ccode\u003ewait\u003c/code\u003e steps as valid running states for extraction\u003c/p\u003e"}, {"name": "extract-prow-job-must-gather", "full_name": "ci:extract-prow-job-must-gather", "description": "Extract and decompress must-gather archives from Prow job artifacts", "description_html": "Extract and decompress must-gather archives from Prow job artifacts", "synopsis": "/ci:extract-prow-job-must-gather \u003cprowjob-url\u003e", "body_html": "Extract the must-gather archive from a Prow CI job by invoking the &quot;prow-job-extract-must-gather&quot; skill."}, {"name": "fetch-payloads", "full_name": "ci:fetch-payloads", "description": "Fetch recent release payloads from the OpenShift release controller", "description_html": "Fetch recent release payloads from the OpenShift release controller", "synopsis": "/ci:fetch-payloads [architecture] [version] [stream]", "body_html": "The \u003ccode\u003eci:fetch-payloads\u003c/code\u003e command fetches recent release payloads from the OpenShift release controller. It shows each payload&#x27;s tag name, phase (Accepted/Rejected/Ready), timestamp, and blocking job results. For rejected payloads, it reports which blocking jobs failed with Prow links."}, {"name": "fetch-test-report", "full_name": "ci:fetch-test-report", "description": "Fetch a test report from Sippy showing pass rates, test ID, and Jira component", "description_html": "Fetch a test report from Sippy showing pass rates, test ID, and Jira component", "synopsis": "/ci:fetch-test-report \u003ctest-name\u003e [release]", "body_html": "The \u003ccode\u003eci:fetch-test-report\u003c/code\u003e command fetches a report for an OpenShift CI test by name from the Sippy API. It returns the test&#x27;s BigQuery/Component Readiness test ID, Jira component, pass rates for the current and previous 7-day periods, and open bug counts. The \u003ccode\u003eopen_bugs\u003c/code\u003e field counts Jira bugs that mention this test by name \u2014 this can help surface bugs that have been filed but not yet triaged in Component Readiness."}, {"name": "list-step", "full_name": "ci:list-step", "description": "List the step for the given workflow or chain name", "description_html": "List the step for the given workflow or chain name", "synopsis": "/ci:list-step \u003cworkflow-or-chain-name\u003e", "body_html": "\u003cp\u003eThe ci:list-step command analyzes an OpenShift CI workflow or chain and provides a complete hierarchical breakdown of all the workflow, chain, and ref\u003cbr\u003efiles with their repo paths that make up the workflow or chain.\u003c/p\u003e\u003cp\u003eThe command accepts:\u003cbr\u003e- Workflow/Chain name (required)\u003c/p\u003e\u003cp\u003eIt uses the step-registry-analyzer agent to examine the workflow/chain structure and identify all related components including workflows, chains, refs, and\u003cbr\u003etheir associated command files.\u003c/p\u003e"}, {"name": "list-unstable-tests", "full_name": "ci:list-unstable-tests", "description": "List unstable tests with pass rate below 95%", "description_html": "List unstable tests with pass rate below 95%", "synopsis": "/ci:list-unstable-tests \u003cversion\u003e \u003ckeywords\u003e [sippy-url]", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:list-unstable-tests\u003c/code\u003e command queries OpenShift CI test results from Sippy and lists all tests matching the keywords that have a pass rate below 95%. This is useful for quickly identifying unstable tests that need attention.\u003c/p\u003e\u003cp\u003eBy default, it queries the production Sippy instance at \u003ccode\u003esippy.dptools.openshift.org\u003c/code\u003e. You can optionally specify a different Sippy instance URL to query alternative environments (e.g., QE component readiness).\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003cbr\u003e- Identifying unstable tests with inconsistent pass rates\u003cbr\u003e- Finding regression candidates for investigation\u003cbr\u003e- Generating reports of unstable test cases\u003cbr\u003e- Prioritizing test stabilization efforts\u003cbr\u003e- Quality gate checks before releases\u003c/p\u003e"}, {"name": "payload-experiment", "full_name": "ci:payload-experiment", "description": "Open draft revert PRs for medium-confidence payload candidates and trigger payload jobs to experimentally determine which PR is causing failures", "description_html": "Open draft revert PRs for medium-confidence payload candidates and trigger payload jobs to experimentally determine which PR is causing failures", "synopsis": "/ci:payload-experiment \u003cpayload-tag\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:payload-experiment\u003c/code\u003e command opens draft revert PRs for medium-confidence payload candidates (confidence score 60-84) and triggers payload jobs to experimentally determine which PR is causing failures. It operates in two phases separated by a CI wait period.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 1\u003c/strong\u003e: Reads the payload results YAML, filters medium-confidence candidates, opens draft revert PRs, triggers payload jobs, and appends action entries (\u003ccode\u003etype: &quot;experiment&quot;\u003c/code\u003e, \u003ccode\u003estatus: &quot;pending&quot;\u003c/code\u003e) to each candidate&#x27;s \u003ccode\u003eactions\u003c/code\u003e array.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhase 2\u003c/strong\u003e: Detects candidates with a \u003ccode\u003estatus: &quot;pending&quot;\u003c/code\u003e action entry in the results YAML, checks job results, promotes confirmed causes to real revert PRs (with TRT JIRA bugs), and closes innocent draft PRs.\u003c/p\u003e\u003cp\u003eAll state is tracked in the payload results YAML via the \u003ccode\u003epayload-results-yaml\u003c/code\u003e skill \u2014 no separate tracking file is created.\u003c/p\u003e\u003cp\u003eThis command is one of three composable stages in the payload triage pipeline:\u003cbr\u003e1. \u003ccode\u003e/ci:analyze-payload\u003c/code\u003e \u2014 produces the payload results YAML\u003cbr\u003e2. \u003ccode\u003e/ci:payload-revert\u003c/code\u003e \u2014 stages reverts for HIGH confidence candidates\u003cbr\u003e3. \u003ccode\u003e/ci:payload-experiment\u003c/code\u003e \u2014 experimentally tests MEDIUM confidence candidates (this command)\u003c/p\u003e\u003cp\u003e### Job Triggering Limits\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eNon-aggregated jobs\u003c/strong\u003e: Up to 5 total across all candidates\u003cbr\u003e- \u003cstrong\u003eAggregated jobs\u003c/strong\u003e: Up to 1 total\u003c/p\u003e"}, {"name": "payload-revert", "full_name": "ci:payload-revert", "description": "Stage reverts for high-confidence payload candidates identified by analyze-payload", "description_html": "Stage reverts for high-confidence payload candidates identified by analyze-payload", "synopsis": "/ci:payload-revert \u003cpayload-tag\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:payload-revert\u003c/code\u003e command reads the payload results YAML produced by \u003ccode\u003e/ci:analyze-payload\u003c/code\u003e and stages reverts for all high-confidence candidates (confidence score &gt;= 85) that have not already been reverted.\u003c/p\u003e\u003cp\u003eFor each qualifying candidate, it creates a TRT JIRA bug, opens a revert PR, and triggers payload validation jobs using the \u003ccode\u003estage-payload-reverts\u003c/code\u003e skill.\u003c/p\u003e\u003cp\u003eThis command is one of three composable stages in the payload triage pipeline:\u003cbr\u003e1. \u003ccode\u003e/ci:analyze-payload\u003c/code\u003e \u2014 produces the payload results YAML\u003cbr\u003e2. \u003ccode\u003e/ci:payload-revert\u003c/code\u003e \u2014 stages reverts for HIGH confidence candidates (this command)\u003cbr\u003e3. \u003ccode\u003e/ci:payload-experiment\u003c/code\u003e \u2014 opens draft revert PRs for MEDIUM confidence candidates\u003c/p\u003e\u003cp\u003e### Job Triggering Limits\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eNon-aggregated jobs\u003c/strong\u003e: Up to 5 total across all candidates\u003cbr\u003e- \u003cstrong\u003eAggregated jobs\u003c/strong\u003e: Up to 1 total\u003c/p\u003e\u003cp\u003eWhen the number of failing jobs across all candidates exceeds these limits, prioritize jobs from higher-confidence candidates first.\u003c/p\u003e"}, {"name": "query-job-status", "full_name": "ci:query-job-status", "description": "Query the status of a gangway job execution by ID", "description_html": "Query the status of a gangway job execution by ID", "synopsis": "/query-job-status \u003cexecution-id\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003equery-job-status\u003c/code\u003e command queries the status of a gangway job execution via the REST API using the execution ID returned when a job is triggered.\u003c/p\u003e\u003cp\u003eThe command accepts:\u003cbr\u003e- Execution ID (required, UUID returned when triggering a job)\u003c/p\u003e\u003cp\u003eIt makes a GET request to the gangway API and returns the current status of the job including its name, type, status, and GCS path to artifacts if available. The \u003ccode\u003ecurl_with_token.sh\u003c/code\u003e wrapper handles all authentication automatically.\u003c/p\u003e"}, {"name": "query-test-result", "full_name": "ci:query-test-result", "description": "Query test results from Sippy by version and test keywords", "description_html": "Query test results from Sippy by version and test keywords", "synopsis": "/ci:query-test-result \u003cversion\u003e \u003ckeywords\u003e [sippy-url]", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:query-test-result\u003c/code\u003e command queries OpenShift CI test results from Sippy based on the OpenShift version and test name keywords. It retrieves test statistics including pass rate, number of runs, failures, and links to failed job runs.\u003c/p\u003e\u003cp\u003eBy default, it queries the production Sippy instance at \u003ccode\u003esippy.dptools.openshift.org\u003c/code\u003e. You can optionally specify a different Sippy instance URL to query alternative environments (e.g., QE component readiness).\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003cbr\u003e- Checking the health of specific test cases\u003cbr\u003e- Finding test failure patterns\u003cbr\u003e- Getting links to failed Prow job runs for debugging\u003cbr\u003e- Monitoring test regression trends\u003cbr\u003e- Querying different Sippy instances (production, QE, etc.)\u003c/p\u003e"}, {"name": "revert-pr", "full_name": "ci:revert-pr", "description": "Revert a merged PR that is breaking CI or nightly payloads", "description_html": "Revert a merged PR that is breaking CI or nightly payloads", "synopsis": "/ci:revert-pr \u003cpr-url\u003e \u003cjira-ticket\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003eci:revert-pr\u003c/code\u003e command reverts a merged pull request that is breaking CI or nightly payloads. It follows the \u003ca href=\"https://github.com/openshift/enhancements/blob/master/enhancements/release/improving-ci-signal.md#quick-revert\"\u003eOpenShift quick-revert policy\u003c/a\u003e to restore CI signal.\u003c/p\u003e\u003cp\u003eThis command:\u003c/p\u003e\u003cp\u003e- Extracts the original PR details (title, author, merge commit SHA, base branch)\u003cbr\u003e- Ensures the user has a fork of the repository\u003cbr\u003e- Creates a revert branch and performs \u003ccode\u003egit revert -m1\u003c/code\u003e of the merge commit\u003cbr\u003e- Pushes the revert branch to the user&#x27;s fork\u003cbr\u003e- Creates a revert PR using the \u003ca href=\"https://github.com/stbenjam/revertomatic\"\u003eRevertomatic\u003c/a\u003e template format\u003cbr\u003e- Generates a list of CI override commands (\u003ccode\u003e/override\u003c/code\u003e) for jobs that may need to be bypassed on the revert PR\u003c/p\u003e\u003cp\u003eThis command is useful when:\u003c/p\u003e\u003cp\u003e- A merged PR is causing CI job failures\u003cbr\u003e- Nightly payloads are blocked by a breaking change\u003cbr\u003e- Quick reversion is needed to restore CI signal while the original author fixes the issue\u003c/p\u003e"}, {"name": "trigger-periodic", "full_name": "ci:trigger-periodic", "description": "Trigger a periodic gangway job with optional environment variable overrides", "description_html": "Trigger a periodic gangway job with optional environment variable overrides", "synopsis": "/trigger-periodic \u003cjob-name\u003e [ENV_VAR=value ...]", "body_html": "\u003cp\u003eThe \u003ccode\u003etrigger-periodic\u003c/code\u003e command triggers a periodic gangway job via the REST API. Periodic jobs run on a schedule but can be manually triggered for testing or urgent runs.\u003c/p\u003e\u003cp\u003eThe command accepts:\u003cbr\u003e- Job name (required, first argument)\u003cbr\u003e- Environment variable overrides (optional, additional arguments in KEY=VALUE format)\u003c/p\u003e\u003cp\u003eIt then constructs and executes the appropriate curl command to trigger the job via the gangway REST API.\u003c/p\u003e"}, {"name": "trigger-postsubmit", "full_name": "ci:trigger-postsubmit", "description": "Trigger a postsubmit gangway job with repository refs", "description_html": "Trigger a postsubmit gangway job with repository refs", "synopsis": "/trigger-postsubmit \u003cjob-name\u003e \u003corg\u003e \u003crepo\u003e \u003cbase-ref\u003e \u003cbase-sha\u003e [ENV_VAR=value ...]", "body_html": "\u003cp\u003eThe \u003ccode\u003etrigger-postsubmit\u003c/code\u003e command triggers a postsubmit gangway job via the REST API. Postsubmit jobs run after code is merged and require repository reference information.\u003c/p\u003e\u003cp\u003eThe command accepts:\u003cbr\u003e- Job name (required)\u003cbr\u003e- Organization (required, e.g., &quot;openshift&quot;)\u003cbr\u003e- Repository name (required, e.g., &quot;assisted-installer&quot;)\u003cbr\u003e- Base ref/branch (required, e.g., &quot;release-4.12&quot;)\u003cbr\u003e- Base SHA/commit hash (required)\u003cbr\u003e- Environment variable overrides (optional, additional arguments in KEY=VALUE format)\u003c/p\u003e\u003cp\u003eIt constructs the necessary JSON payload with refs structure and executes the curl command to trigger the job via the gangway REST API.\u003c/p\u003e"}, {"name": "trigger-presubmit", "full_name": "ci:trigger-presubmit", "description": "Trigger a presubmit gangway job (typically use GitHub Prow commands instead)", "description_html": "Trigger a presubmit gangway job (typically use GitHub Prow commands instead)", "synopsis": "/trigger-presubmit \u003cjob-name\u003e \u003corg\u003e \u003crepo\u003e \u003cbase-ref\u003e \u003cbase-sha\u003e \u003cpr-number\u003e \u003cpr-sha\u003e [ENV_VAR=value ...]", "body_html": "\u003cp\u003eThe \u003ccode\u003etrigger-presubmit\u003c/code\u003e command triggers a presubmit gangway job via the REST API.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWARNING:\u003c/strong\u003e Triggering presubmit jobs via REST is generally unnecessary and not recommended. Presubmit jobs should typically be triggered using Prow commands like \u003ccode\u003e/test\u003c/code\u003e and \u003ccode\u003e/retest\u003c/code\u003e via GitHub interactions. Only use this command if you have a specific reason to trigger via REST API.\u003c/p\u003e\u003cp\u003eThe command accepts:\u003cbr\u003e- Job name (required)\u003cbr\u003e- Organization (required, e.g., &quot;openshift&quot;)\u003cbr\u003e- Repository name (required, e.g., &quot;origin&quot;)\u003cbr\u003e- Base ref/branch (required, e.g., &quot;master&quot;)\u003cbr\u003e- Base SHA/commit hash (required)\u003cbr\u003e- Pull request number (required)\u003cbr\u003e- Pull request SHA/head commit (required)\u003cbr\u003e- Environment variable overrides (optional, additional arguments in KEY=VALUE format)\u003c/p\u003e\u003cp\u003eIt constructs the necessary JSON payload with refs and pulls structure and executes the curl command to trigger the job via the gangway REST API.\u003c/p\u003e"}], "skills": [{"name": "add-jira-triage-link", "description": "Add a Component Readiness triage record link to a JIRA issue description", "description_html": "Add a Component Readiness triage record link to a JIRA issue description", "meta": ""}, {"name": "analyze-disruption", "description": "Analyze and compare disruption across one or more Prow CI job runs by examining interval data, audit logs, pod logs, and CPU metrics", "description_html": "Analyze and compare disruption across one or more Prow CI job runs by examining interval data, audit logs, pod logs, and CPU metrics", "meta": ""}, {"name": "analyze-payload", "description": "Analyze a payload (rejected, accepted, or in-progress) with historical lookback to identify root causes of blocking job failures and produce an HTML report", "description_html": "Analyze a payload (rejected, accepted, or in-progress) with historical lookback to identify root causes of blocking job failures and produce an HTML report", "meta": ""}, {"name": "fetch-jira-issue", "description": "Fetch JIRA issue details including status, assignee, comments, and progress classification", "description_html": "Fetch JIRA issue details including status, assignee, comments, and progress classification", "meta": ""}, {"name": "fetch-job-run-summary", "description": "Fetch a Prow job run summary from Sippy showing all failed tests grouped by SIG with error messages", "description_html": "Fetch a Prow job run summary from Sippy showing all failed tests grouped by SIG with error messages", "meta": ""}, {"name": "fetch-new-prs-in-payload", "description": "Fetch pull requests that are new in a given OpenShift payload compared to the previous payload", "description_html": "Fetch pull requests that are new in a given OpenShift payload compared to the previous payload", "meta": ""}, {"name": "fetch-payloads", "description": "Fetch recent release payloads from the OpenShift release controller", "description_html": "Fetch recent release payloads from the OpenShift release controller", "meta": ""}, {"name": "fetch-prowjob-json", "description": "Fetch and return key data from a Prow job's prowjob.json artifact given a Prow job URL", "description_html": "Fetch and return key data from a Prow job&#x27;s prowjob.json artifact given a Prow job URL", "meta": ""}, {"name": "fetch-regression-details", "description": "Fetch detailed information about a Component Readiness regression from the Sippy API", "description_html": "Fetch detailed information about a Component Readiness regression from the Sippy API", "meta": ""}, {"name": "fetch-related-triages", "description": "Fetch existing triages and untriaged regressions related to a given regression", "description_html": "Fetch existing triages and untriaged regressions related to a given regression", "meta": ""}, {"name": "fetch-releases", "description": "Fetch available OpenShift releases from the Sippy API", "description_html": "Fetch available OpenShift releases from the Sippy API", "meta": ""}, {"name": "fet ift installation failures in Prow CI jobs by examining installer logs, log bundles, and sosreports. Use when CI job fails \"install should succeed\" tests at bootstrap, cluster creation or other stages.", "description_html": "Analyze OpenShift installation failures in Prow CI jobs by examining installer logs, log bundles, and sosreports. Use when CI job fails &quot;install should succeed&quot; tests at bootstrap, cluster creation or other stages.", "meta": ""}, {"name": "prow-job-analyze-metal-install-failure", "description": "Analyze OpenShift bare metal installation failures in Prow CI jobs using dev-scripts artifacts. Use for jobs with \"metal\" in name, for debugging Metal3/Ironic provisioning, installation, or dev-scripts setup failures. You may also use the prow-job-analyze-install-failure skill with this one.", "description_html": "Analyze OpenShift bare metal installation failures in Prow CI jobs using dev-scripts artifacts. Use for jobs with &quot;metal&quot; in name, for debugging Metal3/Ironic provisioning, installation, or dev-scripts setup failures. You may also use the prow-job-analyze-install-failure skill with this one.", "meta": ""}, {"name": "prow-job-analyze-resource", "description": "Analyze Kubernetes resource lifecycle in Prow CI job artifacts by parsing audit logs and pod logs from GCS, generating interactive HTML reports with timelines", "description_html": "Analyze Kubernetes resource lifecycle in Prow CI job artifacts by parsing audit logs and pod logs from GCS, generating interactive HTML reports with timelines", "meta": ""}, {"name": "prow-job-analyze-test-failure", "description": "Analyze failed Prow CI tests by inspecting test code, downloading artifacts, and optionally integrating must-gather cluster diagnostics for root cause analysis", "description_html": "Analyze failed Prow CI tests by inspecting test code, downloading artifacts, and optionally integrating must-gather cluster diagnostics for root cause analysis", "meta": ""}, {"nam ty review of the changes in a GitHub Pull Request. It analyzes unit test coverage, idiomatic code patterns, DRY compliance, SOLID principles, and build verification.\u003c/p\u003e\u003cp\u003eThe command supports two layers of customization:\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eLanguage skills\u003c/strong\u003e (\u003ccode\u003e--language &lt;lang&gt;\u003c/code\u003e): Load language-specific guidance for idiomatic code review, test conventions, and build commands. Currently shipped: \u003ccode\u003ego\u003c/code\u003e. Planned: \u003ccode\u003epython\u003c/code\u003e, \u003ccode\u003erust\u003c/code\u003e, \u003ccode\u003etypescript\u003c/code\u003e, \u003ccode\u003ejava\u003c/code\u003e. If not specified, the language is auto-detected from changed file extensions.\u003c/p\u003e\u003cp\u003e2. \u003cstrong\u003eProfile skills\u003c/strong\u003e (\u003ccode\u003e--profile &lt;name&gt;\u003c/code\u003e): Load project-specific guidance that layers on top of language checks. Profiles add project conventions, shared utilities, build targets, and additional review criteria. Profiles reference the project&#x27;s own agents and skills rather than embedding them.\u003c/p\u003e\u003cp\u003eThe two layers compose: \u003ccode\u003e--language go --profile hypershift\u003c/code\u003e applies both Go idioms and HyperShift project conventions.\u003c/p\u003e"}, {"name": "pre-commit-review", "full_name": "code-review:pre-commit-review", "description": "Automated pre-commit code quality review with language-aware analysis and project-specific profiles", "description_html": "Automated pre-commit code quality review with language-aware analysis and project-specific profiles", "synopsis": "/code-review:pre-commit-review [--language \u003clang\u003e] [--profile \u003cname\u003e] [--skip-build] [--skip-tests]", "body_html": "\u003cp\u003eThe \u003ccode\u003ecode-review:pre-commit-review\u003c/code\u003e command performs a comprehensive code quality review of staged and unstaged finitive call graph analysis to prove whether vulnerable functions are reachable from program entry points", "description_html": "Perform definitive call graph analysis to prove whether vulnerable functions are reachable from program entry points", "meta": ""}, {"name": "codebase-impact-analysis", "description": "Analyze a Go codebase to determine if it is impacted by a specific CVE using multiple verification methods and assign a risk level", "description_html": "Analyze a Go codebase to determine if it is impacted by a specific CVE using multiple verification methods and assign a risk level", "meta": ""}, {"name": "cve-intelligence-gathering", "description": "Gather comprehensive vulnerability information from multiple authoritative sources with fallback strategies", "description_html": "Gather comprehensive vulnerability information from multiple authoritative sources with fallback strategies", "meta": ""}, {"name": "remediation-planning", "description": "Generate comprehensive remediation guidance including dependency updates, code changes, workarounds, and verification steps", "description_html": "Generate comprehensive remediation guidance including dependency updates, code changes, workarounds, and verification steps", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "security", "keywords": ["cve", "vulnerabilities", "compliance", "go"], "author": {"name": "chiragkyal"}}, {"name": "console", "description": "OpenShift Console dynamic plugin development utilities", "version": "0.0.1", "has_readme": true, "commands": [], "skills": [{"name": "upgrade-console-sdk", "description": "Assists in the upgrade of an OpenShift Console dynamic plugin to the latest Console SDK version.", "description_html": "Assists in the upgrade of an OpenShift Console dynamic plugin to the latest Console SDK version.", "meta": "License: Apache-2.0 &middot; Compatibility: Designed for Claude Code. Requires Node.js, gh CLI, and internet access. &middot; Tools: Bash(gh api repos/openshift/console/contents/*), Bash(gh api repos/*/releases/tags/*), WebFetch(domain:raw.githubusercontent.com), AskUserQuestion, Bash(yarn npm info *), Bash(npm info *)"}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "development", "keywords": ["console", "dynamic-plugins", "frontend"], "author": {"name": "github.com/openshift-eng"}}, {"name": "etcd", "description": "Etcd cluster health monitoring and performance analysis utilities", "version": "0.0.2", "has_readme": true, "commands": [{"name": "analyze-performance", "full_name": "etcd:analyze-performance", "description": "Analyze etcd performance metrics, latency, and identify bottlenecks", "description_html": "Analyze etcd performance metrics, latency, and identify bottlenecks", "synopsis": "/etcd:analyze-performance [--duration \u003cminutes\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eanalyze-performance\u003c/code\u003e command analyzes etcd performance metrics to identify latency issues, slow operations, and potential bottlenecks. It examines disk performance, commit latency, network latency, and provides recommendations for optimization.\u003c/p\u003e\u003cp\u003eEtcd performance is critical for cluster responsiveness. Slow etcd operations can cause:\u003cbr\u003e- API server timeouts\u003cbr\u003e- Slow pod creation and updates\u003cbr\u003e- Controller delays\u003cbr\u003e- Overall cluster sluggishness\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003cbr\u003e- Diagnosing slow cluster operations\u003cbr\u003e- Identifying disk I/O bottlenecks\u003cbr\u003e- Detecting network latency issues\u003cbr\u003e- Capacity planning\u003cbr\u003e- Performance tuning\u003c/p\u003e"}, {"name": "health-check", "full_name": "etcd:health-check", "description": "Check etcd cluster health, member status, and identify issues", "description_html": "Check etcd cluster health, member status, and identify issues", "synopsis": "/etcd:health-check [--verbose]", "body_html": "\u003cp\u003eThe \u003ccode\u003ehealth-check\u003c/code\u003e command performs a comprehensive health check of the etcd cluster in an OpenShift environment. It examines etcd member status, cluster health, leadership, connectivity, and identifies potential issues that could affect cluster stability.\u003c/p\u003e\u003cp\u003eEtcd is the critical key-value store that holds all cluster state for Kubernetes/OpenShift. Issues related to etcd can cause cluster-wide failures, so monitoring its health is essential.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003cbr\u003e- Diagnosing cluster control plane issues\u003cbr\u003e- Verifying etcd cluster stability\u003cbr\u003e- Identifying split-brain scenarios\u003cbr\u003e- Checking member synchronization\u003cbr\u003e- Detecting disk space issues\u003cbr\u003e- Monitoring etcd performance\u003c/p\u003e"}], "skills": [], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "debugging", "keywords": ["etcd", "cluster-health", "performance"], "author": {"name": "github.com/openshift-eng"}}, {"name": "git", "description": "Git workflow automation and utilities", "version": "0.0.6", "has_readme": true, "commands": [{"name": "backport", "full_name": "git:backport", "description": "Backport commits to multiple branches", "description_html": "Backport commits to multiple branches", "synopsis": "/git:backport \u003ccommit\u003e \u003cbranch1\u003e [branch2...] [--new-branch|-b]", "body_html": "\u003cp\u003eThe \u003ccode\u003egit:backport\u003c/code\u003e command helps backport a commit to multiple branches. It automates the process of cherry-picking a commit to one or more target branches, with optional support for creating new branches for each backport (useful for creating pull requests).\u003c/p\u003e\u003cp\u003eThis command provides:\u003cbr\u003e- Automated commit backporting to one or multiple branches\u003cbr\u003e- Validation of commit and branch existence\u003cbr\u003e- Safe state management (saves and restores current branch)\u003cbr\u003e- Conflict detection and user-guided resolution\u003cbr\u003e- Optional new branch creation for PR workflows\u003cbr\u003e- Support for branches with or without remote tracking\u003c/p\u003e"}, {"name": "bisect", "full_name": "git:bisect", "description": "Interactive git bisect assistant with pattern detection and automation", "description_html": "Interactive git bisect assistant with pattern detection and automation", "synopsis": "/git:bisect                       # Fully interactive - will ask for all inputs\n/git:bisect [good-commit] [bad-commit]  # With commit references", "body_html": "\u003cp\u003eThe \u003ccode\u003egit:bisect\u003c/code\u003e command is an interactive git bisect assistant that helps find the exact commit that introduced a specific change (bug, behavior change, feature, performance regression, etc.) using binary search.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat This Command Does:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eGuides you through setup\u003c/strong\u003e - Validates commits, checks for conflicts\u003cbr\u003e2. \u003cstrong\u003ePresents commits for evaluation\u003c/strong\u003e - Shows relevant info about each commit\u003cbr\u003e3. \u003cstrong\u003eLearns from your decisions\u003c/strong\u003e - Detects patterns in your choices\u003cbr\u003e4. \u003cstrong\u003eCan automate\u003c/strong\u003e - If it understands your criterion, it can evaluate automatically (with your permission)\u003cbr\u003e5. \u003cstrong\u003eReports the result\u003c/strong\u003e - Shows the culprit commit with full details\u003c/p\u003e\u003cp\u003e### Terminology\u003c/p\u003e\u003cp\u003eGit bisect uses confusing terms. This command uses clearer labels:\u003c/p\u003e\u003cp\u003e| What You See                | Git Term | Meaning                                             |\u003cbr\u003e| --------------------------- | -------- | --------------------------------------------------- |\u003cbr\u003e| &quot;Change IS in the code&quot;     | \u003ccode\u003ebad\u003c/code\u003e    | The change you&#x27;re looking for EXISTS in this commit |\u003cbr\u003e| &quot;Change is NOT in the code&quot; | \u003ccode\u003egood\u003c/code\u003e   | The change you&#x27;re looking for does NOT exist yet    |\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNever use &quot;good&quot; or &quot;bad&quot; alone - always explain what they mean in context.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e### Workflow\u003c/p\u003e\u003cp\u003e``\u003ccode\u003e\u003cbr\u003e1. Provide (or select) reference commits\u003cbr\u003e         \u2193\u003cbr\u003e2. Describe what change you&#x27;re looking for\u003cbr\u003e         \u2193\u003cbr\u003e3. [If criterion is clear] Confirm understanding \u2192 Choose manual/auto\u003cbr\u003e         \u2193\u003cbr\u003e4. Evaluate commits (manually or automatically)\u003cbr\u003e         \u2193\u003cbr\u003e5. Receive final report with culprit commit\u003cbr\u003e         \u2193\u003cbr\u003e6. Clean up (git bisect reset)\u003cbr\u003e\u003c/code\u003e`\u003ccode\u003e\u003c/p\u003e\u003cp\u003e### Commands During Bisect\u003c/p\u003e\u003cp\u003eAt any point during the bisect, you can:\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003e&quot;show diff&quot;\u003c/strong\u003e or \u003cstrong\u003e&quot;more details&quot;\u003c/strong\u003e - See the full diff for the current commit\u003cbr\u003e- \u003cstrong\u003e&quot;skip&quot;\u003c/strong\u003e - Skip a commit that cannot be tested (won&#x27;t build, etc.)\u003cbr\u003e- \u003cstrong\u003e&quot;abort&quot;\u003c/strong\u003e - Cancel the bisect and return to your original branch\u003cbr\u003e- \u003cstrong\u003e&quot;automate&quot;\u003c/strong\u003e - Ask to enable automation (if pattern detected)\u003c/p\u003e\u003cp\u003e### Tips\u003c/p\u003e\u003cp\u003e- You can test the current state by building/running your project between steps\u003cbr\u003e- Use \u003c/code\u003eskip` if a commit cannot be tested (build failure, unrelated issue)\u003cbr\u003e- The process uses binary search: ~log\u2082(N) steps for N commits\u003cbr\u003e- You can abort at any time; the session will be cleanly terminated\u003c/p\u003e"}, {"name": "branch-cleanup", "full_name": "git:branch-cleanup", "description": "Clean up old and defunct branches that are no longer needed", "description_html": "Clean up old and defunct branches that are no longer needed", "synopsis": "/git:branch-cleanup [--dry-run] [--merged-only] [--remote]", "body_html": "\u003cp\u003eThe \u003ccode\u003egit:branch-cleanup\u003c/code\u003e command identifies and removes old, defunct, or merged branches from your local repository (and optionally from remote). It helps maintain a clean repository by removing branches that are no longer needed, such as:\u003cbr\u003e- Branches that have been merged into the main branch\u003cbr\u003e- Branches that no longer exist on the remote\u003cbr\u003e- Stale feature branches from completed work\u003c/p\u003e\u003cp\u003eThe command performs safety checks to prevent deletion of:\u003cbr\u003e- The current branch\u003cbr\u003e- Protected branches (main, master, develop, etc.)\u003cbr\u003e- Branches with unmerged commits (unless explicitly overridden)\u003c/p\u003e\u003cp\u003eThe spec sections is inspired by https://man7.org/linux/man-pages/man7/man-pages.7.html#top_of_page\u003c/p\u003e"}, {"name": "cherry-pick-by-patch", "full_name": "git:cherry-pick-by-patch", "description": "Cherry-pick git commit into current branch by \"patch\" command", "description_html": "Cherry-pick git commit into current branch by &quot;patch&quot; command", "synopsis": "/git:cherry-pick-by-patch commit_hash", "body_html": "The \u003ccode\u003e/git-cherry-pick-by-patch commit_hash\u003c/code\u003e command cherry-picks commit with hash\u003cbr\u003e\u003ccode\u003ecommit_hash\u003c/code\u003e into current branch. Rather then doing \u003ccode\u003egit cherry-pick commit_hash\u003c/code\u003e,\u003cbr\u003ethe command streams the output of \u003ccode\u003egit show commit_hash\u003c/code\u003e to\u003cbr\u003e\u003ccode\u003epatch -p1 --no-backup-if-mismatch\u003c/code\u003e, and then commit changes with commit message\u003cbr\u003efrom \u003ccode\u003ecommit_hash\u003c/code\u003e commit."}, {"name": "commit-suggest", "full_name": "git:commit-suggest", "description": "Generate Conventional Commits style commit messages or summarize existing commits", "description_html": "Generate Conventional Commits style commit messages or summarize existing commits", "synopsis": "/git:commit-suggest       # Analyze staged changes\n/git:commit-suggest [N]     # Analyze last N commits (1-100)", "body_html": "\u003cp\u003eAI-powered command that analyzes code changes and generates Conventional Commits\u2013style messages.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eModes:\u003c/strong\u003e\u003cbr\u003e- \u003cstrong\u003eMode 1 (no argument)\u003c/strong\u003e \u2013 Analyze staged changes (\u003ccode\u003egit add\u003c/code\u003e required)\u003cbr\u003e- \u003cstrong\u003eMode 2 (with N)\u003c/strong\u003e \u2013 Analyze last N commits to rewrite (N=1) or summarize for squash (N\u22652)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUse cases:\u003c/strong\u003e\u003cbr\u003e- Create standardized commit messages\u003cbr\u003e- Improve or rewrite existing commits\u003cbr\u003e- Generate squash messages for PR merges\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDifference from \u003ccode\u003e/git:summary\u003c/code\u003e\u003c/strong\u003e \u2013 That command is read-only, while \u003ccode\u003egit:commit-suggest\u003c/code\u003e generates actionable commit message suggestions for user review and manual use.\u003c/p\u003e"}, {"name": "debt-scan", "full_name": "git:debt-scan", "description": "Analyze technical debt indicators in the repository", "description_html": "Analyze technical debt indicators in the repository", "synopsis": "/git:debt-scan", "body_
