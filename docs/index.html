on or switch channels", "description_html": "Update an operator to the latest version or switch channels", "synopsis": "/olm:upgrade \u003coperator-name\u003e [namespace] [--channel=\u003cchannel\u003e] [--approve]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm:upgrade\u003c/code\u003e command updates an installed operator to the latest version in its current channel or switches to a different channel. It can also approve pending InstallPlans for operators with manual approval mode.\u003c/p\u003e\u003cp\u003eThis command helps you:\u003cbr\u003e- Update operators to the latest version in their channel\u003cbr\u003e- Switch operators to different channels (e.g., stable to tech-preview)\u003cbr\u003e- Approve pending upgrade InstallPlans for manual approval mode\u003cbr\u003e- Monitor upgrade progress\u003cbr\u003e- Rollback on failure when OLM supports the operation\u003c/p\u003e"}], "skills": [], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "openshift", "keywords": ["olm", "operators", "lifecycle-manager", "debugging"], "author": {"name": "github.com/openshift-eng"}}, {"name": "olm-team", "description": "OLM team development utilities and onboarding tools", "version": "0.2.0", "has_readme": true, "commands": [{"name": "configure-agent", "full_name": "olm-team:configure-agent", "description": "Configure the k8s-ocp-olm-expert agent with local repository paths", "description_html": "Configure the k8s-ocp-olm-expert agent with local repository paths", "synopsis": "/olm-team:configure-agent", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm-team:configure-agent\u003c/code\u003e command helps you create or update the configuration file for the k8s-ocp-olm-expert agent. This configuration specifies the local paths to OLM development repositories that the agent uses to provide code-aware responses and documentation references.\u003c/p\u003e\u003cp\u003eThe agent requires access to:\u003cbr\u003e- \u003cstrong\u003eDocumentation\u003c/strong\u003e: openshift-docs\u003cbr\u003e- \u003cstrong\u003eOLM v0 Upstream\u003c/strong\u003e: operator-lifecycle-manager, operator-registry, api\u003cbr\u003e- \u003cstrong\u003eOLM v0 Downstream\u003c/strong\u003e: operator-framework-olm, operator-marketplace\u003cbr\u003e- \u003cstrong\u003eOLM v1 Upstream\u003c/strong\u003e: operator-controller\u003cbr\u003e- \u003cstrong\u003eOLM v1 Downstream\u003c/strong\u003e: operator-framework-operator-controller, cluster-olm-operator\u003c/p\u003e\u003cp\u003eIf you don&#x27;t have these repositories cloned yet, the command will recommend using \u003ccode\u003e/olm-team:dev-setup\u003c/code\u003e to automatically fork and clone all required repositories.\u003c/p\u003e"}, {"name": "dev-setup", "full_name": "olm-team:dev-setup", "description": "Set up OLM development repositories and onboard to the team", "description_html": "Set up OLM development repositories and onboard to the team", "synopsis": "/olm-team:dev-setup [target-directory]", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm-team:dev-setup\u003c/code\u003e command automates the onboarding process for new OLM team members by setting up all necessary development repositories. It forks repositories (if not already forked), clones them locally with proper remote configuration, and provides educational context about each repository to accelerate team onboarding.\u003c/p\u003e\u003cp\u003eThis command helps new developers understand the OLM ecosystem by explaining:\u003cbr\u003e- The difference between upstream (operator-framework) and downstream (openshift) organizations\u003cbr\u003e- The distinction between OLM v0 (traditional) and OLM v1 (next-generation) architectures\u003cbr\u003e- The purpose and relationship of each repository in the development workflow\u003c/p\u003e"}, {"name": "ep-watch", "full_name": "olm-team:ep-watch", "description": "Watch open Enhancement PRs from other teams that may impact OLM", "description_html": "Watch open Enhancement PRs from other teams that may impact OLM", "synopsis": "/olm-team:ep-watch", "body_html": "\u003cp\u003eThe \u003ccode\u003eolm-team:ep-watch\u003c/code\u003e command watches open Enhancement Proposal PRs in the openshift/enhancements repository that are \u003cstrong\u003enot created by the OLM team\u003c/strong\u003e but may have impacts on OLM work. This helps the OLM team maintain visibility into what other teams are designing that could affect operator lifecycle management.\u003c/p\u003e\u003cp\u003eThe command:\u003cbr\u003e- Fetches open PRs from openshift/enhancements repository\u003cbr\u003e- Filters out PRs created by known OLM team members\u003cbr\u003e- Analyzes PR content for OLM-related topics\u003cbr\u003e- Returns up to 3 most relevant PRs with impact assessment\u003c/p\u003e\u003cp\u003eThis is useful for:\u003cbr\u003e- Discovering cross-team dependencies early\u003cbr\u003e- Identifying potential impacts on OLM architecture\u003cbr\u003e- Participating in relevant enhancement discussions\u003cbr\u003e- Staying informed about OpenShift-wide changes affecting operators\u003c/p\u003e"}], "skills": [{"name": "k8s-ocp-olm-expert", "description": "Use when the user asks about or needs help with Kubernetes (k8s), OpenShift (OCP), or Operator Lifecycle Manager (OLM) v0 or v1, including debugging resources, developing or troubleshooting operators, reviewing manifests or CRDs, explaining concepts, or investigating cluster issues.", "description_html": "Use when the user asks about or needs help with Kubernetes (k8s), OpenShift (OCP), or Operator Lifecycle Manager (OLM) v0 or v1, including debugging resources, developing or troubleshooting operators, reviewing manifests or CRDs, explaining concepts, or investigating cluster issues.", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "development", "keywords": ["olm", "onboarding", "team-tools"], "author": {"name": "github.com/openshift-eng"}}, {"name": "openshift", "description": "OpenShift development utilities and helpers", "version": "0.0.6", "has_readme": true, "commands": [{"name": "add-enhancement", "full_name": "openshift:add-enhancement", "description": "Create a new OpenShift Enhancement Proposal", "description_html": "Create a new OpenShift Enhancement Proposal", "synopsis": "/openshift:add-enhancement [area] \u003cname\u003e \u003cdescription\u003e \u003cjira\u003e", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:add-enhancement\u003c/code\u003e command creates a new OpenShift Enhancement\u003cbr\u003eProposal (EP) based on the official template from the openshift/enhancements\u003cbr\u003erepository. It generates a comprehensive enhancement document with all required\u003cbr\u003esections, metadata, and guidance following OpenShift&#x27;s enhancement process.\u003c/p\u003e\u003cp\u003eThis command automates the creation of enhancement proposals by:\u003cbr\u003e- Fetching the latest enhancement template from the openshift/enhancements\u003cbr\u003e  repository\u003cbr\u003e- Analyzing the provided description to extract what, why, and who information\u003cbr\u003e- Generating user stories, goals, and non-goals based on the requirements\u003cbr\u003e- Creating enhancement files with valid YAML metadata, correct heading structure, and all required sections\u003cbr\u003e- Applying OpenShift-specific conventions for feature gates, API design, and\u003cbr\u003e  testing requirements\u003c/p\u003e"}, {"name": "bootstrap-om", "full_name": "openshift:bootstrap-om", "description": "Bootstrap OpenShift Manager (OM) integration for OpenShift operators with automated resource discovery", "description_html": "Bootstrap OpenShift Manager (OM) integration for OpenShift operators with automated resource discovery", "synopsis": "/openshift:bootstrap-om", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:bootstrap-om\u003c/code\u003e command automates the complete integration of OpenShift Manager (OM) into OpenShift operators. OM (formerly Multi-Operator Manager/MOM) is a framework designed to reduce duplicate effort and improve consistency across different OpenShift cluster topologies (standalone/OCP and Hypershift/HCP) by centralizing operator management and enabling comprehensive testing.\u003c/p\u003e\u003cp\u003eThis command automates:\u003cbr\u003e- \u003cstrong\u003eAutomatic resource discovery\u003c/strong\u003e - Analyzes the codebase to identify all input and output resources\u003cbr\u003e- \u003cstrong\u003eCommand implementation\u003c/strong\u003e - Creates the three required OM commands (input-resources, output-resources, apply-configuration)\u003cbr\u003e- \u003cstrong\u003eTest infrastructure setup\u003c/strong\u003e - Configures Makefile targets and test directories\u003cbr\u003e- \u003cstrong\u003eTest scenario creation\u003c/strong\u003e - Generates initial test cases with proper structure\u003cbr\u003e- \u003cstrong\u003eIntegration validation\u003c/strong\u003e - Runs tests to ensure commands compile, execute, and produce expected output\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNote:\u003c/strong\u003e These instructions are optimized for operators built with github.com/openshift/library-go.\u003c/p\u003e"}, {"name": "bump-deps", "full_name": "openshift:bump-deps", "description": "Bump dependencies in OpenShift projects with automated analysis and PR creation", "description_html": "Bump dependencies in OpenShift projects with automated analysis and PR creation", "synopsis": "/openshift:bump-deps \u003cdependency\u003e [version] [--create-jira] [--create-pr]", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:bump-deps\u003c/code\u003e command automates the process of bumping dependencies in OpenShift organization projects. It analyzes the dependency, determines the appropriate version to bump to, updates the necessary files (go.mod, go.sum, package.json, etc.), runs tests, and optionally creates Jira tickets and pull requests.\u003c/p\u003e\u003cp\u003eThis command significantly reduces the manual effort required for dependency updates by automating:\u003c/p\u003e\u003cp\u003e- Dependency version discovery and analysis\u003cbr\u003e- Compatibility checking with current codebase\u003cbr\u003e- File updates (go.mod, package.json, Dockerfile, etc.)\u003cbr\u003e- Test execution to verify the update\u003cbr\u003e- Jira ticket creation with comprehensive details\u003cbr\u003e- Pull request creation with proper formatting\u003cbr\u003e- Release notes generation\u003c/p\u003e\u003cp\u003eThe command intelligently handles different dependency types (Go modules, npm packages, container images, etc.) and can process single or multiple dependencies at once.\u003c/p\u003e"}, {"name": "cluster-health-check", "full_name": "openshift:cluster-health-check", "description": "Perform comprehensive health check on OpenShift cluster and report issues", "description_html": "Perform comprehensive health check on OpenShift cluster and report issues", "synopsis": "/openshift:cluster-health-check [--verbose] [--output-format json|text]", "body_html": "\u003cp\u003eThe \u003ccode\u003ecluster-health-check\u003c/code\u003e command performs a comprehensive health analysis of an OpenShift/Kubernetes cluster and reports any detected issues. It examines cluster operators, nodes, deployments, pods, persistent volumes, and other critical resources to identify problems that may affect cluster stability or workload availability.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003cbr\u003e- Quick cluster status assessment\u003cbr\u003e- Troubleshooting cluster issues\u003cbr\u003e- Pre-deployment validation\u003cbr\u003e- Regular health monitoring\u003cbr\u003e- Identifying degraded components\u003c/p\u003e"}, {"name": "crd-review", "full_name": "openshift:crd-review", "description": "Review Kubernetes CRDs against Kubernetes and OpenShift API conventions", "description_html": "Review Kubernetes CRDs against Kubernetes and OpenShift API conventions", "synopsis": "/openshift:crd-review [repository-path]", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:crd-review\u003c/code\u003e command analyzes Go Kubernetes Custom Resource Definitions (CRDs) in a repository against both:\u003cbr\u003e- \u003cstrong\u003eKubernetes API Conventions\u003c/strong\u003e as defined in the \u003ca href=\"https://github.com/kubernetes/community/blob/master/contributors/devel/sig-architecture/api-conventions.md\"\u003eKubernetes community guidelines\u003c/a\u003e\u003cbr\u003e- \u003cstrong\u003eOpenShift API Conventions\u003c/strong\u003e as defined in the \u003ca href=\"https://github.com/openshift/enhancements/blob/master/dev-guide/api-conventions.md\"\u003eOpenShift development guide\u003c/a\u003e\u003c/p\u003e\u003cp\u003eThis command checks CRDs for compliance with these conventions, covering:\u003cbr\u003e- API naming conventions and patterns\u003cbr\u003e- Resource structure and field organization\u003cbr\u003e- Status field design and patterns\u003cbr\u003e- Field types and validation\u003cbr\u003e- Documentation standards\u003cbr\u003e- OpenShift-specific requirements\u003c/p\u003e\u003cp\u003eThe review covers Go API type definitions, providing actionable feedback to improve API design.\u003c/p\u003e"}, {"name": "create-cluster", "full_name": "openshift:create-cluster", "description": "Extract OpenShift installer from release image and create an OCP cluster", "description_html": "Extract OpenShift installer from release image and create an OCP cluster", "synopsis": "/openshift:create-cluster [release-image] [platform] [options]", "body_html": "\u003cp\u003eThe \u003ccode\u003ecreate-cluster\u003c/code\u003e command automates the process of extracting the OpenShift installer from a release image (if not already present) and creating a new OpenShift Container Platform (OCP) cluster. It handles installer extraction from OCP release images, configuration preparation, and cluster creation in a streamlined workflow.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003cbr\u003e- Setting up development/test clusters quickly\u003c/p\u003e"}, {"name": "destroy-cluster", "full_name": "openshift:destroy-cluster", "description": "Destroy an OpenShift cluster created by create-cluster command", "description_html": "Destroy an OpenShift cluster created by create-cluster command", "synopsis": "/openshift:destroy-cluster [install-dir]", "body_html": "\u003cp\u003eThe \u003ccode\u003edestroy-cluster\u003c/code\u003e command safely destroys an OpenShift Container Platform (OCP) cluster that was previously created using the \u003ccode\u003e/openshift:create-cluster\u003c/code\u003e command. It locates the appropriate installer binary, verifies the cluster information, and performs cleanup of all cloud resources.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003cbr\u003e- Cleaning up development/test clusters after testing\u003cbr\u003e- Removing failed cluster installations\u003cbr\u003e- Freeing up cloud resources and quotas\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u26a0\ufe0f WARNING\u003c/strong\u003e: This operation is \u003cstrong\u003eirreversible\u003c/strong\u003e and will permanently delete:\u003cbr\u003e- All cluster resources (VMs, load balancers, storage, etc.)\u003cbr\u003e- All data stored in the cluster\u003cbr\u003e- All configuration and credentials\u003cbr\u003e- DNS records (if managed by the installer)\u003c/p\u003e"}, {"name": "expand-test-case", "full_name": "openshift:expand-test-case", "description": "Expand basic test ideas or existing oc commands into comprehensive test scenarios with edge cases in oc CLI or Ginkgo format", "description_html": "Expand basic test ideas or existing oc commands into comprehensive test scenarios with edge cases in oc CLI or Ginkgo format", "synopsis": "/openshift:expand-test-case [test-idea-or-file-or-commands] [format]", "body_html": "\u003cp\u003eThe \u003ccode\u003eexpand-test-case\u003c/code\u003e command transforms basic test ideas or existing oc commands into comprehensive test scenarios. It accepts three types of input:\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eTest idea\u003c/strong\u003e: Simple description of what to test (e.g., &quot;verify pod deployment&quot;)\u003cbr\u003e2. \u003cstrong\u003eFile path\u003c/strong\u003e: Path to existing test file to expand (e.g., \u003ccode\u003e/path/to/test.sh\u003c/code\u003e or \u003ccode\u003e/path/to/test.go\u003c/code\u003e)\u003cbr\u003e3. \u003cstrong\u003eoc commands\u003c/strong\u003e: Direct oc CLI commands to analyze and expand (e.g., \u003ccode\u003eoc create pod nginx\u003c/code\u003e)\u003c/p\u003e\u003cp\u003eThe command expands the input to cover positive flows, negative scenarios, edge cases, and boundary conditions, helping QE engineers ensure thorough test coverage.\u003c/p\u003e\u003cp\u003eSupports two output formats:\u003cbr\u003e- \u003cstrong\u003eoc CLI\u003c/strong\u003e: Shell scripts with oc commands for manual or automated execution\u003cbr\u003e- \u003cstrong\u003eGinkgo\u003c/strong\u003e: Go test code using Ginkgo/Gomega framework for E2E tests\u003c/p\u003e"}, {"name": "ironic-status", "full_name": "openshift:ironic-status", "description": "Check status of Ironic baremetal nodes in OpenShift cluster", "description_html": "Check status of Ironic baremetal nodes in OpenShift cluster", "synopsis": "/openshift:ironic-status", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:ironic-status\u003c/code\u003e command checks the status of Ironic baremetal nodes in an OpenShift cluster.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003cbr\u003e- Monitoring baremetal node health and provisioning status\u003cbr\u003e- Troubleshooting node provisioning issues\u003cbr\u003e- Verifying node enrollment and availability\u003cbr\u003e- Checking node maintenance states\u003cbr\u003e- Diagnosing baremetal infrastructure problems\u003c/p\u003e"}, {"name": "new-e2e-test", "full_name": "openshift:new-e2e-test", "description": "Write and validate new OpenShift E2E tests using Ginkgo framework", "description_html": "Write and validate new OpenShift E2E tests using Ginkgo framework", "synopsis": "/new-e2e-test [test-specification]", "body_html": "\u003cp\u003eThe \u003ccode\u003enew-e2e-test\u003c/code\u003e command assists in writing and validating\u003cbr\u003enew tests for the OpenShift test suite. It follows best practices for\u003cbr\u003eGinkgo-based testing and ensures test reliability through automated\u003cbr\u003evalidation.\u003c/p\u003e\u003cp\u003eThis command handles the complete lifecycle of test development:\u003cbr\u003e- Writes tests following Ginkgo patterns and OpenShift conventions\u003cbr\u003e- Validates tests for reliability through multiple test runs\u003cbr\u003e- Ensures proper test naming and structure\u003cbr\u003e- Handles both origin repository and extension tests according to their repository conventions\u003c/p\u003e"}, {"name": "node-kernel-conntrack", "full_name": "openshift:node-kernel-conntrack", "description": "Get connection tracking entries from Kubernetes node", "description_html": "Get connection tracking entries from Kubernetes node", "synopsis": "/openshift:node-kernel-conntrack \u003cnode\u003e \u003cimage\u003e [--command \u003ccmd\u003e] [--filter \u003cparams\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:node-kernel-conntrack\u003c/code\u003e command allows interaction with the connection tracking system of a Kubernetes node. Use this command to discover all or a filtered selection of currently tracked connections. This is essential for debugging NAT issues, connection state problems, and understanding packet flows through the kernel&#x27;s netfilter subsystem.\u003c/p\u003e\u003cp\u003eConnection tracking (conntrack) is a critical component of Linux networking that maintains state information about network connections. In OVN-Kubernetes environments, conntrack is used for:\u003cbr\u003e- Service load balancing and NAT\u003cbr\u003e- Network policy enforcement\u003cbr\u003e- Connection state tracking across network namespace boundaries\u003cbr\u003e- Debugging intermittent connectivity issues\u003c/p\u003e\u003cp\u003eThe command uses \u003ccode\u003eoc debug\u003c/code\u003e to create an ephemeral container with host network access, then executes conntrack operations. If the provided image doesn&#x27;t contain the \u003ccode\u003econntrack\u003c/code\u003e CLI utility, the command falls back to printing \u003ccode\u003e/proc/net/nf_conntrack\u003c/code\u003e directly.\u003c/p\u003e"}, {"name": "node-kernel-ip", "full_name": "openshift:node-kernel-ip", "description": "Inspect routing, network devices, and interfaces on Kubernetes node", "description_html": "Inspect routing, network devices, and interfaces on Kubernetes node", "synopsis": "/openshift:node-kernel-ip \u003cnode\u003e \u003cimage\u003e --command \u003ccmd\u003e [--options \u003copts\u003e] [--filter \u003cparams\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:node-kernel-ip\u003c/code\u003e command allows interaction with the kernel to list routing tables, network devices, and interfaces. The \u003ccode\u003eip\u003c/code\u003e utility is the modern Linux networking configuration tool that shows and manipulates routing, network devices, policy routing, and tunnels.\u003c/p\u003e\u003cp\u003eIn OVN-Kubernetes environments, the ip command is essential for:\u003cbr\u003e- Inspecting OVN overlay network interfaces (genev_sys_*, ovn-k8s-mp0, etc.)\u003cbr\u003e- Viewing routing tables for pod and service traffic\u003cbr\u003e- Debugging network namespace configurations\u003cbr\u003e- Analyzing interface states and configurations\u003cbr\u003e- Troubleshooting connectivity issues between nodes and pods\u003c/p\u003e\u003cp\u003eThe command uses \u003ccode\u003eoc debug\u003c/code\u003e to create an ephemeral container with host network access, then executes ip operations. The image must contain the \u003ccode\u003eip\u003c/code\u003e utility (from iproute2 package).\u003c/p\u003e"}, {"name": "node-kernel-iptables", "full_name": "openshift:node-kernel-iptables", "description": "Inspect IPv4 and IPv6 packet filter rules on Kubernetes node", "description_html": "Inspect IPv4 and IPv6 packet filter rules on Kubernetes node", "synopsis": "/openshift:node-kernel-iptables \u003cnode\u003e \u003cimage\u003e --command \u003ccmd\u003e [--table \u003ctable\u003e] [--filter \u003cparams\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:node-kernel-iptables\u003c/code\u003e command allows interaction with the kernel to list packet filter rules. Iptables and ip6tables are used to inspect the tables of IPv4 and IPv6 packet filter rules in the Linux kernel.\u003c/p\u003e\u003cp\u003eIn OVN-Kubernetes environments, iptables rules are crucial for:\u003cbr\u003e- Network address translation (NAT) for services\u003cbr\u003e- Packet filtering and security policies\u003cbr\u003e- Connection tracking integration\u003cbr\u003e- SNAT/DNAT for egress and ingress traffic\u003cbr\u003e- Debugging packet flow issues\u003c/p\u003e\u003cp\u003eThe command uses \u003ccode\u003eoc debug\u003c/code\u003e to create an ephemeral container with host network access, then executes iptables operations. The image must contain \u003ccode\u003eiptables\u003c/code\u003e or \u003ccode\u003eip6tables\u003c/code\u003e CLI utilities.\u003c/p\u003e"}, {"name": "node-kernel-nft", "full_name": "openshift:node-kernel-nft", "description": "Inspect nftables packet filtering and classification rules on Kubernetes node", "description_html": "Inspect nftables packet filtering and classification rules on Kubernetes node", "synopsis": "/openshift:node-kernel-nft \u003cnode\u003e \u003cimage\u003e --command \u003ccmd\u003e [--family \u003cfamily\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:node-kernel-nft\u003c/code\u003e command allows interaction with the kernel to list packet filtering and classification rules managed by nftables. Nftables is the modern successor to iptables, providing a more unified and efficient packet filtering framework in the Linux kernel.\u003c/p\u003e\u003cp\u003eIn OVN-Kubernetes environments, nftables may be used for:\u003cbr\u003e- Modern packet filtering replacing legacy iptables\u003cbr\u003e- Service load balancing rules\u003cbr\u003e- Network policy enforcement\u003cbr\u003e- NAT rules for ingress and egress traffic\u003cbr\u003e- More efficient rule matching than iptables\u003c/p\u003e\u003cp\u003eThe command uses \u003ccode\u003eoc debug\u003c/code\u003e to create an ephemeral container with host network access, then executes nft operations. The image must contain the \u003ccode\u003enft\u003c/code\u003e CLI utility.\u003c/p\u003e"}, {"name": "rebase", "full_name": "openshift:rebase", "description": "Rebase OpenShift fork of an upstream repository to a new upstream release.", "description_html": "Rebase OpenShift fork of an upstream repository to a new upstream release.", "synopsis": "/openshift:rebase [tag]", "body_html": "\u003cp\u003eThe \u003ccode\u003e/openshift:rebase\u003c/code\u003e command rebases git repository in the current working directory\u003cbr\u003eto a new upstream release specified by \u003ccode\u003e[tag]\u003c/code\u003e. If no \u003ccode\u003e[tag]\u003c/code\u003e is specified, the command\u003cbr\u003etries to find the latest stable upstream release.\u003c/p\u003e\u003cp\u003eThe repository must follow rules described in https://github.com/openshift/kubernetes/blob/master/REBASE.openshift.md,\u003cbr\u003enamely all OpenShift-specific commits must have prefix \u003ccode\u003eUPSTREAM:\u003c/code\u003e.\u003c/p\u003e"}, {"name": "review-test-cases", "full_name": "openshift:review-test-cases", "description": "Review test cases for completeness, quality, and best practices - accepts file path or direct oc commands/test code", "description_html": "Review test cases for completeness, quality, and best practices - accepts file path or direct oc commands/test code", "synopsis": "/openshift:review-test-cases [file-path-or-test-code-or-commands]", "body_html": "\u003cp\u003eThe \u003ccode\u003ereview-test-cases\u003c/code\u003e command provides comprehensive review of OpenShift test cases to ensure quality, completeness, and adherence to best practices. It accepts three types of input:\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eFile path\u003c/strong\u003e: Path to test file (e.g., \u003ccode\u003e/path/to/test.sh\u003c/code\u003e or \u003ccode\u003e/path/to/test.go\u003c/code\u003e)\u003cbr\u003e2. \u003cstrong\u003eoc commands\u003c/strong\u003e: Direct oc CLI commands to review (e.g., paste a set of oc commands)\u003cbr\u003e3. \u003cstrong\u003eTest code\u003c/strong\u003e: Pasted Ginkgo test code to analyze\u003c/p\u003e\u003cp\u003eThe command analyzes test code in both oc CLI shell scripts and Ginkgo Go tests, helping QE engineers identify gaps in test coverage, improve test reliability, and ensure tests follow OpenShift testing standards.\u003c/p\u003e"}, {"name": "visualize-ovn-topology", "full_name": "openshift:visualize-ovn-topology", "description": "Generate and visualize OVN-Kubernetes network topology diagram", "description_html": "Generate and visualize OVN-Kubernetes network topology diagram", "synopsis": "/openshift:visualize-ovn-topology", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift:visualize-ovn-topology\u003c/code\u003e command generates a comprehensive Mermaid diagram of the OVN-Kubernetes network topology for a running cluster. The diagram shows:\u003c/p\u003e\u003cp\u003e- Logical switches and routers\u003cbr\u003e- Switch and router ports with MAC/IP addresses\u003cbr\u003e- Pod connectivity\u003cbr\u003e- External network connections\u003cbr\u003e- Per-node component placement (interconnect mode) or centralized components (default mode)\u003c/p\u003e\u003cp\u003eThe command automatically detects the cluster architecture (interconnect vs default mode) and creates an accurate topology diagram based on real data from the OVN databases.\u003c/p\u003e"}], "skills": [{"name": "generating-ovn-topology", "description": "Generates and displays OVN-Kubernetes network topology diagrams showing logical switches, routers, ports with IP/MAC addresses in Mermaid format", "description_html": "Generates and displays OVN-Kubernetes network topology diagrams showing logical switches, routers, ports with IP/MAC addresses in Mermaid format", "meta": ""}, {"name": "openshift-node-kernel", "description": "Inspect kernel-level networking configuration on OpenShift/Kubernetes nodes using oc debug", "description_html": "Inspect kernel-level networking configuration on OpenShift/Kubernetes nodes using oc debug", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "openshift", "keywords": ["openshift", "development", "helpers"], "author": {"name": "github.com/openshift-eng"}}, {"name": "openshift-developer", "description": "Bundle of curated plugins, skills, and MCP servers useful to any OpenShift engineer", "version": "1.0.0", "has_readme": true, "commands": [], "skills": [], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "bundle", "keywords": ["openshift", "bundle", "meta-plugin"], "author": {"name": "github.com/openshift-eng"}}, {"name": "openshift-tls-profile", "description": "Implementation requirements and details for OpenShift TLS security profiles", "version": "0.0.2", "has_readme": true, "commands": [{"name": "implement", "full_name": "openshift-tls-profile:implement", "description": "Use this skill to implement TLS security profiles for operators and workloads on OpenShift. Provides guidance on reading TLS config from APIServer CR and applying it to webhook/metrics servers, HTTP, and gRPC endpoints.", "description_html": "Use this skill to implement TLS security profiles for operators and workloads on OpenShift. Provides guidance on reading TLS config from APIServer CR and applying it to webhook/metrics servers, HTTP, and gRPC endpoints.", "synopsis": "/openshift-tls-profile:implement [question or implementation request]", "body_html": "\u003cp\u003eThe \u003ccode\u003eopenshift-tls-profile:implement\u003c/code\u003e command provides guidance on implementing TLS security profiles for operators and workloads running on OpenShift. It helps with:\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eRecommended\u003c/strong\u003e: Using \u003ccode\u003egithub.com/openshift/controller-runtime-common/pkg/tls\u003c/code\u003e for controller-runtime operators (provides \u003ccode\u003eFetchAPIServerTLSProfile\u003c/code\u003e, \u003ccode\u003eNewTLSConfigFromProfile\u003c/code\u003e, and \u003ccode\u003eSecurityProfileWatcher\u003c/code\u003e)\u003cbr\u003e- Reading TLS configuration from the APIServer custom resource\u003cbr\u003e- Converting OpenShift TLS profiles to Go \u003ccode\u003ecrypto/tls\u003c/code\u003e configuration\u003cbr\u003e- Applying TLS settings to Kubernetes operator webhook servers, metrics endpoints, HTTP/gRPC clients and servers\u003cbr\u003e- Using \u003ccode\u003egithub.com/openshift/library-go/pkg/crypto\u003c/code\u003e utilities for cipher suite conversion\u003cbr\u003e- Using the library-go configobserver pattern with \u003ccode\u003eObserveTLSSecurityProfile\u003c/code\u003e for OpenShift operators\u003cbr\u003e- Handling TLS profile changes with graceful restart (recommended over hot-reload)\u003c/p\u003e"}], "skills": [{"name": "openshift-tls-profile", "description": "Use this skill to implement TLS security profiles for operators and workloads on OpenShift. Provides guidance on reading TLS config from APIServer CR and applying it to webhook/metrics servers, HTTP, and gRPC endpoints.", "description_html": "Use this skill to implement TLS security profiles for operators and workloads on OpenShift. Provides guidance on reading TLS config from APIServer CR and applying it to webhook/metrics servers, HTTP, and gRPC endpoints.", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "openshift", "keywords": ["tls", "security-profiles", "crypto"], "author": {"name": "github.com/openshift-eng"}}, {"name": "operator-dashboard", "description": "Generate OpenShift Console operator dashboard: CRD discovery, list/detail components from templates", "version": "1.0.0", "has_readme": true, "commands": [{"name": "generate-dashboard", "full_name": "operator-dashboard:generate-dashboard", "description": "Generate OpenShift Console operator dashboard from operator name and CRD discovery", "description_html": "Generate OpenShift Console operator dashboard from operator name and CRD discovery", "synopsis": "/operator-dashboard:generate-dashboard \u003coperator-name\u003e [--namespace \u003cns\u003e] [--output-dir \u003cdir\u003e]", "body_html": "This command adds a new operator to an OpenShift Console dynamic plugin. It discovers the operator&#x27;s CRDs via cluster API (e.g. \u003ccode\u003eoc api-resources\u003c/code\u003e), then generates the dashboard page, one table component per resource kind using the shared ResourceTable pattern, operator CSS, and extends ResourceInspect for the detail view. Optional parameters allow scoping to a namespace and writing output to a custom directory. The template components in \u003ccode\u003eskills/dashboard-templates/\u003c/code\u003e define the CRD models (\u003ccode\u003e.ts\u003c/code\u003e) and list/detail UI components (ResourceTable, ResourceInspect) that are adapted to the target operator&#x27;s API group, version, kind, and printer columns."}], "skills": [{"name": "dashboard-templates", "description": "Reference components for generating Kubernetes operator CRD dashboards", "description_html": "Reference components for generating Kubernetes operator CRD dashboards", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "openshift", "keywords": ["console", "dashboard", "operators", "crd"], "author": {"name": "github.com/openshift-eng"}}, {"name": "ote-migration", "description": "Automate OpenShift Tests Extension (OTE) migration for component repositories", "version": "0.0.2", "has_readme": true, "commands": [{"name": "migrate", "full_name": "ote-migration:migrate", "description": "Automate OpenShift Tests Extension (OTE) migration for component repositories", "description_html": "Automate OpenShift Tests Extension (OTE) migration for component repositories", "synopsis": "/ote-migration:migrate", "body_html": "\u003cp\u003eThe \u003ccode\u003eote-migration:migrate\u003c/code\u003e command automates the complete migration of OpenShift component repositories to use the openshift-tests-extension (OTE) framework. It handles everything from repository setup to code generation, test migration, dependency resolution, and Docker integration.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat it does:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Collects configuration (directory strategy, repositories, paths)\u003cbr\u003e2. Sets up source and target repositories\u003cbr\u003e3. Creates directory structure (monorepo or single-module)\u003cbr\u003e4. Generates code (go.mod, cmd/extension/main.go, Makefile, bindata.mk, fixtures.go)\u003cbr\u003e5. Migrates tests (replaces FixturePath calls, updates imports, adds annotations)\u003cbr\u003e6. Resolves dependencies (go mod tidy + vendor at root for monorepo)\u003cbr\u003e7. Integrates with Docker (automated or manual)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Features:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eNo sig filtering\u003c/strong\u003e - All tests included without filtering logic\u003cbr\u003e- \u003cstrong\u003eCMD at root (monorepo)\u003c/strong\u003e - Places cmd/extension/main.go at repository root, not under test/\u003cbr\u003e- \u003cstrong\u003eSimple annotations\u003c/strong\u003e - Adds [OTP] at beginning of Describe blocks, [Level0] at beginning of test names only\u003cbr\u003e- \u003cstrong\u003eVendor at root only (monorepo)\u003c/strong\u003e - Dependencies vendored only at repository root\u003cbr\u003e- \u003cstrong\u003eAtomic test migration\u003c/strong\u003e - Backup and rollback on failure\u003cbr\u003e- \u003cstrong\u003eAutomated Docker integration\u003c/strong\u003e - Optional automated Dockerfile updates with backup\u003c/p\u003e"}], "skills": [{"name": "ote-migration-workflow", "description": "Automated workflow for migrating OpenShift component repositories to OTE framework", "description_html": "Automated workflow for migrating OpenShift component repositories to OTE framework", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "development", "keywords": ["ote", "migration", "openshift-tests"], "author": {"name": "minl@redhat.com"}}, {"name": "rds-analyzer", "description": "Reference Design Specification (RDS) Analyzer workflow: cluster-compare JSON to deviation reports (text/HTML/reporting) and Jira follow-up", "version": "0.0.2", "has_readme": true, "commands": [{"name": "full-workflow", "full_name": "rds-analyzer:full-workflow", "description": "Run the RDS Analyzer full workflow from cluster-compare JSON to deviation reports (text/HTML/reporting), validate rules, and Jira-oriented follow-up \u2014 aligned with rds-analyzer docs/full-workflow.md", "description_html": "Run the RDS Analyzer full workflow from cluster-compare JSON to deviation reports (text/HTML/reporting), validate rules, and Jira-oriented follow-up \u2014 aligned with rds-analyzer docs/full-workflow.md", "synopsis": "/rds-analyzer:full-workflow [scenario]", "body_html": "\u003cp\u003eOrchestrates the \u003cstrong\u003ecomplete RDS Analyzer workflow\u003c/strong\u003e from \u003ca href=\"https://github.com/openshift-kni/rds-analyzer\"\u003eopenshift-kni/rds-analyzer\u003c/a\u003e (\u003ca href=\"https://github.com/openshift-kni/rds-analyzer/blob/main/docs/full-workflow.md\"\u003edocs/full-workflow.md\u003c/a\u003e):\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003ePrerequisites\u003c/strong\u003e \u2014 Must-gather (or cluster access) and kube-compare JSON as input.\u003cbr\u003e2. \u003cstrong\u003eCluster compare\u003c/strong\u003e \u2014 User must have the cluster-compare (kube-compare) plugin installed; official install and telco reference docs.\u003cbr\u003e3. \u003cstrong\u003eTelco references\u003c/strong\u003e \u2014 RAN DU, Telco Core, Telco Hub documentation links for running comparisons.\u003cbr\u003e4. \u003cstrong\u003eRDS Analyzer\u003c/strong\u003e \u2014 Run the single upstream \u003ccode\u003erds-analyzer\u003c/code\u003e binary with the flags documented below (text/HTML, \u003ccode\u003e--target\u003c/code\u003e, \u003ccode\u003e--output-mode reporting\u003c/code\u003e, stdin, \u003ccode\u003e--validate-rules-only\u003c/code\u003e).\u003cbr\u003e5. \u003cstrong\u003eJira / LLM follow-up\u003c/strong\u003e \u2014 Reporting-mode output for telco team interaction; suggest Jira plugin commands when the user wants tickets.\u003c/p\u003e\u003cp\u003eThis command does \u003cstrong\u003enot\u003c/strong\u003e replace installing cluster-compare or gathering must-gather; it guides execution and \u003cstrong\u003eruns\u003c/strong\u003e \u003ccode\u003erds-analyzer\u003c/code\u003e when the user provides paths and a binary (PATH or \u003ccode\u003eRDS_ANALYZER_BIN\u003c/code\u003e).\u003c/p\u003e"}], "skills": [{"name": "rds-analyzer-workflow", "description": "End-to-end workflow from cluster data to deviation reports and optional Jira follow-up", "description_html": "End-to-end workflow from cluster data to deviation reports and optional Jira follow-up", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "debugging", "keywords": ["rds", "cluster-compare", "deviation-reports"], "author": {"name": "github.com/openshift-eng"}}, {"name": "snowflake", "description": "Snowflake data analysis commands for engineering metrics and reports", "version": "0.4.1", "has_readme": true, "commands": [{"name": "activity-type-report", "full_name": "snowflake:activity-type-report", "description": "Classify Jira issues into activity types using AI and generate an interactive sankey report", "description_html": "Classify Jira issues into activity types using AI and generate an interactive sankey report", "synopsis": "/snowflake:activity-type-report \u003cprojects\u003e [months]\n/snowflake:activity-type-report \u003cprojects\u003e [months] --sample [N]\n/snowflake:activity-type-report \u003cprojects\u003e [months] --todo\n/snowflake:activity-type-report \u003cprojects\u003e [months] --all\n/snowflake:activity-type-report \u003cprojects\u003e [months] --uncategorized\n/snowflake:activity-type-report \u003cprojects\u003e [months] --uncategorized --sample [N]", "body_html": "\u003cp\u003eFetches Jira issues from Snowflake, classifies each into an activity type using AI, and generates an interactive HTML report with sankey diagrams, charts, and a searchable detail table with direct Jira links.\u003c/p\u003e\u003cp\u003eActivity type categories:\u003cbr\u003e1. \u003cstrong\u003eAssociate Wellness &amp; Development\u003c/strong\u003e -- training, learning, mentorship, team building\u003cbr\u003e2. \u003cstrong\u003eIncidents &amp; Support\u003c/strong\u003e -- production incidents, customer escalations, on-call, firefighting\u003cbr\u003e3. \u003cstrong\u003eSecurity &amp; Compliance\u003c/strong\u003e -- CVE remediation, security vulnerabilities, compliance, audits\u003cbr\u003e4. \u003cstrong\u003eQuality / Stability / Reliability\u003c/strong\u003e -- bug fixes, flaky tests, CI reliability, monitoring\u003cbr\u003e5. \u003cstrong\u003eFuture Sustainability\u003c/strong\u003e -- tech debt, architecture improvements, infrastructure modernization\u003cbr\u003e6. \u003cstrong\u003eProduct / Portfolio Work\u003c/strong\u003e -- features, enhancements, roadmap items, integrations\u003cbr\u003e7. \u003cstrong\u003eUncategorized\u003c/strong\u003e -- insufficient information to classify\u003c/p\u003e"}], "skills": [{"name": "setup-snowflake", "description": "This skill should be used before any Snowflake command to verify MCP connectivity, guide users through access provisioning, and set the session context. Invoke this skill proactively whenever a command needs Snowflake data access.", "description_html": "This skill should be used before any Snowflake command to verify MCP connectivity, guide users through access provisioning, and set the session context. Invoke this skill proactively whenever a command needs Snowflake data access.", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "data", "keywords": ["snowflake", "sql", "metrics", "reporting"], "author": {"name": "github.com/openshift-eng"}}, {"name": "sosreport", "description": "Analyze sosreport archives for system diagnostics and troubleshooting", "version": "0.0.2", "has_readme": true, "commands": [{"name": "analyze", "full_name": "sosreport:analyze", "description": "Analyze sosreport archive for system diagnostics and issues", "description_html": "Analyze sosreport archive for system diagnostics and issues", "synopsis": "```\n/sosreport:analyze \u003cpath-to-sosreport\u003e [--only \u003careas\u003e] [--skip \u003careas\u003e]\n```\n\n**Analysis Areas:**\n\n- **`logs`**: Analyze system and application logs (journald, syslog, dmesg, application logs)\n  - Identifies errors, warnings, critical messages\n  - Detects OOM killer events, kernel panics, segfaults\n  - Counts and categorizes errors by severity\n  - Provides timeline of critical events\n\n- **`resources`**: Analyze system resource usage (memory, CPU, disk, processes)\n  - Memory usage, swap, and pressure indicators\n  - CPU information and load averages\n  - Disk usage and filesystem capacity\n  - Top resource consumers and zombie processes\n\n- **`network`**: Analyze network configuration and connectivity\n  - Network interface status and IP addresses\n  - Routing table and default gateway\n  - Active connections and listening services\n  - Firewall rules (firewalld/iptables)\n  - DNS configuration and hostname resolution\n\n- **`system-config`**: Analyze system configuration (packages, services, security)\n  - OS version and kernel information\n  - Installed package versions\n  - Systemd service status and failures\n  - SELinux/AppArmor configuration and denials\n  - Kernel parameters and resource limits", "body_html": "\u003cp\u003eThe \u003ccode\u003esosreport:analyze\u003c/code\u003e command performs comprehensive analysis of a sosreport archive (from &lt;https://github.com/sosreport/sos&gt;) to identify system issues, configuration problems, and potential causes of failures. It examines system logs, resource usage, network configuration, installed packages, and other diagnostic data collected by sosreport.\u003c/p\u003e\u003cp\u003eBy default, all analysis areas are executed. Use \u003ccode\u003e--only\u003c/code\u003e to run specific areas or \u003ccode\u003e--skip\u003c/code\u003e to exclude areas from analysis.\u003c/p\u003e"}, {"name": "ovs-db", "full_name": "sosreport:ovs-db", "description": "Analyze OVS data from sosreport (text files or database)", "description_html": "Analyze OVS data from sosreport (text files or database)", "synopsis": "/sosreport:ovs-db [sosreport-path] [--db] [--flows-only] [--query \u003cjson\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eovs-db\u003c/code\u003e command analyzes Open vSwitch data collected in sosreports. It operates in four modes:\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eDefault mode\u003c/strong\u003e: Full analysis - conf.db + all text files (requires ovsdb-tool)\u003cbr\u003e2. \u003cstrong\u003eDatabase mode\u003c/strong\u003e (\u003ccode\u003e--db\u003c/code\u003e): Database only - analyze conf.db (requires ovsdb-tool)\u003cbr\u003e3. \u003cstrong\u003eText files mode\u003c/strong\u003e (\u003ccode\u003e--flows-only\u003c/code\u003e): Text files only - no ovsdb-tool needed!\u003cbr\u003e4. \u003cstrong\u003eQuery mode\u003c/strong\u003e (\u003ccode\u003e--query\u003c/code\u003e): Run custom OVSDB JSON queries (requires ovsdb-tool)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat it analyzes:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e### From Database (Default or \u003ccode\u003e--db\u003c/code\u003e Mode)\u003cbr\u003e- \u003cstrong\u003eSystem Information\u003c/strong\u003e: OVS version, DPDK settings, external IDs (from conf.db)\u003cbr\u003e- \u003cstrong\u003eBridge Details\u003c/strong\u003e: Datapath type (kernel/userspace), fail mode, ports (from conf.db)\u003cbr\u003e- \u003cstrong\u003eInterface Inventory\u003c/strong\u003e: By type, with pod-to-interface mapping (from conf.db)\u003c/p\u003e\u003cp\u003e### From Text Files (Default or \u003ccode\u003e--flows-only\u003c/code\u003e Mode)\u003cbr\u003e- \u003cstrong\u003eSystem Information\u003c/strong\u003e: OVS version, DPDK settings, external IDs (from \u003ccode\u003eovs-vsctl list Open_vSwitch\u003c/code\u003e)\u003cbr\u003e- \u003cstrong\u003eTopology\u003c/strong\u003e: Bridges with ports grouped by type (from \u003ccode\u003eovs-vsctl show\u003c/code\u003e)\u003cbr\u003e- \u003cstrong\u003eBridge Details\u003c/strong\u003e: Datapath type, fail mode, CT zones (from \u003ccode\u003eovs-vsctl list bridge\u003c/code\u003e)\u003cbr\u003e- \u003cstrong\u003eInterface Inventory\u003c/strong\u003e: By type, with pod-to-interface mapping (from \u003ccode\u003eovs-vsctl list interface\u003c/code\u003e)\u003cbr\u003e- \u003cstrong\u003eOpenFlow Flows\u003c/strong\u003e: Flow counts, drop detection, top flows (from \u003ccode\u003eovs-ofctl dump-flows\u003c/code\u003e)\u003cbr\u003e- \u003cstrong\u003ePort Statistics\u003c/strong\u003e: RX/TX drops and errors (from \u003ccode\u003eovs-ofctl dump-ports\u003c/code\u003e)\u003cbr\u003e- \u003cstrong\u003eTunnel Ports\u003c/strong\u003e: Configured tunnels (from \u003ccode\u003eovs-appctl tnl.ports.show\u003c/code\u003e)\u003cbr\u003e- \u003cstrong\u003eDatapath Health\u003c/strong\u003e: Flow table usage vs limit (from \u003ccode\u003eovs-appctl upcall.show\u003c/code\u003e)\u003cbr\u003e- \u003cstrong\u003eOVS Internal Stats\u003c/strong\u003e: Netlink, OpenFlow, OVSDB counters (from \u003ccode\u003eovs-appctl coverage.show\u003c/code\u003e)\u003c/p\u003e\u003cp\u003e### Custom Queries (\u003ccode\u003e--query\u003c/code\u003e Mode)\u003cbr\u003e- Direct OVSDB table queries (requires ovsdb-tool)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eModes of operation:\u003c/strong\u003e\u003cbr\u003e1. \u003cstrong\u003eDefault\u003c/strong\u003e: Full analysis - conf.db + all text files (requires ovsdb-tool, falls back to text files if not available)\u003cbr\u003e2. \u003cstrong\u003eDatabase\u003c/strong\u003e (\u003ccode\u003e--db\u003c/code\u003e): Database only - analyze conf.db (requires ovsdb-tool)\u003cbr\u003e3. \u003cstrong\u003eText Files\u003c/strong\u003e (\u003ccode\u003e--flows-only\u003c/code\u003e): Text files only - no ovsdb-tool needed\u003cbr\u003e4. \u003cstrong\u003eQuery Mode\u003c/strong\u003e (\u003ccode\u003e--query\u003c/code\u003e): Run custom OVSDB JSON queries (requires ovsdb-tool)\u003c/p\u003e"}], "skills": [{"name": "logs-analysis", "description": "Analyze system and application log data from sosreport archives, extracting error patterns, kernel panics, OOM events, service failures, and application crashes from journald logs and traditional log files within the sosreport directory structure to identify root causes of system failures and issues", "description_html": "Analyze system and application log data from sosreport archives, extracting error patterns, kernel panics, OOM events, service failures, and application crashes from journald logs and traditional log files within the sosreport directory structure to identify root causes of system failures and issues", "meta": ""}, {"name": "network-analysis", "description": "Analyze network configuration data from sosreport archives, extracting interface configurations, routing tables, active connections, firewall rules (firewalld/iptables), and DNS settings from the sosreport directory structure to diagnose network connectivity and configuration issues", "description_html": "Analyze network configuration data from sosreport archives, extracting interface configurations, routing tables, active connections, firewall rules (firewalld/iptables), and DNS settings from the sosreport directory structure to diagnose network connectivity and configuration issues", "meta": ""}, {"name": "ovs-db-analysis", "description": "Analyze Open vSwitch data from sosreport", "description_html": "Analyze Open vSwitch data from sosreport", "meta": ""}, {"name": "resource-analysis", "description": "Analyze system resource usage data from sosreport archives, extracting memory statistics, CPU load averages, disk space utilization, and process information from the sosreport directory structure to diagnose resource exhaustion, performance bottlenecks, and capacity issues", "description_html": "Analyze system resource usage data from sosreport archives, extracting memory statistics, CPU load averages, disk space utilization, and process information from the sosreport directory structure to diagnose resource exhaustion, performance bottlenecks, and capacity issues", "meta": ""}, {"name": "system-config-analysis", "description": "Analyze system configuration data from sosreport archives, extracting OS details, installed packages, systemd service status, SELinux/AppArmor policies, and kernel parameters from the sosreport directory structure to diagnose configuration-related system issues", "description_html": "Analyze system configuration data from sosreport archives, extracting OS details, installed packages, systemd service status, SELinux/AppArmor policies, and kernel parameters from the sosreport directory structure to diagnose configuration-related system issues", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "debugging", "keywords": ["sosreport", "diagnostics", "troubleshooting", "rhel"], "author": {"name": "github.com/arkadeepsen"}}, {"name": "teams", "description": "Team structure knowledge and health analysis commands for OpenShift teams", "version": "0.0.15", "has_readme": true, "commands": [{"name": "coderabbit-adoption-report", "full_name": "teams:coderabbit-adoption-report", "description": "Report on CodeRabbit adoption across OCP payload repos", "description_html": "Report on CodeRabbit adoption across OCP payload repos", "synopsis": "/teams:coderabbit-adoption-report\n/teams:coderabbit-adoption-report --start-date 2026-02-01 --end-date 2026-02-28", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:coderabbit-adoption-report\u003c/code\u003e command measures CodeRabbit Pro adoption across a curated list of ~160 OCP payload repositories by calculating what percentage of merged PRs received a Pro-tier CodeRabbit review (identified by \u003ccode\u003e&quot;Plan: Pro&quot;\u003c/code\u003e in the comment body).\u003c/p\u003e\u003cp\u003eThe list of repos to scan is defined in \u003ccode\u003eplugins/teams/skills/coderabbit-adoption/allowed-repos.txt\u003c/code\u003e.\u003c/p\u003e\u003cp\u003eIt uses a Python script that calls the GitHub search API via \u003ccode\u003egh\u003c/code\u003e CLI. The script does one org-wide query for PRs with Pro reviews, then batched queries (20 repos per batch) for all merged PRs. Per-repo breakdowns are calculated in Python. \u003cstrong\u003eTakes about a minute to complete\u003c/strong\u003e with progress shown.\u003c/p\u003e\u003cp\u003e### How CodeRabbit Pro Reviews Work\u003c/p\u003e\u003cp\u003eCodeRabbit was enabled across most OCP payload repos on \u003cstrong\u003e2026-03-09\u003c/strong\u003e. Since many of these repos are open source, CodeRabbit may leave comments on any PR \u2014 but only \u003cstrong\u003ePro\u003c/strong\u003e reviews (indicated by \u003ccode\u003ePlan: Pro\u003c/code\u003e in the CodeRabbit comment) provide the full-quality analysis we want.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCodeRabbit does not review bot PRs.\u003c/strong\u003e PRs authored by bot accounts (e.g., \u003ccode\u003edependabot[bot]\u003c/code\u003e, \u003ccode\u003egithub-actions[bot]\u003c/code\u003e, \u003ccode\u003eopenshift-monitoring-bot[bot]\u003c/code\u003e) are intentionally skipped by CodeRabbit. Bot PRs appearing in the &quot;missed&quot; list are expected and should not be counted against adoption.\u003c/p\u003e\u003cp\u003eThe script uses \u003ccode\u003e&quot;Plan: Pro&quot;\u003c/code\u003e as a search term combined with \u003ccode\u003ecommenter:coderabbitai[bot]\u003c/code\u003e to directly identify Pro-reviewed PRs, then compares against all merged PRs to find the gap.\u003c/p\u003e\u003cp\u003eThe script filters to PRs \u003cstrong\u003ecreated on or after the enablement date\u003c/strong\u003e (2026-03-09) to avoid counting old long-lived PRs that merged after enablement but were never seen by CodeRabbit.\u003c/p\u003e"}, {"name": "coderabbit-inheritance-scanner", "full_name": "teams:coderabbit-inheritance-scanner", "description": "Scan openshift org repos for .coderabbit.yaml/.coderabbit.yml files missing inheritance", "description_html": "Scan openshift org repos for .coderabbit.yaml/.coderabbit.yml files missing inheritance", "synopsis": "/teams:coderabbit-inheritance-scanner\n/teams:coderabbit-inheritance-scanner --dry-run", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:coderabbit-inheritance-scanner\u003c/code\u003e command scans all repositories in the \u003ccode\u003eopenshift\u003c/code\u003e GitHub organization that contain a \u003ccode\u003e.coderabbit.yaml\u003c/code\u003e or \u003ccode\u003e.coderabbit.yml\u003c/code\u003e file and verifies each one has \u003ccode\u003einheritance: true\u003c/code\u003e set. This ensures repos with custom CodeRabbit configurations still inherit the org-wide review rules defined in \u003ca href=\"https://github.com/openshift/coderabbit\"\u003eopenshift/coderabbit\u003c/a\u003e.\u003c/p\u003e\u003cp\u003eThe \u003ccode\u003eopenshift/coderabbit\u003c/code\u003e repo itself is excluded from results since it is the source of the global rules.\u003c/p\u003e\u003cp\u003eAfter scanning, the command offers to open PRs on non-compliant repos to add \u003ccode\u003einheritance: true\u003c/code\u003e. PRs are always opened from a personal fork to avoid needing direct push access to upstream repos.\u003c/p\u003e"}, {"name": "coderabbit-rules-from-pr-reviews", "full_name": "teams:coderabbit-rules-from-pr-reviews", "description": "Analyze PR review comments to propose CodeRabbit rules for a repository", "description_html": "Analyze PR review comments to propose CodeRabbit rules for a repository", "synopsis": "/teams:coderabbit-rules-from-pr-reviews openshift/origin\n/teams:coderabbit-rules-from-pr-reviews https://github.com/openshift/origin\n/teams:coderabbit-rules-from-pr-reviews openshift/origin --count 50", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:coderabbit-rules-from-pr-reviews\u003c/code\u003e command analyzes human review comments on recent merged PRs in a GitHub repository to identify recurring review feedback patterns that could be codified as CodeRabbit review rules in the repo&#x27;s \u003ccode\u003e.coderabbit.yaml\u003c/code\u003e file.\u003c/p\u003e\u003cp\u003eThe command fetches the most recent N merged PRs (default: 30), collects all human review comments (excluding comments from \u003ccode\u003ecoderabbitai[bot]\u003c/code\u003e and other bots), and uses AI analysis to identify patterns that appear across multiple PRs. Only patterns that are likely to recur in future PRs are proposed as rules -- obscure, one-off, or minor issues are ignored.\u003c/p\u003e\u003cp\u003eAfter analysis, the command offers to open a PR against the repo that adds or updates the \u003ccode\u003e.coderabbit.yaml\u003c/code\u003e with the proposed rules. It also checks for a \u003ccode\u003eCONTRIBUTING.md\u003c/code\u003e and adds a reference to the CodeRabbit review rules if one is missing. The command is designed to be re-run periodically -- it compares proposed rules against existing rules and only adds net-new ones.\u003c/p\u003e"}, {"name": "health-check", "full_name": "teams:health-check", "description": "Analyze and grade component health based on regression and JIRA bug metrics", "description_html": "Analyze and grade component health based on regression and JIRA bug metrics", "synopsis": "/teams:health-check \u003crelease\u003e [--components comp1 comp2 ...] [--project JIRAPROJECT]\n/teams:health-check \u003crelease\u003e --team \u003cteam-name\u003e [--project JIRAPROJECT]", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:health-check\u003c/code\u003e command provides comprehensive component health analysis for a specified OpenShift release by combining regression management metrics with JIRA bug backlog data.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCRITICAL\u003c/strong\u003e: This command REQUIRES and AUTOMATICALLY fetches BOTH data sources:\u003cbr\u003e1. Regression data (via health-check-regressions)\u003cbr\u003e2. JIRA bug data (via health-check-jiras)\u003c/p\u003e\u003cp\u003eThe analysis is INCOMPLETE without both data sources. Both are fetched automatically without user prompting.\u003c/p\u003e\u003cp\u003eThe command evaluates component health based on:\u003c/p\u003e\u003cp\u003e1. \u003cstrong\u003eRegression Management\u003c/strong\u003e (ALWAYS fetched automatically): How well components are managing test regressions\u003cbr\u003e   - Triage coverage (% of regressions triaged to JIRA bugs)\u003cbr\u003e   - Triage timeliness (average time from detection to triage)\u003cbr\u003e   - Resolution speed (average time from detection to closure)\u003c/p\u003e\u003cp\u003e2. \u003cstrong\u003eBug Backlog Health\u003c/strong\u003e (ALWAYS fetched automatically): Current state of open bugs for components\u003cbr\u003e   - Open bug counts by component\u003cbr\u003e   - Bug age distribution\u003cbr\u003e   - Bug priority breakdown\u003cbr\u003e   - Recent bug flow (opened vs closed in last 30 days)\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eSprint planning\u003c/strong\u003e based on data-driven insights\u003cbr\u003e- \u003cstrong\u003eGrading overall component health\u003c/strong\u003e using multiple quality metrics\u003cbr\u003e- \u003cstrong\u003eIdentifying components\u003c/strong\u003e that need help with regression or bug management\u003cbr\u003e- \u003cstrong\u003eTracking quality trends\u003c/strong\u003e across releases\u003c/p\u003e\u003cp\u003eGrading is subjective and not meant to be a critique of team performance. This is intended to help identify where help is needed and track progress as we improve our quality practices.\u003c/p\u003e"}, {"name": "health-check-jiras", "full_name": "teams:health-check-jiras", "description": "Query and summarize JIRA bugs for a specific project with counts by component", "description_html": "Query and summarize JIRA bugs for a specific project with counts by component", "synopsis": "/teams:health-check-jiras --project \u003cproject\u003e [--component comp1 comp2 ...] [--status status1 status2 ...] [--include-closed] [--limit N]\n/teams:health-check-jiras --project \u003cproject\u003e --team \u003cteam-name\u003e [--status status1 status2 ...] [--include-closed] [--limit N]", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:health-check-jiras\u003c/code\u003e command queries JIRA bugs for a specified project and generates summary statistics. It leverages the \u003ccode\u003elist-jiras\u003c/code\u003e command to fetch raw JIRA data and then calculates counts by status, priority, and component to help understand the bug backlog at a glance.\u003c/p\u003e\u003cp\u003eBy default, the command includes:\u003cbr\u003e- All currently open bugs\u003cbr\u003e- Bugs closed in the last 30 days (to track recent closure activity)\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003c/p\u003e\u003cp\u003e- Getting a quick count of open bugs in a JIRA project\u003cbr\u003e- Analyzing bug distribution by status, priority, or component\u003cbr\u003e- Tracking recent bug flow (opened vs closed in last 30 days)\u003cbr\u003e- Generating summary reports for bug backlog\u003cbr\u003e- Monitoring bug velocity and closure rates by component or team\u003cbr\u003e- Comparing bug counts across different components\u003cbr\u003e- Getting team-level bug summaries across all team components\u003c/p\u003e"}, {"name": "health-check-regressions", "full_name": "teams:health-check-regressions", "description": "Query and summarize regression data for OpenShift releases with counts and metrics", "description_html": "Query and summarize regression data for OpenShift releases with counts and metrics", "synopsis": "/teams:health-check-regressions \u003cview\u003e [--components comp1 comp2 ...] [--start YYYY-MM-DD] [--end YYYY-MM-DD]\n/teams:health-check-regressions \u003cview\u003e --team \u003cteam-name\u003e [--start YYYY-MM-DD] [--end YYYY-MM-DD]", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:health-check-regressions\u003c/code\u003e command queries regression data for a specified view (e.g., &quot;4.22-main&quot;) and generates summary statistics. A view represents a specific regression tracking context within a release \u2014 multiple views can exist per release (e.g., &quot;4.22-main&quot;, &quot;4.22-main-mass-failure&quot;). The release is derived from the view name automatically. It leverages the \u003ccode\u003elist-regressions\u003c/code\u003e command to fetch raw regression data filtered to the specified view and then presents counts, percentages, and timing metrics to help understand regression trends at a glance.\u003c/p\u003e\u003cp\u003eBy default, the command analyzes:\u003cbr\u003e- All regressions within the release development window\u003cbr\u003e- Both open and closed regressions\u003cbr\u003e- Triage coverage and timing metrics\u003cbr\u003e- Per-component breakdowns\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003c/p\u003e\u003cp\u003e- Getting a quick count of regressions in a release\u003cbr\u003e- Analyzing regression distribution by component or team\u003cbr\u003e- Tracking triage coverage and response times\u003cbr\u003e- Generating summary reports for regression management\u003cbr\u003e- Monitoring regression resolution speed by component or team\u003cbr\u003e- Comparing regression metrics across different components\u003cbr\u003e- Understanding open vs closed regression breakdown\u003cbr\u003e- Getting team-level regression summaries across all team components\u003c/p\u003e"}, {"name": "list-components", "full_name": "teams:list-components", "description": "List all OCPBUGS components, optionally filtered by team", "description_html": "List all OCPBUGS components, optionally filtered by team", "synopsis": "/teams:list-components [--team \u003cteam-name\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:list-components\u003c/code\u003e command displays all OCPBUGS component names, with optional filtering by team.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003c/p\u003e\u003cp\u003e- Discovering available OCPBUGS components\u003cbr\u003e- Discovering OCPBUGS components for a specific team\u003cbr\u003e- Validating OCPBUGS component names before filing or querying bugs\u003cbr\u003e- Understanding which components are tracked in OCPBUGS per team\u003cbr\u003e- Finding exact component names for use in JIRA queries\u003c/p\u003e"}, {"name": "list-jiras", "full_name": "teams:list-jiras", "description": "Query and list raw JIRA bug data for a specific project", "description_html": "Query and list raw JIRA bug data for a specific project", "synopsis": "/teams:list-jiras \u003cproject\u003e [--component comp1 comp2 ...] [--status status1 status2 ...] [--include-closed] [--limit N]", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:list-jiras\u003c/code\u003e command queries JIRA bugs for a specified project and returns raw issue data. It fetches JIRA issues with all their fields and metadata without performing any summarization or aggregation.\u003c/p\u003e\u003cp\u003eBy default, the command includes:\u003cbr\u003e- All currently open bugs\u003cbr\u003e- Bugs closed in the last 30 days (to track recent closure activity)\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003c/p\u003e\u003cp\u003e- Fetching raw JIRA issue data for further processing\u003cbr\u003e- Accessing complete issue details including all fields\u003cbr\u003e- Building custom analysis workflows\u003cbr\u003e- Providing data to other commands (like \u003ccode\u003esummarize-jiras\u003c/code\u003e)\u003cbr\u003e- Exporting JIRA data for offline analysis\u003c/p\u003e"}, {"name": "list-regressions", "full_name": "teams:list-regressions", "description": "Fetch and list raw regression data for OpenShift releases", "description_html": "Fetch and list raw regression data for OpenShift releases", "synopsis": "/teams:list-regressions \u003cview\u003e [--components comp1 comp2 ...] [--start YYYY-MM-DD] [--end YYYY-MM-DD]", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:list-regressions\u003c/code\u003e command fetches regression data for a specified view (e.g., &quot;4.22-main&quot;) and returns raw regression details without performing any summarization or analysis. A view represents a specific regression tracking context within a release \u2014 multiple views can exist per release. The release is derived from the view name automatically. Open/closed status for each regression is determined by the view&#x27;s own tracking (not the regression&#x27;s global status). It provides complete regression information including test names, timestamps, triages, and metadata.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003c/p\u003e\u003cp\u003e- Fetching raw regression data for further processing\u003cbr\u003e- Accessing complete regression details for specific components\u003cbr\u003e- Building custom analysis workflows\u003cbr\u003e- Providing data to other commands (like \u003ccode\u003esummarize-regressions\u003c/code\u003e and \u003ccode\u003eanalyze\u003c/code\u003e)\u003cbr\u003e- Exporting regression data for offline analysis\u003cbr\u003e- Investigating specific test failures across releases\u003c/p\u003e"}, {"name": "list-teams", "full_name": "teams:list-teams", "description": "List all teams from the team component mapping", "description_html": "List all teams from the team component mapping", "synopsis": "/teams:list-teams", "body_html": "\u003cp\u003eThe \u003ccode\u003eteams:list-teams\u003c/code\u003e command displays all team names from the team component mapping.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNote\u003c/strong\u003e: The underlying script returns rich team data (components, description, repos, team_size, slack_channels), but this command presents only a concise list of team names. The full team data is available to the AI agent for context but should not be displayed to the user unless specifically requested.\u003c/p\u003e\u003cp\u003eThis command is useful for:\u003c/p\u003e\u003cp\u003e- Discovering available teams\u003cbr\u003e- Validating team names before using them in other commands\u003cbr\u003e- Finding team names for use with \u003ccode\u003e/teams:list-components --team\u003c/code\u003e or \u003ccode\u003e/teams:health-check --team\u003c/code\u003e\u003c/p\u003e"}], "skills": [{"name": "analyze-regressions", "description": "Grade component health based on regression triage metrics for OpenShift releases", "description_html": "Grade component health based on regression triage metrics for OpenShift releases", "meta": ""}, {"name": "coderabbit-adoption", "description": "Report on CodeRabbit adoption across OpenShift org PRs", "description_html": "Report on CodeRabbit adoption across OpenShift org PRs", "meta": ""}, {"name": "coderabbit-inheritance-scanner-check", "description": "Use when checking a repository's .coderabbit.yaml (or .coderabbit.yml) to determine whether inheritance: true is set", "description_html": "Use when checking a repository&#x27;s .coderabbit.yaml (or .coderabbit.yml) to determine whether inheritance: true is set", "meta": ""}, {"name": "coderabbit-inheritance-scanner-existing-pr", "description": "Search for an existing fix PR on a repo before opening a new one", "description_html": "Search for an existing fix PR on a repo before opening a new one", "meta": ""}, {"name": "coderabbit-inheritance-scanner-open-pr", "description": "Fork, sync, and open a fix PR to add inheritance: true to a repo's .coderabbit.yaml", "description_html": "Fork, sync, and open a fix PR to add inheritance: true to a repo&#x27;s .coderabbit.yaml", "meta": ""}, {"name": "coderabbit-inheritance-scanner-search", "description": "Search for repos with .coderabbit.yaml files in the openshift GitHub org", "description_html": "Search for repos with .coderabbit.yaml files in the openshift GitHub org", "meta": ""}, {"name": "coderabbit-rules-from-pr-reviews", "description": "Fetch and filter human review comments from recent merged PRs in a GitHub repository", "description_html": "Fetch and filter human review comments from recent merged PRs in a GitHub repository", "meta": ""}, {"name": "get-release-dates", "description": "Fetch OpenShift release dates and metadata from Sippy API", "description_html": "Fetch OpenShift release dates and metadata from Sippy API", "meta": ""}, {"name": "list-components", "description": "List all OCPBUGS components, optionally filtered by team", "description_html": "List all OCPBUGS components, optionally filtered by team", "meta": ""}, {"name": "list-jiras", "description": "Query and return raw JIRA bug data for a specific project", "description_html": "Query and return raw JIRA bug data for a specific project", "meta": ""}, {"name": "list-regressions", "description": "Fetch and analyze component health regressions for OpenShift releases", "description_html": "Fetch and analyze component health regressions for OpenShift releases", "meta": ""}, {"name": "list-teams", "description": "List all teams from the team component mapping", "description_html": "List all teams from the team component mapping", "meta": ""}, {"name": "summarize-jiras", "description": "Query and summarize JIRA bugs for a specific project with counts by component", "description_html": "Query and summarize JIRA bugs for a specific project with counts by component", "meta": ""}], "agents": [], "hooks": [], "mcp_servers": [], "rules": [], "category": "productivity", "keywords": ["teams", "health", "org-structure"], "author": {"name": "github.com/openshift-eng"}}, {"name": "utils", "description": "A generic utilities plugin serving as a catch-all for various helper commands and agents", "version": "0.0.10", "has_readme": true, "commands": [{"name": "address-reviews", "full_name": "utils:address-reviews", "description": "Fetch and address all PR review comments", "description_html": "Fetch and address all PR review comments", "synopsis": "/utils:address-reviews [PR number (optional - uses current branch if omitted)] [--preview]", "body_html": "This command automates the process of addressing PR review comments by fetching all comments from a pull request, categorizing them by priority (blocking, change requests, questions, suggestions), and systematically addressing each one. It intelligently filters out outdated comments, bot-generated content, and oversized responses to optimize context usage. The command handles code changes, posts replies to reviewers, and maintains a clean git history by amending relevant commits rather than creating unnecessary new ones."}, {"name": "auto-approve-konflux-prs", "full_name": "utils:auto-approve-konflux-prs", "description": "Automate approving Konflux bot PRs for the given repository by adding /lgtm and /approve", "description_html": "Automate approving Konflux bot PRs for the given repository by adding /lgtm and /approve", "synopsis": "/utils:auto-approve-konflux-prs \u003ctarget-repository\u003e", "body_html": "\u003cp\u003eThe command automates the approval of open PRs created by the \u003ccode\u003ered-hat-konflux[bot]\u003c/code\u003e for the given repository.\u003c/p\u003e\u003cp\u003eIt filters all open PRs from the given repository, checks whether the PR already has \u003ccode\u003e/lgtm\u003c/code\u003e and \u003ccode\u003e/approve\u003c/code\u003e comments, verifies that all required checks (CI jobs or other mandatory checks) have passed, and if any labels/comments are missing and all checks succeed, posts \u003ccode\u003e/lgtm\u003c/code\u003e and \u003ccode\u003e/approve\u003c/code\u003e comments to trigger approval.\u003c/p\u003e\u003cp\u003eThis ensures that PRs are only auto-approved if all required checks succeed and the author is \u003ccode\u003ered-hat-konflux[bot]\u003c/code\u003e, reducing the risk of approving failing or unauthorized changes.\u003c/p\u003e"}, {"name": "find-konflux-images", "full_name": "utils:find-konflux-images", "description": "Find and verify Konflux-built container images from a GitHub PR", "description_html": "Find and verify Konflux-built container images from a GitHub PR", "synopsis": "/utils:find-konflux-images \u003cPR-URL\u003e", "body_html": "\u003cp\u003eGiven a PR in any Konflux-enabled repository, find all Konflux/Tekton pipeline-built container images, check their availability on quay.io, and report the results. Works with any repository that has \u003ccode\u003e.tekton/\u003c/code\u003e pipeline configurations.\u003c/p\u003e\u003cp\u003e### Usage Example\u003c/p\u003e\u003cp\u003e\u003ccode\u003e/utils:find-konflux-images https://github.com/org/repo/pull/123\u003c/code\u003e\u003c/p\u003e\u003cp\u003e### Arguments\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003e$ARGUMENTS\u003c/strong\u003e \u003cem\u003e(required)\u003c/em\u003e: A full GitHub PR URL (e.g., \u003ccode\u003ehttps://github.com/owner/repo/pull/123\u003c/code\u003e). Extract org, repo, and PR number from the URL.\u003c/p\u003e"}, {"name": "generate-test-plan", "full_name": "utils:generate-test-plan", "description": "Generate test steps for one or more related PRs", "description_html": "Generate test steps for one or more related PRs", "synopsis": "/utils:generate-test-plan [GitHub PR URLs]", "body_html": "\u003cp\u003eThe &#x27;utils:generate-test-plan&#x27; command takes one or more GitHub PR URLs, fetches the PR details including description, commits, and file changes, analyzes the changes to understand what features/fixes were implemented, and generates a comprehensive testing guide with step-by-step instructions. When multiple PRs are provided, it analyzes them collectively to understand how they work together to fix a bug or implement a feature.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePR Testing Guide Generator\u003c/strong\u003e\u003c/p\u003e"}, {"name": "gh-attention", "full_name": "utils:gh-attention", "description": "List PRs and issues requiring your attention", "description_html": "List PRs and issues requiring your attention", "synopsis": "/utils:gh-attention [--repo \u003corg/repo\u003e]", "body_html": "\u003cp\u003eThe \u003ccode\u003eutils:gh-attention\u003c/code\u003e command identifies pull requests and issues that are waiting for your action. It scans PRs you&#x27;ve authored, PRs where you&#x27;re requested as a reviewer, and PRs where you&#x27;ve participated in discussions. For each, it detects specific states where you are the blocker: unresolved review comments, unanswered PR conversation comments, change requests you haven&#x27;t addressed, merge conflicts, and unanswered questions on assigned issues.\u003c/p\u003e\u003cp\u003eThis command helps cut through notification noise by focusing only on actionable items where others are waiting for your input.\u003c/p\u003e"}, {"name": "process-renovate-pr", "full_name": "utils:process-renovate-pr", "description": "Process Renovate dependency PR(s) to meet repository contribution standards", "description_html": "Process Renovate dependency PR(s) to meet repository contribution standards", "synopsis": "/utils:process-renovate-pr \u003cPR_NUMBER|open\u003e [JIRA_PROJECT] [COMPONENT]", "body_html": "\u003cp\u003eThe \u003ccode\u003eutils:process-renovate-pr\u003c/code\u003e command automates the processing of Renovate/Konflux dependency update pull requests to meet repository contribution standards. It analyzes dependencies, creates comprehensive Jira tickets, and updates PR titles with proper references.\u003c/p\u003e\u003cp\u003eThis command significantly reduces manual PR processing time from approximately 15 minutes to 2 minutes by automating:\u003c/p\u003e\u003cp\u003e- Dependency analysis (direct vs indirect)\u003cbr\u003e- OpenShift version detection from release branches\u003cbr\u003e- Jira ticket creation with comprehensive details\u003cbr\u003e- PR title updates with Jira references\u003cbr\u003e- Testing strategy identification\u003c/p\u003e\u003cp\u003eThe command can process either a single PR by number or all open dependency PRs from the Konflux bot.\u003c/p\u003e"}, {"name": "review-ai-helpers-overlap", "full_name": "utils:review-ai-helpers-overlap", "description": "Review potential overlaps with existing ai-helpers (Claude Code Plugins, Commands, Skills, Sub-agents, or Hooks) and open PRs", "description_html": "Review potential overlaps with existing ai-helpers (Claude Code Plugins, Commands, Skills, Sub-agents, or Hooks) and open PRs", "synopsis": "/utils:review-ai-helpers-overlap [--idea \"description\"] [--pr NUMBER] [--verbose]", "body_html": "\u003cp\u003eReview potential overlaps between your planned or implemented work and existing
